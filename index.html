<!-- SECTION COLLECTIONS PUBLIQUES -->
<!-- À ajouter dans index.html après les filtres et avant la grille des webapps -->

<style>
  .collections-section {
    background: var(--bg-card);
    padding: 2rem;
    border-radius: 12px;
    margin-bottom: 3rem;
  }

  .collections-section h2 {
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .collections-slider {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
  }

  .collection-preview {
    background: rgba(0, 217, 255, 0.05);
    border: 1px solid rgba(0, 217, 255, 0.1);
    border-radius: 12px;
    padding: 1.5rem;
    cursor: pointer;
    transition: all 0.3s;
  }

  .collection-preview:hover {
    border-color: var(--accent-cyan);
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(0, 217, 255, 0.2);
  }

  .collection-preview h3 {
    margin-bottom: 0.5rem;
    color: var(--accent-cyan);
  }

  .collection-preview .creator {
    color: var(--text-secondary);
    font-size: 0.85rem;
    margin-bottom: 0.5rem;
  }

  .collection-preview .description {
    color: var(--text-secondary);
    font-size: 0.9rem;
    margin-bottom: 1rem;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .collection-preview .meta {
    display: flex;
    justify-content: space-between;
    color: var(--text-secondary);
    font-size: 0.85rem;
  }
</style>

<!-- Dans le HTML, après les filtres -->
<div class="collections-section" id="collections-section">
  <h2>
    <i class="fa-solid fa-star"></i>
    Featured Collections
  </h2>
  <div class="collections-slider" id="collections-slider"></div>
</div>

<!-- Dans le script JavaScript -->
<script>
  // Ajouter cette fonction
  async function loadPublicCollections() {
    try {
      const response = await fetch('/api/collections/public/list?limit=6');
      const data = await response.json();

      if (data.success && data.collections.length > 0) {
        renderPublicCollections(data.collections);
        document.getElementById('collections-section').style.display = 'block';
      } else {
        document.getElementById('collections-section').style.display = 'none';
      }
    } catch (error) {
      console.error('Error loading public collections:', error);
      document.getElementById('collections-section').style.display = 'none';
    }
  }

  function renderPublicCollections(collections) {
    const slider = document.getElementById('collections-slider');
    
    slider.innerHTML = collections.map(col => `
      <div class="collection-preview" onclick="window.location.href='/collection.html?id=${col.id}'">
        <h3>${col.name}</h3>
        <p class="creator"><i class="fa-solid fa-user"></i> by ${col.creator_name}</p>
        <p class="description">${col.description || 'No description'}</p>
        <div class="meta">
          <span><i class="fa-solid fa-layer-group"></i> ${col.items_count} webapps</span>
          <span><i class="fa-solid fa-globe"></i> Public</span>
        </div>
      </div>
    `).join('');
  }

  // Appeler au chargement de la page (ajouter dans DOMContentLoaded)
  document.addEventListener('DOMContentLoaded', () => {
    loadWebapps();
    loadPublicCollections(); // Ajouter cette ligne
  });
</script>

<!-- ALTERNATIVE : Ajouter Collections comme onglet dans les filtres -->
<!-- Remplacer les boutons de filtres par ceci : -->

<div class="filters">
  <button class="filter-btn active" data-filter="all" onclick="filterWebapps('all')">
    <i class="fa-solid fa-th"></i> All
  </button>
  <button class="filter-btn" data-filter="trending" onclick="filterWebapps('trending')">
    <i class="fa-solid fa-fire"></i> Trending
  </button>
  <button class="filter-btn" data-filter="new" onclick="filterWebapps('new')">
    <i class="fa-solid fa-sparkles"></i> New
  </button>
  <button class="filter-btn" data-filter="top-rated" onclick="filterWebapps('top-rated')">
    <i class="fa-solid fa-star"></i> Top Rated
  </button>
  <!-- NOUVEAU FILTRE -->
  <button class="filter-btn" data-filter="collections" onclick="showCollections()">
    <i class="fa-solid fa-folder"></i> Collections
  </button>
</div>

<!-- Ajouter ces fonctions JavaScript -->
<script>
  let showingCollections = false;

  function showCollections() {
    showingCollections = true;
    
    // Update filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector('[data-filter="collections"]').classList.add('active');
    
    // Hide webapps, show collections
    document.getElementById('webapps-grid').style.display = 'none';
    
    // Create collections grid if not exists
    if (!document.getElementById('collections-grid-main')) {
      const collectionsGrid = document.createElement('div');
      collectionsGrid.id = 'collections-grid-main';
      collectionsGrid.className = 'collections-slider';
      collectionsGrid.style.display = 'grid';
      document.querySelector('.catalog-section').appendChild(collectionsGrid);
    } else {
      document.getElementById('collections-grid-main').style.display = 'grid';
    }
    
    loadPublicCollectionsMain();
  }

  async function loadPublicCollectionsMain() {
    try {
      const response = await fetch('/api/collections/public/list?limit=50');
      const data = await response.json();

      if (data.success) {
        const grid = document.getElementById('collections-grid-main');
        grid.innerHTML = data.collections.map(col => `
          <div class="collection-preview" onclick="window.location.href='/collection.html?id=${col.id}'">
            <h3>${col.name}</h3>
            <p class="creator"><i class="fa-solid fa-user"></i> by ${col.creator_name}</p>
            <p class="description">${col.description || 'No description'}</p>
            <div class="meta">
              <span><i class="fa-solid fa-layer-group"></i> ${col.items_count} webapps</span>
              <span><i class="fa-solid fa-globe"></i> Public</span>
            </div>
          </div>
        `).join('');
      }
    } catch (error) {
      console.error('Error loading collections:', error);
    }
  }

  function filterWebapps(filter) {
    showingCollections = false;
    
    // Hide collections if showing
    if (document.getElementById('collections-grid-main')) {
      document.getElementById('collections-grid-main').style.display = 'none';
    }
    
    // Show webapps grid
    document.getElementById('webapps-grid').style.display = 'grid';
    
    // Update filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`[data-filter="${filter}"]`).classList.add('active');
    
    // Filter logic (existing code)
    // ...
  }
</script>
