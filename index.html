<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confidence Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .theme-calm {
            --bg: #f8f9fa; --surface: #fff; --primary: #3b82f6; --text: #1f2937; --text-sec: #6b7280; --border: #e5e7eb;
        }
        .dark .theme-calm {
            --bg: #111827; --surface: #1f2937; --primary: #60a5fa; --text: #f9fafb; --text-sec: #9ca3af; --border: #374151;
        }
        body { background: var(--bg); color: var(--text); }
        .bg-surface { background: var(--surface); }
        .text-primary { color: var(--primary); }
        .text-secondary { color: var(--text-sec); }
        .border-theme { border-color: var(--border); }
    </style>
</head>
<body class="theme-calm">

<!-- AUTH VIEW -->
<div id="auth-view" class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md text-center bg-surface rounded-2xl shadow-lg p-12">
        <div class="text-6xl mb-6">🌌</div>
        <h1 class="text-3xl font-bold text-primary mb-3">Confidence Book</h1>
        <p class="text-secondary text-lg mb-8">Personne ne doit rester seul face à son histoire.</p>
        <button onclick="enterApp()" class="w-full bg-blue-500 text-white font-semibold py-3 px-6 rounded-lg hover:bg-blue-600 transition">
            Entrer anonymement
        </button>
    </div>
</div>

<!-- APP VIEW -->
<div id="app-view" class="hidden min-h-screen">
    <!-- Header Mobile -->
    <header class="md:hidden bg-surface shadow sticky top-0 z-20 flex items-center justify-between p-4 border-b border-theme">
        <h1 class="text-xl font-bold text-primary">Confidence Book</h1>
        <div class="flex gap-3">
            <button onclick="showModal('notif-modal')" class="p-2 rounded-full relative">
                <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0" /></svg>
                <span id="badge" class="hidden absolute top-0 right-0 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center"></span>
            </button>
            <button onclick="showModal('post-modal')" class="p-2 rounded-full bg-blue-500 text-white">
                <svg class="w-6 h-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10" /></svg>
            </button>
        </div>
    </header>

    <!-- Main -->
    <main class="max-w-2xl mx-auto p-4">
        <!-- Publish Box -->
        <div class="bg-surface rounded-xl shadow p-4 mb-6">
            <button onclick="showModal('post-modal')" class="w-full text-left bg-gray-100 dark:bg-gray-700 rounded-full p-3 px-5 text-secondary hover:bg-gray-200 transition">
                Exprimez-vous en toute sécurité...
            </button>
        </div>

        <!-- Confidences List -->
        <div id="list"></div>
    </main>
</div>

<!-- POST MODAL -->
<div id="post-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
    <div onclick="hideModal('post-modal')" class="absolute inset-0 bg-black/50"></div>
    <div class="bg-surface rounded-xl shadow-lg w-full max-w-2xl z-10 p-6">
        <h2 id="modal-title" class="text-2xl font-bold text-primary mb-4">Écrire une confidence</h2>
        <textarea id="text" rows="8" class="w-full p-4 rounded-lg border border-theme bg-surface text-secondary" placeholder="Votre histoire..."></textarea>
        <div class="mt-4">
            <p class="text-sm text-secondary mb-2">Tonalité :</p>
            <div id="emotions" class="flex flex-wrap gap-2"></div>
        </div>
        <div class="flex justify-end gap-4 mt-6">
            <button onclick="hideModal('post-modal')" class="text-secondary">Annuler</button>
            <button id="submit-btn" onclick="publish()" class="bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600">Publier</button>
        </div>
    </div>
</div>

<!-- NOTIF MODAL -->
<div id="notif-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
    <div onclick="hideModal('notif-modal')" class="absolute inset-0 bg-black/50"></div>
    <div class="bg-surface rounded-xl shadow-lg w-full max-w-lg z-10 p-6 max-h-[80vh] overflow-y-auto">
        <h2 class="text-2xl font-bold text-primary mb-4">Notifications</h2>
        <div id="notif-list"></div>
    </div>
</div>

<script>
let userId = null;
let deviceId = null;
let emotion = null;
let editingId = null;

const CHAPTERS = [
    { id: 'ruptures', emoji: '💔', name: 'Ruptures', color: 'red' },
    { id: 'isolement', emoji: '😔', name: 'Isolement', color: 'blue' },
    { id: 'traumas', emoji: '🔥', name: 'Traumas', color: 'orange' },
    { id: 'stress', emoji: '🧠', name: 'Stress', color: 'purple' },
    { id: 'spiritualite', emoji: '🪞', name: 'Spiritualité', color: 'indigo' },
    { id: 'espoir', emoji: '🤝', name: 'Espoir', color: 'teal' }
];

const REACTIONS = [
    { id: 'soutien', emoji: '🤝🏾', label: 'Je te soutiens' },
    { id: 'espoir', emoji: '🔥', label: 'Garde espoir' },
    { id: 'compatis', emoji: '🤜🏾🤛🏾', label: 'Je compatis' },
    { id: 'pas_seul', emoji: '🫂', label: 'T\'es pas seul' },
    { id: 'courage', emoji: '🙌🏾', label: 'Courage' },
    { id: 'triste', emoji: '💔', label: 'Oh que c\'est triste' }
];

// Device ID
async function generateDeviceId() {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    ctx.textBaseline = 'top';
    ctx.font = '14px Arial';
    ctx.fillText('fp', 2, 2);
    
    const fp = {
        ua: navigator.userAgent,
        lang: navigator.language,
        screen: `${screen.width}x${screen.height}`,
        canvas: canvas.toDataURL().substring(0, 100)
    };
    
    let hash = 0;
    const str = JSON.stringify(fp);
    for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash = hash & hash;
    }
    
    return 'device_' + Math.abs(hash).toString(36);
}

// Auth
async function enterApp() {
    deviceId = await generateDeviceId();
    
    const r = await fetch('/api/auth/device', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ deviceId })
    });
    
    const data = await r.json();
    userId = data.userId;
    
    document.getElementById('auth-view').classList.add('hidden');
    document.getElementById('app-view').classList.remove('hidden');
    
    renderEmotions();
    loadConfidences();
    loadNotifications();
    setInterval(loadNotifications, 30000);
}

// Emotions
function renderEmotions() {
    const html = CHAPTERS.map(ch => `
        <button onclick="selectEmotion('${ch.id}')" data-id="${ch.id}" class="emotion-btn border-2 border-gray-300 text-sm rounded-full py-2 px-4 hover:border-blue-500">
            ${ch.emoji} ${ch.name}
        </button>
    `).join('');
    document.getElementById('emotions').innerHTML = html;
}

function selectEmotion(id) {
    emotion = id;
    document.querySelectorAll('.emotion-btn').forEach(btn => {
        btn.classList.toggle('border-blue-500', btn.dataset.id === id);
        btn.classList.toggle('border-gray-300', btn.dataset.id !== id);
    });
}

// Publish
async function publish() {
    const text = document.getElementById('text').value.trim();
    
    if (!text) return alert('Écrivez votre confidence');
    if (!emotion && !editingId) return alert('Choisissez une tonalité');
    
    const url = editingId ? `/api/confidences/${editingId}` : '/api/confidences';
    const method = editingId ? 'PUT' : 'POST';
    
    const r = await fetch(url, {
        method,
        headers: {
            'Content-Type': 'application/json',
            'X-User-Id': userId
        },
        body: JSON.stringify({ content: text, emotion })
    });
    
    const data = await r.json();
    
    if (data.success) {
        document.getElementById('text').value = '';
        emotion = null;
        editingId = null;
        hideModal('post-modal');
        loadConfidences();
    } else {
        alert(data.message);
    }
}

// Edit
function edit(id, content) {
    editingId = id;
    document.getElementById('text').value = content;
    document.getElementById('modal-title').textContent = 'Modifier';
    document.getElementById('submit-btn').textContent = 'Enregistrer';
    showModal('post-modal');
}

// Delete
async function del(id) {
    if (!confirm('Supprimer ?')) return;
    
    await fetch(`/api/confidences/${id}`, {
        method: 'DELETE',
        headers: { 'X-User-Id': userId }
    });
    
    loadConfidences();
}

// Load
async function loadConfidences() {
    const r = await fetch('/api/confidences');
    const data = await r.json();
    
    const html = data.data.map(c => {
        const ch = CHAPTERS.find(x => x.id === c.emotion) || CHAPTERS[0];
        const owner = c.user_id === userId;
        
        return `
            <div class="bg-surface rounded-xl shadow p-5 mb-4">
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-${ch.color}-100 flex items-center justify-center">
                            ${ch.emoji}
                        </div>
                        <div>
                            <p class="text-xs text-secondary">${ch.name}</p>
                        </div>
                    </div>
                    ${owner ? `<div class="flex gap-2">
                        <button onclick="edit('${c.id}', \`${c.content.replace(/`/g, '\\`')}\`)" class="text-xs text-blue-500">✏️ Modifier</button>
                        <button onclick="del('${c.id}')" class="text-xs text-red-500">🗑️</button>
                    </div>` : ''}
                </div>
                <p class="text-lg mb-4">${c.content}</p>
                <div class="flex flex-wrap gap-2 border-t border-theme pt-4">
                    ${REACTIONS.map(r => `
                        <button onclick="react('${c.id}', '${r.id}')" class="text-xs border border-theme rounded-full py-1 px-3 hover:border-blue-500">
                            ${r.emoji} ${c.reactions[r.id] || 0}
                        </button>
                    `).join('')}
                </div>
                <div class="mt-4 space-y-3">
                    ${c.responses.map(resp => `
                        <div class="flex gap-3">
                            <div class="text-2xl">${resp.avatar}</div>
                            <div class="flex-1 bg-gray-100 dark:bg-gray-800 rounded-xl p-3">
                                <p class="text-sm">${resp.content}</p>
                                <div class="flex gap-2 mt-2">
                                    <button onclick="reactResp('${resp.id}', 'soutien')" class="text-xs">🤝🏾 ${resp.reactions.soutien || 0}</button>
                                    <button onclick="reactResp('${resp.id}', 'espoir')" class="text-xs">🔥 ${resp.reactions.espoir || 0}</button>
                                    <button onclick="reactResp('${resp.id}', 'compatis')" class="text-xs">🤜🏾🤛🏾 ${resp.reactions.compatis || 0}</button>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                    <input id="resp-${c.id}" placeholder="Répondre..." class="w-full bg-gray-100 dark:bg-gray-800 rounded-full p-2 px-4 text-sm" onkeypress="if(event.key==='Enter') respond('${c.id}')">
                </div>
            </div>
        `;
    }).join('');
    
    document.getElementById('list').innerHTML = html || '<p class="text-center text-secondary py-12">Aucune confidence</p>';
}

// Reactions
async function react(confId, type) {
    await fetch('/api/reactions', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-User-Id': userId
        },
        body: JSON.stringify({ confidenceId: confId, reactionType: type })
    });
    loadConfidences();
}

async function reactResp(respId, type) {
    await fetch('/api/response-reactions', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-User-Id': userId
        },
        body: JSON.stringify({ responseId: respId, reactionType: type })
    });
    loadConfidences();
}

// Respond
async function respond(confId) {
    const input = document.getElementById(`resp-${confId}`);
    const text = input.value.trim();
    if (!text) return;
    
    await fetch('/api/responses', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-User-Id': userId
        },
        body: JSON.stringify({ confidenceId: confId, content: text })
    });
    
    input.value = '';
    loadConfidences();
}

// Notifications
async function loadNotifications() {
    const r = await fetch('/api/notifications', {
        headers: { 'X-User-Id': userId }
    });
    const data = await r.json();
    
    const unread = data.data.filter(n => !n.read).length;
    const badge = document.getElementById('badge');
    
    if (unread > 0) {
        badge.textContent = unread > 9 ? '9+' : unread;
        badge.classList.remove('hidden');
    } else {
        badge.classList.add('hidden');
    }
    
    const html = data.data.map(n => `
        <div onclick="markRead('${n.id}')" class="p-4 rounded-lg ${n.read ? 'bg-gray-100' : 'bg-blue-50'} mb-2 cursor-pointer">
            <p class="text-sm">${n.message}</p>
            <p class="text-xs text-gray-400 mt-1">${new Date(n.created_at).toLocaleDateString('fr-FR')}</p>
        </div>
    `).join('');
    
    document.getElementById('notif-list').innerHTML = html || '<p class="text-center text-secondary py-6">Aucune notification</p>';
}

async function markRead(id) {
    await fetch(`/api/notifications/${id}/read`, { method: 'PUT' });
    loadNotifications();
}

// Modals
function showModal(id) {
    document.getElementById(id).classList.remove('hidden');
}

function hideModal(id) {
    document.getElementById(id).classList.add('hidden');
    if (id === 'post-modal') {
        document.getElementById('text').value = '';
        editingId = null;
        emotion = null;
        document.getElementById('modal-title').textContent = 'Écrire une confidence';
        document.getElementById('submit-btn').textContent = 'Publier';
    }
}

// Dark mode
if (localStorage.getItem('theme') === 'dark') {
    document.documentElement.classList.add('dark');
}
</script>

</body>
</html>
