<!-- 
  AJOUTEZ CETTE SECTION dans index.html APRÈS le catalogue de webapps
  et AVANT le footer
-->

<!-- Collections Publiques Section -->
<section style="margin-top: 5rem;">
  <div class="container">
    <div class="section-header" style="text-align: center; margin-bottom: 3rem;">
      <h2 style="font-size: 2.5rem; margin-bottom: 1rem;">
        <i class="fa-solid fa-folder-open"></i> Public Collections
      </h2>
      <p style="color: var(--text-secondary); max-width: 600px; margin: 0 auto;">
        Discover curated collections created by the community
      </p>
    </div>

    <!-- Collections Grid -->
    <div class="collections-grid" id="public-collections-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; margin-bottom: 2rem;"></div>

    <!-- Empty State -->
    <div id="public-collections-empty" style="display: none; text-align: center; padding: 3rem; color: var(--text-secondary);">
      <i class="fa-solid fa-folder-open" style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.5;"></i>
      <p>No public collections yet</p>
    </div>
  </div>
</section>

<!-- AJOUTEZ CE CSS dans la balise <style> de index.html -->
<style>
.collection-card {
  background: var(--bg-card);
  border-radius: 12px;
  padding: 1.5rem;
  border: 1px solid rgba(0, 217, 255, 0.1);
  cursor: pointer;
  transition: all 0.3s;
}

.collection-card:hover {
  border-color: var(--accent-cyan);
  transform: translateY(-5px);
}

.collection-card h3 {
  margin-bottom: 0.5rem;
  color: var(--text-primary);
}

.collection-card .description {
  color: var(--text-secondary);
  font-size: 0.9rem;
  margin-bottom: 1rem;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.collection-card .meta {
  display: flex;
  justify-content: space-between;
  color: var(--text-secondary);
  font-size: 0.85rem;
}

.collection-card .creator {
  display: flex;
  align-items: center;
  gap: 0.3rem;
}
</style>

<!-- AJOUTEZ CE SCRIPT dans la balise <script> de index.html -->
<script>
// Charger collections publiques
async function loadPublicCollections() {
  try {
    const response = await fetch('/api/collections/public');
    const data = await response.json();
    
    if (data.success && data.collections.length > 0) {
      renderPublicCollections(data.collections);
    } else {
      document.getElementById('public-collections-grid').style.display = 'none';
      document.getElementById('public-collections-empty').style.display = 'block';
    }
  } catch (error) {
    console.error('Error loading public collections:', error);
  }
}

function renderPublicCollections(collections) {
  const grid = document.getElementById('public-collections-grid');
  
  grid.innerHTML = collections.map(col => `
    <div class="collection-card" onclick="window.location.href='/collection.html?id=${col.id}'">
      <h3>${col.name}</h3>
      <p class="description">${col.description || 'No description'}</p>
      <div class="meta">
        <span><i class="fa-solid fa-layer-group"></i> ${col.items_count} webapps</span>
        <span class="creator"><i class="fa-solid fa-user"></i> ${col.creator_name}</span>
      </div>
    </div>
  `).join('');
}

// Appeler au chargement de la page
document.addEventListener('DOMContentLoaded', () => {
  loadPublicCollections();
  // ... autres initialisations existantes
});
</script>
