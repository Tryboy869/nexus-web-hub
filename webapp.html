<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Webapp | Nexus Web Hub</title>
  <meta name="description" id="page-description">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-deep-space: #0a0e27;
      --bg-card: #1a1f3a;
      --text-primary: #E0E6ED;
      --text-secondary: #a0aec0;
      --accent-cyan: #00d9ff;
      --accent-purple: #8b5cf6;
      --accent-green: #10b981;
      --accent-gold: #fbbf24;
      --accent-red: #ef4444;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-deep-space);
      color: var(--text-primary);
      line-height: 1.6;
    }
    
    nav {
      background: rgba(26, 31, 58, 0.9);
      backdrop-filter: blur(10px);
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid rgba(0, 217, 255, 0.1);
    }
    
    nav .container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    nav .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--accent-cyan);
      text-decoration: none;
    }
    
    nav .back-btn {
      color: var(--text-secondary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    nav .back-btn:hover {
      color: var(--accent-cyan);
    }
    
    .container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 2rem;
    }
    
    .webapp-header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-bottom: 3rem;
    }
    
    .media-section {
      background: var(--bg-card);
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 16/9;
      position: relative;
      cursor: pointer;
    }
    
    .media-section img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .media-section .play-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.3);
      transition: background 0.3s;
    }
    
    .media-section:hover .play-overlay {
      background: rgba(0, 0, 0, 0.5);
    }
    
    .media-section .play-button {
      width: 80px;
      height: 80px;
      background: rgba(255, 0, 0, 0.9);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 2rem;
      transition: transform 0.3s;
    }
    
    .media-section:hover .play-button {
      transform: scale(1.1);
    }
    
    .info-section .badges {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    
    .badge {
      padding: 0.3rem 0.8rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    
    .badge svg {
      width: 16px;
      height: 16px;
    }
    
    .badge-trending {
      background: var(--accent-red);
      color: white;
    }
    
    .badge-new {
      background: var(--accent-green);
      color: white;
    }
    
    .badge-featured {
      background: var(--accent-gold);
      color: var(--bg-deep-space);
    }
    
    .info-section h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }
    
    .info-section .developer {
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }
    
    .info-section .category {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(0, 217, 255, 0.1);
      color: var(--accent-cyan);
      padding: 0.3rem 0.8rem;
      border-radius: 6px;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    
    .info-section .category svg {
      width: 20px;
      height: 20px;
    }
    
    .description {
      color: var(--text-secondary);
      margin-bottom: 1rem;
      line-height: 1.8;
    }
    
    .description.collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .see-more-btn {
      background: none;
      border: none;
      color: var(--accent-cyan);
      cursor: pointer;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    
    .tags {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    
    .tag {
      padding: 0.3rem 0.8rem;
      background: rgba(0, 217, 255, 0.1);
      border-radius: 4px;
      font-size: 0.85rem;
      color: var(--accent-cyan);
    }
    
    .actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    
    .btn {
      padding: 0.8rem 1.5rem;
      border-radius: 10px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s;
      cursor: pointer;
      border: none;
      font-size: 1rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      color: white;
    }
    
    .btn-secondary {
      background: transparent;
      border: 2px solid var(--accent-cyan);
      color: var(--accent-cyan);
    }
    
    .btn-danger {
      background: transparent;
      border: 2px solid var(--accent-red);
      color: var(--accent-red);
    }
    
    .btn:hover {
      transform: translateY(-2px);
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 3rem;
    }
    
    .stat-card {
      background: var(--bg-card);
      padding: 1.5rem;
      border-radius: 12px;
      text-align: center;
      border: 1px solid rgba(0, 217, 255, 0.1);
    }
    
    .stat-value {
      font-size: 2rem;
      font-weight: bold;
      color: var(--accent-cyan);
    }
    
    .stat-label {
      color: var(--text-secondary);
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    
    .versions-section {
      background: var(--bg-card);
      padding: 2rem;
      border-radius: 12px;
      margin-bottom: 3rem;
    }
    
    .versions-section h2 {
      margin-bottom: 1.5rem;
    }
    
    .version-item {
      padding: 1rem;
      background: rgba(0, 217, 255, 0.05);
      border-radius: 8px;
      margin-bottom: 1rem;
      border-left: 3px solid var(--accent-cyan);
    }
    
    .version-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }
    
    .version-number {
      font-weight: bold;
      color: var(--accent-cyan);
    }
    
    .version-date {
      color: var(--text-secondary);
      font-size: 0.85rem;
    }
    
    .version-changelog {
      color: var(--text-secondary);
      line-height: 1.6;
    }
    
    .reviews-section {
      background: var(--bg-card);
      padding: 2rem;
      border-radius: 12px;
      margin-bottom: 3rem;
    }
    
    .reviews-section h2 {
      margin-bottom: 2rem;
    }
    
    .review-form {
      background: rgba(0, 217, 255, 0.05);
      padding: 1.5rem;
      border-radius: 12px;
      margin-bottom: 2rem;
    }
    
    .review-form .rating-input {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    
    .review-form .rating-input .star {
      font-size: 2rem;
      cursor: pointer;
      color: var(--text-secondary);
    }
    
    .review-form .rating-input .star.active {
      color: var(--accent-gold);
    }
    
    .review-form textarea {
      width: 100%;
      padding: 1rem;
      background: var(--bg-deep-space);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: inherit;
      resize: vertical;
      min-height: 100px;
      margin-bottom: 1rem;
    }
    
    .review-item {
      padding: 1.5rem;
      background: rgba(0, 217, 255, 0.05);
      border-radius: 12px;
      margin-bottom: 1rem;
    }
    
    .review-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    
    .review-author {
      font-weight: 600;
    }
    
    .review-rating {
      color: var(--accent-gold);
    }
    
    .review-comment {
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }
    
    .review-actions {
      display: flex;
      gap: 1rem;
    }
    
    .vote-btn {
      background: transparent;
      border: 1px solid rgba(0, 217, 255, 0.2);
      color: var(--text-secondary);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.3s;
    }
    
    .vote-btn:hover {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }
    
    .loading {
      text-align: center;
      padding: 3rem;
    }
    
    .spinner {
      display: inline-block;
      width: 50px;
      height: 50px;
      border: 5px solid rgba(0, 217, 255, 0.1);
      border-top-color: var(--accent-cyan);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 2000;
      justify-content: center;
      align-items: center;
      overflow-y: auto;
    }
    
    .modal-content {
      background: var(--bg-card);
      padding: 2rem;
      border-radius: 16px;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
      margin: 2rem;
      border: 1px solid var(--accent-cyan);
    }
    
    .modal-content h3 {
      margin-bottom: 1rem;
      color: var(--accent-cyan);
    }
    
    .modal-content input,
    .modal-content textarea {
      width: 100%;
      padding: 1rem;
      background: var(--bg-deep-space);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: inherit;
      margin-bottom: 1rem;
    }
    
    .modal-content .buttons {
      display: flex;
      gap: 1rem;
    }
    
    .collection-list {
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: 1rem;
    }
    
    .collection-item {
      padding: 1rem;
      background: rgba(0, 217, 255, 0.05);
      border-radius: 8px;
      margin-bottom: 0.5rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .collection-item:hover {
      background: rgba(0, 217, 255, 0.1);
      border-left: 3px solid var(--accent-cyan);
    }
    
    .collection-item.selected {
      background: rgba(0, 217, 255, 0.15);
      border-left: 3px solid var(--accent-cyan);
    }
    
    @media (max-width: 768px) {
      .webapp-header {
        grid-template-columns: 1fr;
      }
      
      .info-section h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <nav>
    <div class="container">
      <a href="/" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i> Back to catalog
      </a>
      
      <a href="/" class="logo">
        <span>NWH</span>
      </a>
    </div>
  </nav>
  
  <div class="loading" id="loading">
    <div class="spinner"></div>
  </div>
  
  <div class="container" id="content" style="display: none;">
    <div class="webapp-header">
      <div class="media-section" id="media"></div>
      
      <div class="info-section">
        <div class="badges" id="badges"></div>
        <h1 id="webapp-name"></h1>
        <p class="developer" id="developer"></p>
        <span class="category" id="category"></span>
        
        <div class="description collapsed" id="description"></div>
        <button class="see-more-btn" id="see-more-btn" onclick="toggleDescription()">See more</button>
        
        <div class="tags" id="tags"></div>
        
        <div class="actions">
          <button class="btn btn-primary" onclick="openWebapp()">
            <i class="fa-solid fa-rocket"></i> Open Webapp
          </button>
          <button class="btn btn-secondary" onclick="showCollectionModal()" id="add-to-collection-btn" style="display: none;">
            <i class="fa-solid fa-folder-plus"></i> Add to Collection
          </button>
          <a class="btn btn-secondary" id="github-link" style="display: none;" target="_blank">
            <i class="fa-brands fa-github"></i> Source Code
          </a>
          <button class="btn btn-danger" onclick="showReportModal()">
            <i class="fa-solid fa-flag"></i> Report
          </button>
        </div>
      </div>
    </div>
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="views">0</div>
        <div class="stat-label">
          <i class="fa-solid fa-eye"></i> Unique views
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="clicks">0</div>
        <div class="stat-label">
          <i class="fa-solid fa-mouse-pointer"></i> Clicks
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="rating">0.0</div>
        <div class="stat-label">
          <i class="fa-solid fa-star"></i> Average rating
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="reviews-count">0</div>
        <div class="stat-label">
          <i class="fa-solid fa-comment"></i> Reviews
        </div>
      </div>
    </div>
    
    <div class="versions-section" id="versions-section" style="display: none;">
      <h2><i class="fa-solid fa-code-branch"></i> Version History</h2>
      <div id="versions-list"></div>
    </div>
    
    <div class="reviews-section">
      <h2>Reviews</h2>
      
      <div class="review-form" id="review-form">
        <h3>Your review</h3>
        <div class="rating-input" id="rating-input"></div>
        <textarea id="comment" placeholder="Share your experience..."></textarea>
        <button class="btn btn-primary" onclick="submitReview()">Post review</button>
      </div>
      
      <div id="login-required" style="display: none; text-align: center; padding: 2rem;">
        <p style="margin-bottom: 1rem;">Login to leave a review</p>
        <a href="/auth.html" class="btn btn-primary">Login</a>
      </div>
      
      <div id="reviews-list"></div>
    </div>
  </div>
  
  <!-- Collection Modal -->
  <div class="modal" id="collection-modal">
    <div class="modal-content">
      <h3><i class="fa-solid fa-folder-plus"></i> Add to Collection</h3>
      <div class="collection-list" id="collection-list"></div>
      <div class="buttons">
        <button class="btn btn-secondary" onclick="closeCollectionModal()">Cancel</button>
        <button class="btn btn-primary" onclick="createNewCollection()">
          <i class="fa-solid fa-plus"></i> New Collection
        </button>
      </div>
    </div>
  </div>
  
  <!-- Report Modal -->
  <div class="modal" id="report-modal">
    <div class="modal-content">
      <h3>Report an issue</h3>
      <textarea id="report-reason" placeholder="Describe the problem..." rows="5"></textarea>
      <div class="buttons">
        <button class="btn btn-secondary" onclick="closeReportModal()">Cancel</button>
        <button class="btn btn-primary" onclick="submitReport()">Send report</button>
      </div>
    </div>
  </div>
  
  <script>
    let webapp = null;
    let reviews = [];
    let versions = [];
    let collections = [];
    let selectedRating = 0;
    const webappId = new URLSearchParams(window.location.search).get('id');
    const userId = localStorage.getItem('userId');
    
    // SVG Icons inline
    const categoryIcons = {
      productivity: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/></svg>',
      design: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.53 19.65l1.34.56v-9.03l-2.43 5.86c-.41 1.02.08 2.19 1.09 2.61zm19.5-3.7L17.07 3.98c-.31-.75-1.04-1.21-1.81-1.23-.26 0-.53.04-.79.15L7.1 5.95c-.75.31-1.21 1.03-1.23 1.8-.01.27.04.54.15.8l4.96 11.97c.31.76 1.05 1.22 1.83 1.23.26 0 .52-.05.77-.15l7.36-3.05c1.02-.42 1.51-1.59 1.09-2.6zM7.88 8.75c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-2 11c0 1.1.9 2 2 2h1.45l-3.45-8.34v6.34z"/></svg>',
      games: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.58 16.09l-1.09-7.66C20.21 6.46 18.52 5 16.53 5H7.47C5.48 5 3.79 6.46 3.51 8.43l-1.09 7.66C2.2 17.63 3.39 19 4.94 19c.68 0 1.32-.27 1.8-.75L9 16h6l2.25 2.25c.48.48 1.13.75 1.8.75 1.56 0 2.75-1.37 2.53-2.91zM11 11H9v2H8v-2H6v-1h2V8h1v2h2v1zm4-1c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm2 3c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z"/></svg>',
      api: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 8h-2.81c-.45-.78-1.07-1.45-1.82-1.96L17 4.41 15.59 3l-2.17 2.17C12.96 5.06 12.49 5 12 5c-.49 0-.96.06-1.41.17L8.41 3 7 4.41l1.62 1.63C7.88 6.55 7.26 7.22 6.81 8H4v2h2.09c-.05.33-.09.66-.09 1v1H4v2h2v1c0 .34.04.67.09 1H4v2h2.81c1.04 1.79 2.97 3 5.19 3s4.15-1.21 5.19-3H20v-2h-2.09c.05-.33.09-.66.09-1v-1h2v-2h-2v-1c0-.34-.04-.67-.09-1H20V8zm-6 8h-4v-2h4v2zm0-4h-4v-2h4v2z"/></svg>',
      nocode: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>',
      other: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>'
    };
    
    function extractYouTubeId(url) {
      if (!url) return null;
      const patterns = [
        /(?:youtube\.com\/watch\?v=)([a-zA-Z0-9_-]{11})/,
        /(?:youtu\.be\/)([a-zA-Z0-9_-]{11})/,
        /(?:youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/,
        /(?:youtube\.com\/v\/)([a-zA-Z0-9_-]{11})/
      ];
      for (const pattern of patterns) {
        const match = url.match(pattern);
        if (match && match[1]) return match[1];
      }
      return null;
    }
    
    async function loadWebapp() {
      try {
        const headers = {};
        if (userId) headers['X-User-Id'] = userId;
        
        const response = await fetch(`/api/webapps/${webappId}`, { headers });
        const data = await response.json();
        
        webapp = data.webapp;
        reviews = data.reviews;
        
        renderWebapp();
        renderReviews();
        await loadVersions();
        
        if (userId) {
          document.getElementById('add-to-collection-btn').style.display = 'inline-flex';
          await loadCollections();
        }
        
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
      } catch (error) {
        console.error('Error loading webapp:', error);
      }
    }
    
    async function loadVersions() {
      try {
        const response = await fetch(`/api/webapps/${webappId}/versions`);
        const data = await response.json();
        
        if (data.success && data.versions.length > 0) {
          versions = data.versions;
          renderVersions();
          document.getElementById('versions-section').style.display = 'block';
        }
      } catch (error) {
        console.error('Error loading versions:', error);
      }
    }
    
    function renderVersions() {
      const versionsHTML = versions.map(v => `
        <div class="version-item">
          <div class="version-header">
            <span class="version-number">v${v.version}</span>
            <span class="version-date">${new Date(v.created_at).toLocaleDateString()}</span>
          </div>
          <div class="version-changelog">${v.changelog}</div>
        </div>
      `).join('');
      
      document.getElementById('versions-list').innerHTML = versionsHTML;
    }
    
    function renderWebapp() {
      document.getElementById('page-title').textContent = `${webapp.name} | Nexus Web Hub`;
      document.getElementById('page-description').content = webapp.description_short;
      
      // Media
      if (webapp.video_url) {
        const videoId = extractYouTubeId(webapp.video_url);
        if (videoId) {
          const thumbnailUrl = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
          document.getElementById('media').innerHTML = `
            <img src="${thumbnailUrl}" alt="${webapp.name} video">
            <div class="play-overlay" onclick="openYouTubeVideo('${videoId}')">
              <div class="play-button">
                <i class="fa-brands fa-youtube"></i>
              </div>
            </div>
          `;
        } else {
          document.getElementById('media').innerHTML = '<div style="display: flex; align-items: center; justify-content: center; height: 100%; background: rgba(0, 217, 255, 0.1);"><p style="color: var(--text-secondary);">Invalid video URL</p></div>';
        }
      } else if (webapp.image_url) {
        document.getElementById('media').innerHTML = `<img src="${webapp.image_url}" alt="${webapp.name}">`;
      } else {
        document.getElementById('media').innerHTML = '<div style="display: flex; align-items: center; justify-content: center; height: 100%; background: rgba(0, 217, 255, 0.1);"><i class="fa-solid fa-image" style="font-size: 4rem; color: var(--text-secondary);"></i></div>';
      }
      
      // Badges avec SVG inline
      let badgesHTML = '';
      if (webapp.is_trending) badgesHTML += '<span class="badge badge-trending"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M13.5.67s.74 2.65.74 4.8c0 2.06-1.35 3.73-3.41 3.73-2.07 0-3.63-1.67-3.63-3.73l.03-.36C5.21 7.51 4 10.62 4 14c0 4.42 3.58 8 8 8s8-3.58 8-8C20 8.61 17.41 3.8 13.5.67zM11.71 19c-1.78 0-3.22-1.4-3.22-3.14 0-1.62 1.05-2.76 2.81-3.12 1.77-.36 3.6-1.21 4.62-2.58.39 1.29.59 2.65.59 4.04 0 2.65-2.15 4.8-4.8 4.8z"/></svg> Trending</span>';
      if (webapp.is_featured) badgesHTML += '<span class="badge badge-featured"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg> Featured</span>';
      if (webapp.is_new) badgesHTML += '<span class="badge badge-new"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg> New</span>';
      document.getElementById('badges').innerHTML = badgesHTML;
      
      // Category avec icon
      const categoryIcon = categoryIcons[webapp.category] || categoryIcons.other;
      document.getElementById('category').innerHTML = `${categoryIcon} ${webapp.category}`;
      
      document.getElementById('webapp-name').textContent = webapp.name;
      document.getElementById('developer').textContent = `by ${webapp.developer}`;
      
      const longDesc = webapp.description_long || webapp.description_short;
      document.getElementById('description').textContent = longDesc;
      
      if (longDesc.length <= 200) {
        document.getElementById('see-more-btn').style.display = 'none';
        document.getElementById('description').classList.remove('collapsed');
      }
      
      document.getElementById('tags').innerHTML = webapp.tags.map(tag => 
        `<span class="tag">${tag}</span>`
      ).join('');
      
      if (webapp.github_url) {
        document.getElementById('github-link').href = webapp.github_url;
        document.getElementById('github-link').style.display = 'inline-flex';
      }
      
      document.getElementById('views').textContent = webapp.views_count;
      document.getElementById('clicks').textContent = webapp.clicks_count;
      document.getElementById('rating').textContent = webapp.avg_rating.toFixed(1);
      document.getElementById('reviews-count').textContent = webapp.reviews_count;
    }
    
    function openYouTubeVideo(videoId) {
      window.open(`https://www.youtube.com/watch?v=${videoId}`, '_blank');
    }
    
    function toggleDescription() {
      const desc = document.getElementById('description');
      const btn = document.getElementById('see-more-btn');
      
      if (desc.classList.contains('collapsed')) {
        desc.classList.remove('collapsed');
        btn.textContent = 'See less';
      } else {
        desc.classList.add('collapsed');
        btn.textContent = 'See more';
      }
    }
    
    function openWebapp() {
      window.open(`/redirect.html?id=${webappId}&url=${encodeURIComponent(webapp.url)}&source=detail`, '_blank');
    }
    
    // Collections
    async function loadCollections() {
      try {
        const response = await fetch('/api/collections', {
          headers: { 'X-User-Id': userId }
        });
        const data = await response.json();
        
        if (data.success) {
          collections = data.collections;
        }
      } catch (error) {
        console.error('Error loading collections:', error);
      }
    }
    
    function showCollectionModal() {
      if (!userId) {
        window.location.href = '/auth.html';
        return;
      }
      
      const listHTML = collections.map(col => `
        <div class="collection-item" onclick="addToCollection('${col.id}')">
          <div>
            <strong>${col.name}</strong>
            <div style="font-size: 0.85rem; color: var(--text-secondary);">${col.items_count} items</div>
          </div>
          <i class="fa-solid fa-plus"></i>
        </div>
      `).join('');
      
      document.getElementById('collection-list').innerHTML = listHTML || '<p style="text-align: center; color: var(--text-secondary); padding: 2rem;">No collections yet</p>';
      document.getElementById('collection-modal').style.display = 'flex';
    }
    
    function closeCollectionModal() {
      document.getElementById('collection-modal').style.display = 'none';
    }
    
    async function addToCollection(collectionId) {
      try {
        const response = await fetch(`/api/collections/${collectionId}/add`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-User-Id': userId
          },
          body: JSON.stringify({ webapp_id: webappId })
        });
        
        const data = await response.json();
        
        if (data.success) {
          alert('Added to collection!');
          closeCollectionModal();
        } else {
          alert(data.message);
        }
      } catch (error) {
        console.error('Error adding to collection:', error);
        alert('Error adding to collection');
      }
    }
    
    function createNewCollection() {
      closeCollectionModal();
      window.location.href = '/profile.html?tab=collections&create=true';
    }
    
    // Reviews
    function renderReviews() {
      if (!userId) {
        document.getElementById('review-form').style.display = 'none';
        document.getElementById('login-required').style.display = 'block';
      } else {
        renderRatingInput();
      }
      
      const reviewsHTML = reviews.map(review => `
        <div class="review-item">
          <div class="review-header">
            <span class="review-author">${review.user_name}</span>
            <span class="review-rating">${'⭐'.repeat(review.rating)}</span>
          </div>
          <p class="review-comment">${review.comment || ''}</p>
          <div class="review-actions">
            <button class="vote-btn" onclick="voteReview('${review.id}', 'helpful')">
              <i class="fa-solid fa-thumbs-up"></i> Helpful (${review.helpful_count})
            </button>
            <button class="vote-btn" onclick="voteReview('${review.id}', 'not_helpful')">
              <i class="fa-solid fa-thumbs-down"></i> Not helpful (${review.not_helpful_count})
            </button>
          </div>
        </div>
      `).join('');
      
      document.getElementById('reviews-list').innerHTML = reviewsHTML || '<p style="text-align: center; color: var(--text-secondary);">No reviews yet</p>';
    }
    
    function renderRatingInput() {
      const ratingInput = document.getElementById('rating-input');
      ratingInput.innerHTML = '';
      
      for (let i = 1; i <= 5; i++) {
        const star = document.createElement('span');
        star.className = 'star';
        star.innerHTML = '★';
        star.onclick = () => selectRating(i);
        ratingInput.appendChild(star);
      }
    }
    
    function selectRating(rating) {
      selectedRating = rating;
      const stars = document.querySelectorAll('.rating-input .star');
      stars.forEach((star, index) => {
        if (index < rating) {
          star.classList.add('active');
        } else {
          star.classList.remove('active');
        }
      });
    }
    
    async function submitReview() {
      if (!userId) {
        window.location.href = '/auth.html';
        return;
      }
      
      if (selectedRating === 0) {
        alert('Please select a rating');
        return;
      }
      
      const comment = document.getElementById('comment').value;
      
      try {
        const response = await fetch(`/api/webapps/${webappId}/reviews`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-User-Id': userId
          },
          body: JSON.stringify({
            rating: selectedRating,
            comment
          })
        });
        
        const data = await response.json();
        
        if (data.success) {
          alert('Review posted!');
          location.reload();
        } else {
          alert(data.message);
        }
      } catch (error) {
        console.error('Error submitting review:', error);
        alert('Error submitting review');
      }
    }
    
    async function voteReview(reviewId, voteType) {
      if (!userId) {
        window.location.href = '/auth.html';
        return;
      }
      
      try {
        const response = await fetch(`/api/reviews/${reviewId}/vote`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-User-Id': userId
          },
          body: JSON.stringify({ vote_type: voteType })
        });
        
        const data = await response.json();
        
        if (data.success) {
          location.reload();
        }
      } catch (error) {
        console.error('Error voting review:', error);
      }
    }
    
    // Report
    function showReportModal() {
      if (!userId) {
        window.location.href = '/auth.html';
        return;
      }
      document.getElementById('report-modal').style.display = 'flex';
    }
    
    function closeReportModal() {
      document.getElementById('report-modal').style.display = 'none';
    }
    
    async function submitReport() {
      const reason = document.getElementById('report-reason').value;
      
      if (!reason) {
        alert('Please describe the problem');
        return;
      }
      
      try {
        const response = await fetch('/api/reports', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-User-Id': userId
          },
          body: JSON.stringify({
            target_type: 'webapp',
            target_id: webappId,
            reason
          })
        });
        
        const data = await response.json();
        
        if (data.success) {
          alert('Report sent. Thank you!');
          closeReportModal();
        } else {
          alert(data.message);
        }
      } catch (error) {
        console.error('Error submitting report:', error);
        alert('Error submitting report');
      }
    }
    
    document.addEventListener('DOMContentLoaded', () => {
      if (!webappId) {
        window.location.href = '/';
        return;
      }
      loadWebapp();
    });
  </script>
</body>
</html>
