<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webapp - Nexus Web Hub</title>
  <link rel="icon" href="assets/logos/logo-nwh.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep-space: #0a0e27;
      --bg-card: #1a1f3a;
      --text-primary: #E0E6ED;
      --text-secondary: #a0aec0;
      --accent-cyan: #00d9ff;
      --accent-purple: #8b5cf6;
      --accent-green: #10b981;
      --accent-gold: #fbbf24;
      --accent-red: #ef4444;
      --border-glow: rgba(0, 217, 255, 0.15);
      --font-body: 'Inter', sans-serif;
      --font-heading: 'Space Grotesk', sans-serif;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg-deep-space: #f5f7fa;
        --bg-card: #ffffff;
        --text-primary: #1a202c;
        --text-secondary: #4a5568;
        --border-glow: rgba(0, 0, 0, 0.1);
      }
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-deep-space);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    /* HEADER */
    header {
      background: rgba(26, 31, 58, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-glow);
      padding: 1rem 2rem;
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .back-link {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-secondary);
      font-size: 0.9rem;
      transition: color 0.3s;
    }

    .back-link:hover { color: var(--accent-cyan); }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-heading);
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent-cyan);
    }

    .logo img { width: 32px; height: 32px; }

    /* MAIN CONTENT */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* LOADING */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      gap: 1rem;
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border-glow);
      border-top-color: var(--accent-cyan);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* WEBAPP HEADER */
    .webapp-header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      margin-bottom: 3rem;
    }

    @media (max-width: 900px) {
      .webapp-header { grid-template-columns: 1fr; }
    }

    .webapp-media {
      background: var(--bg-card);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border-glow);
    }

    .webapp-screenshot {
      width: 100%;
      aspect-ratio: 16/10;
      object-fit: cover;
      display: block;
    }

    .webapp-video {
      width: 100%;
      aspect-ratio: 16/9;
      border: none;
    }

    .media-fallback {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 300px;
      gap: 1rem;
      background: var(--bg-card);
    }

    .media-fallback img {
      width: 80px;
      opacity: 0.5;
    }

    .media-fallback p {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .webapp-info h1 {
      font-family: var(--font-heading);
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .webapp-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .webapp-badges {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .badge-icon { width: 32px; height: 32px; }

    .webapp-rating {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
    }

    .stars { color: var(--accent-gold); font-size: 1.4rem; }
    .rating-value { font-weight: 700; font-size: 1.5rem; }

    .webapp-description {
      color: var(--text-secondary);
      font-size: 1rem;
      line-height: 1.8;
      margin-bottom: 1.5rem;
    }

    .webapp-description.collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .show-more-btn {
      background: none;
      border: none;
      color: var(--accent-cyan);
      cursor: pointer;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    .webapp-tags {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .tag {
      padding: 0.4rem 1rem;
      background: rgba(0, 217, 255, 0.1);
      border-radius: 20px;
      font-size: 0.85rem;
      color: var(--accent-cyan);
    }

    .webapp-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.9rem 2rem;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: var(--font-body);
      font-size: 1rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      color: #fff;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 217, 255, 0.4);
    }

    .btn-secondary {
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border-glow);
    }

    .btn-secondary:hover {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }

    .btn-small {
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
    }

    /* STATS BAR */
    .stats-bar {
      display: flex;
      gap: 2rem;
      padding: 1.5rem 2rem;
      background: var(--bg-card);
      border-radius: 12px;
      margin-bottom: 3rem;
      border: 1px solid var(--border-glow);
      flex-wrap: wrap;
    }

    .stat-item { text-align: center; }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent-cyan);
    }

    .stat-label {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    /* REVIEWS SECTION */
    .reviews-section {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 2rem;
      border: 1px solid var(--border-glow);
    }

    .reviews-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .reviews-header h2 {
      font-family: var(--font-heading);
      font-size: 1.5rem;
    }

    /* RATING FORM */
    .rating-form {
      background: var(--bg-deep-space);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .rating-form h3 {
      margin-bottom: 1rem;
      font-size: 1.1rem;
    }

    .star-selector {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .star-btn {
      background: none;
      border: none;
      font-size: 2rem;
      cursor: pointer;
      transition: transform 0.2s;
      color: var(--text-secondary);
    }

    .star-btn:hover { transform: scale(1.2); }
    .star-btn.active { color: var(--accent-gold); }

    .rating-form textarea {
      width: 100%;
      padding: 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border-glow);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.95rem;
      min-height: 100px;
      resize: vertical;
      margin-bottom: 1rem;
    }

    .rating-form textarea:focus {
      outline: none;
      border-color: var(--accent-cyan);
    }

    /* REVIEWS LIST */
    .reviews-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .review-card {
      background: var(--bg-deep-space);
      border-radius: 12px;
      padding: 1.25rem;
    }

    .review-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .review-user { font-weight: 600; }
    .review-stars { color: var(--accent-gold); }

    .review-comment {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .review-date {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 0.5rem;
    }

    /* LOGIN PROMPT */
    .login-prompt {
      text-align: center;
      padding: 2rem;
      background: var(--bg-deep-space);
      border-radius: 12px;
    }

    .login-prompt p {
      margin-bottom: 1rem;
      color: var(--text-secondary);
    }

    /* NOTIFICATIONS */
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes slideOut {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(100%); opacity: 0; }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-content">
      <a href="/" class="back-link">← Retour au catalogue</a>
      <a href="/" class="logo">
        <img src="assets/logos/logo-nwh.svg" alt="NWH">
        Nexus Web Hub
      </a>
    </div>
  </header>

  <!-- MAIN -->
  <main>
    <div id="loadingState" class="loading">
      <div class="loading-spinner"></div>
      <p>Chargement...</p>
    </div>

    <div id="webappContent" class="hidden">
      <!-- HEADER -->
      <div class="webapp-header">
        <div class="webapp-media" id="mediaContainer"></div>

        <div class="webapp-info">
          <div class="webapp-badges" id="webappBadges"></div>
          <h1 id="webappName"></h1>
          <div class="webapp-meta">
            <span>par <strong id="webappDeveloper"></strong></span>
            <span>•</span>
            <span id="webappCategory"></span>
          </div>

          <div class="webapp-rating">
            <span class="stars" id="webappStars"></span>
            <span class="rating-value" id="webappRating"></span>
            <span style="color:var(--text-secondary)" id="webappReviewCount"></span>
          </div>

          <div class="webapp-description collapsed" id="webappDescription"></div>
          <button class="show-more-btn" id="showMoreBtn" onclick="toggleDescription()">Voir plus ↓</button>

          <div class="webapp-tags" id="webappTags"></div>

          <div class="webapp-actions">
            <button class="btn btn-primary" id="openBtn" onclick="openWebapp()">🚀 Ouvrir la Webapp</button>
            <a class="btn btn-secondary hidden" id="githubBtn" target="_blank" rel="noopener">📂 Code Source</a>
          </div>
        </div>
      </div>

      <!-- STATS BAR -->
      <div class="stats-bar">
        <div class="stat-item">
          <div class="stat-value" id="statViews">0</div>
          <div class="stat-label">Vues</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="statRating">0</div>
          <div class="stat-label">Note moyenne</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="statReviewsCount">0</div>
          <div class="stat-label">Avis</div>
        </div>
      </div>

      <!-- REVIEWS -->
      <div class="reviews-section">
        <div class="reviews-header">
          <h2>Avis de la communauté</h2>
        </div>

        <!-- Rating Form (if logged in) -->
        <div id="ratingForm" class="rating-form hidden">
          <h3>Donnez votre avis</h3>
          <div class="star-selector">
            <button class="star-btn" data-rating="1" onclick="selectRating(1)">☆</button>
            <button class="star-btn" data-rating="2" onclick="selectRating(2)">☆</button>
            <button class="star-btn" data-rating="3" onclick="selectRating(3)">☆</button>
            <button class="star-btn" data-rating="4" onclick="selectRating(4)">☆</button>
            <button class="star-btn" data-rating="5" onclick="selectRating(5)">☆</button>
          </div>
          <textarea id="reviewComment" placeholder="Votre commentaire (optionnel)..."></textarea>
          <button class="btn btn-primary" onclick="submitReview()">Publier mon avis</button>
        </div>

        <!-- Login Prompt (if not logged in) -->
        <div id="loginPrompt" class="login-prompt hidden">
          <p>Connectez-vous pour donner votre avis</p>
          <a href="auth.html" class="btn btn-primary">Se connecter</a>
        </div>

        <!-- Reviews List -->
        <div class="reviews-list" id="reviewsList"></div>
      </div>
    </div>
  </main>

  <script>
    let webapp = null;
    let reviews = [];
    let currentUser = null;
    let selectedRating = 0;

    // Get webapp ID from URL
    const urlParams = new URLSearchParams(window.location.search);
    const webappId = urlParams.get('id');

    document.addEventListener('DOMContentLoaded', () => {
      checkAuth();
      if (webappId) {
        loadWebapp();
      } else {
        window.location.href = '/';
      }
    });

    function checkAuth() {
      const token = localStorage.getItem('token');
      const userData = localStorage.getItem('user');
      if (token && userData) {
        try {
          currentUser = JSON.parse(userData);
        } catch (e) {
          localStorage.removeItem('token');
          localStorage.removeItem('user');
        }
      }
    }

    async function loadWebapp() {
      try {
        const token = localStorage.getItem('token');
        const headers = token ? { 'Authorization': `Bearer ${token}` } : {};

        const res = await fetch(`/api/webapps/${webappId}`, { headers });
        const data = await res.json();

        if (data.success) {
          webapp = data.data.webapp;
          reviews = data.data.reviews || [];
          renderWebapp();
          document.getElementById('loadingState').classList.add('hidden');
          document.getElementById('webappContent').classList.remove('hidden');
        } else {
          showNotification('Webapp non trouvée', 'error');
          setTimeout(() => window.location.href = '/', 2000);
        }
      } catch (e) {
        console.error(e);
        showNotification('Erreur de chargement', 'error');
        setTimeout(() => window.location.href = '/', 2000);
      }
    }

    function renderWebapp() {
      document.title = `${webapp.name} - Nexus Web Hub`;

      // Badges
      let badges = '';
      if (webapp.is_trending) badges += `<img src="assets/badges/system/badge-trending.svg" class="badge-icon" alt="Trending">`;
      if (webapp.is_featured) badges += `<img src="assets/badges/system/badge-featured.svg" class="badge-icon" alt="Featured">`;
      if (webapp.is_new) badges += `<img src="assets/badges/system/badge-new.svg" class="badge-icon" alt="New">`;
      document.getElementById('webappBadges').innerHTML = badges;

      // Basic info
      document.getElementById('webappName').textContent = webapp.name;
      document.getElementById('webappDeveloper').textContent = webapp.developer;
      document.getElementById('webappCategory').textContent = getCategoryName(webapp.category);

      // Rating
      document.getElementById('webappStars').textContent = renderStars(webapp.avg_rating || 0);
      document.getElementById('webappRating').textContent = (webapp.avg_rating || 0).toFixed(1);
      document.getElementById('webappReviewCount').textContent = `(${webapp.reviews_count || 0} avis)`;

      // Description
      document.getElementById('webappDescription').textContent = webapp.description_long || webapp.description_short || 'Aucune description';

      // Tags
      let tags = [];
      try {
        tags = typeof webapp.tags === 'string' ? JSON.parse(webapp.tags) : (webapp.tags || []);
      } catch (e) {
        tags = [];
      }
      document.getElementById('webappTags').innerHTML = tags.map(t => `<span class="tag">${t}</span>`).join('');

      // Media (Video or Screenshot)
      renderMedia();

      // GitHub button
      if (webapp.github_url) {
        const ghBtn = document.getElementById('githubBtn');
        ghBtn.href = webapp.github_url;
        ghBtn.classList.remove('hidden');
      }

      // Stats
      document.getElementById('statViews').textContent = webapp.views_count || 0;
      document.getElementById('statRating').textContent = (webapp.avg_rating || 0).toFixed(1);
      document.getElementById('statReviewsCount').textContent = webapp.reviews_count || 0;

      // Reviews section
      if (currentUser) {
        document.getElementById('ratingForm').classList.remove('hidden');
        document.getElementById('loginPrompt').classList.add('hidden');
      } else {
        document.getElementById('ratingForm').classList.add('hidden');
        document.getElementById('loginPrompt').classList.remove('hidden');
      }

      renderReviews();
    }

    // ============================================
    // MEDIA RENDERING (FIXED)
    // ============================================
    function renderMedia() {
      const media = document.getElementById('mediaContainer');

      if (webapp.video_url) {
        const videoId = extractYouTubeId(webapp.video_url);

        if (videoId) {
          media.innerHTML = `
            <iframe 
              class="webapp-video" 
              src="https://www.youtube-nocookie.com/embed/${videoId}?rel=0&modestbranding=1"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen
              loading="lazy"
            ></iframe>
          `;
        } else {
          showVideoFallback('URL vidéo invalide');
        }
      } else if (webapp.image_url) {
        media.innerHTML = `<img src="${webapp.image_url}" class="webapp-screenshot" alt="${webapp.name}" onerror="this.onerror=null;this.src='assets/logos/logo-nwh.svg';this.style.objectFit='contain';this.style.padding='2rem';">`;
      } else {
        showVideoFallback('Aucun média disponible');
      }
    }

    function showVideoFallback(message) {
      const media = document.getElementById('mediaContainer');
      media.innerHTML = `
        <div class="media-fallback">
          <img src="assets/logos/logo-nwh.svg" alt="NWH">
          <p>${message}</p>
          ${webapp.video_url ? `<a href="${webapp.video_url}" target="_blank" rel="noopener" class="btn btn-secondary btn-small">▶ Voir sur YouTube</a>` : ''}
        </div>
      `;
    }

    // ============================================
    // YOUTUBE ID EXTRACTION (FIXED)
    // ============================================
    function extractYouTubeId(url) {
      if (!url) return null;

      url = url.trim();

      const patterns = [
        /(?:youtube\.com\/watch\?v=)([a-zA-Z0-9_-]{11})/,
        /(?:youtu\.be\/)([a-zA-Z0-9_-]{11})/,
        /(?:youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/,
        /(?:youtube\.com\/v\/)([a-zA-Z0-9_-]{11})/,
        /(?:youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/,
        /^([a-zA-Z0-9_-]{11})$/
      ];

      for (const pattern of patterns) {
        const match = url.match(pattern);
        if (match && match[1]) {
          return match[1];
        }
      }

      return null;
    }

    // ============================================
    // WEBAPP OPENING (WITH REDIRECT PAGE)
    // ============================================
    function openWebapp() {
      if (!webapp.url) {
        showNotification('URL non disponible', 'error');
        return;
      }

      // Rediriger vers la page de redirection avec l'URL en paramètre
      const encodedUrl = encodeURIComponent(webapp.url);
      window.location.href = `redirect.html?url=${encodedUrl}`;
    }

    // ============================================
    // NOTIFICATIONS
    // ============================================
    function showNotification(message, type = 'info') {
      const existing = document.querySelector('.nwh-notification');
      if (existing) existing.remove();

      const colors = {
        success: 'var(--accent-green)',
        error: 'var(--accent-red)',
        warning: 'var(--accent-gold)',
        info: 'var(--accent-cyan)'
      };

      const notification = document.createElement('div');
      notification.className = 'nwh-notification';
      notification.style.cssText = `
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        padding: 1rem 1.5rem;
        background: var(--bg-card);
        border-left: 4px solid ${colors[type]};
        border-radius: 8px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        z-index: 9999;
        animation: slideIn 0.3s ease;
        max-width: 300px;
      `;
      notification.textContent = message;

      document.body.appendChild(notification);

      setTimeout(() => {
        notification.style.animation = 'slideOut 0.3s ease';
        setTimeout(() => notification.remove(), 300);
      }, 4000);
    }

    // ============================================
    // HELPERS
    // ============================================
    function renderStars(r) {
      const full = Math.floor(r || 0);
      return '⭐'.repeat(full) + '☆'.repeat(5 - full);
    }

    function getCategoryName(cat) {
      const names = {
        productivity: '⚡ Productivité',
        design: '🎨 Design',
        game: '🎮 Jeux',
        api: '🔧 API',
        nocode: '🚀 No-Code',
        other: '📦 Autre'
      };
      return names[cat] || cat || '📦 Autre';
    }

    function toggleDescription() {
      const desc = document.getElementById('webappDescription');
      const btn = document.getElementById('showMoreBtn');
      desc.classList.toggle('collapsed');
      btn.textContent = desc.classList.contains('collapsed') ? 'Voir plus ↓' : 'Voir moins ↑';
    }

    // ============================================
    // REVIEWS
    // ============================================
    function renderReviews() {
      const list = document.getElementById('reviewsList');
      if (reviews.length === 0) {
        list.innerHTML = '<p style="color:var(--text-secondary);text-align:center;padding:2rem;">Aucun avis pour le moment. Soyez le premier !</p>';
        return;
      }

      list.innerHTML = reviews.map(r => `
        <div class="review-card">
          <div class="review-header">
            <span class="review-user">${r.user_name || 'Utilisateur'}</span>
            <span class="review-stars">${renderStars(r.rating)}</span>
          </div>
          <p class="review-comment">${r.comment || 'Pas de commentaire'}</p>
        </div>
      `).join('');
    }

    function selectRating(rating) {
      selectedRating = rating;
      document.querySelectorAll('.star-btn').forEach((btn, i) => {
        btn.textContent = i < rating ? '⭐' : '☆';
        btn.classList.toggle('active', i < rating);
      });
    }

    async function submitReview() {
      if (!selectedRating) {
        showNotification('Veuillez sélectionner une note', 'warning');
        return;
      }

      const comment = document.getElementById('reviewComment').value;
      const token = localStorage.getItem('token');

      if (!token) {
        showNotification('Veuillez vous connecter', 'error');
        return;
      }

      try {
        const res = await fetch(`/api/webapps/${webappId}/reviews`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ rating: selectedRating, comment })
        });

        const data = await res.json();

        if (data.success) {
          showNotification('Avis publié !', 'success');
          setTimeout(() => location.reload(), 1500);
        } else {
          showNotification(data.message || 'Erreur', 'error');
        }
      } catch (e) {
        console.error(e);
        showNotification('Erreur lors de la publication', 'error');
      }
    }
  </script>
</body>
</html>
