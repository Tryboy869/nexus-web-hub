<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Webapp | Nexus Web Hub</title>
  <meta name="description" id="page-description">
  
  <!-- Open Graph -->
  <meta property="og:title" id="og-title">
  <meta property="og:description" id="og-description">
  <meta property="og:image" id="og-image">
  <link rel="canonical" id="canonical-url">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-deep-space: #0a0e27;
      --bg-card: #1a1f3a;
      --text-primary: #E0E6ED;
      --text-secondary: #a0aec0;
      --accent-cyan: #00d9ff;
      --accent-purple: #8b5cf6;
      --accent-green: #10b981;
      --accent-gold: #fbbf24;
      --accent-red: #ef4444;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-deep-space);
      color: var(--text-primary);
      line-height: 1.6;
    }
    
    /* Navbar */
    nav {
      background: rgba(26, 31, 58, 0.9);
      backdrop-filter: blur(10px);
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid rgba(0, 217, 255, 0.1);
    }
    
    nav .container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    nav .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--accent-cyan);
      text-decoration: none;
    }
    
    nav .logo img {
      width: 32px;
      height: 32px;
    }
    
    nav .back-btn {
      color: var(--text-secondary);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    nav .back-btn:hover {
      color: var(--accent-cyan);
    }
    
    /* Container */
    .container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 2rem;
    }
    
    /* Header */
    .webapp-header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-bottom: 3rem;
    }
    
    .media-section {
      background: var(--bg-card);
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 16/9;
    }
    
    .media-section iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    
    .media-section img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .info-section .badges {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    
    .badge {
      padding: 0.3rem 0.8rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    
    .badge-trending {
      background: var(--accent-red);
      color: white;
    }
    
    .badge-new {
      background: var(--accent-green);
      color: white;
    }
    
    .badge-featured {
      background: var(--accent-gold);
      color: var(--bg-deep-space);
    }
    
    .info-section h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }
    
    .info-section .developer {
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }
    
    .info-section .category {
      display: inline-block;
      background: rgba(0, 217, 255, 0.1);
      color: var(--accent-cyan);
      padding: 0.3rem 0.8rem;
      border-radius: 6px;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    
    .description {
      color: var(--text-secondary);
      margin-bottom: 1rem;
      line-height: 1.8;
    }
    
    .description.collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .see-more-btn {
      background: none;
      border: none;
      color: var(--accent-cyan);
      cursor: pointer;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    
    .tags {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }
    
    .tag {
      padding: 0.3rem 0.8rem;
      background: rgba(0, 217, 255, 0.1);
      border-radius: 4px;
      font-size: 0.85rem;
      color: var(--accent-cyan);
    }
    
    .actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    
    .btn {
      padding: 0.8rem 1.5rem;
      border-radius: 10px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s;
      cursor: pointer;
      border: none;
      font-size: 1rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      color: white;
    }
    
    .btn-secondary {
      background: transparent;
      border: 2px solid var(--accent-cyan);
      color: var(--accent-cyan);
    }
    
    .btn-danger {
      background: transparent;
      border: 2px solid var(--accent-red);
      color: var(--accent-red);
    }
    
    .btn:hover {
      transform: translateY(-2px);
    }
    
    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 3rem;
    }
    
    .stat-card {
      background: var(--bg-card);
      padding: 1.5rem;
      border-radius: 12px;
      text-align: center;
      border: 1px solid rgba(0, 217, 255, 0.1);
    }
    
    .stat-value {
      font-size: 2rem;
      font-weight: bold;
      color: var(--accent-cyan);
    }
    
    .stat-label {
      color: var(--text-secondary);
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    
    /* Reviews Section */
    .reviews-section {
      background: var(--bg-card);
      padding: 2rem;
      border-radius: 12px;
      margin-bottom: 3rem;
    }
    
    .reviews-section h2 {
      margin-bottom: 2rem;
    }
    
    .review-form {
      background: rgba(0, 217, 255, 0.05);
      padding: 1.5rem;
      border-radius: 12px;
      margin-bottom: 2rem;
    }
    
    .review-form .rating-input {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    
    .review-form .rating-input .star {
      font-size: 2rem;
      cursor: pointer;
      color: var(--text-secondary);
    }
    
    .review-form .rating-input .star.active {
      color: var(--accent-gold);
    }
    
    .review-form textarea {
      width: 100%;
      padding: 1rem;
      background: var(--bg-deep-space);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: inherit;
      resize: vertical;
      min-height: 100px;
      margin-bottom: 1rem;
    }
    
    .review-item {
      padding: 1.5rem;
      background: rgba(0, 217, 255, 0.05);
      border-radius: 12px;
      margin-bottom: 1rem;
    }
    
    .review-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    
    .review-author {
      font-weight: 600;
    }
    
    .review-rating {
      color: var(--accent-gold);
    }
    
    .review-comment {
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }
    
    .review-actions {
      display: flex;
      gap: 1rem;
    }
    
    .vote-btn {
      background: transparent;
      border: 1px solid rgba(0, 217, 255, 0.2);
      color: var(--text-secondary);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .vote-btn:hover {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }
    
    /* Loading */
    .loading {
      text-align: center;
      padding: 3rem;
    }
    
    .spinner {
      display: inline-block;
      width: 50px;
      height: 50px;
      border: 5px solid rgba(0, 217, 255, 0.1);
      border-top-color: var(--accent-cyan);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }
    
    .modal-content {
      background: var(--bg-card);
      padding: 2rem;
      border-radius: 16px;
      max-width: 500px;
      margin: 1rem;
      border: 1px solid var(--accent-cyan);
    }
    
    .modal-content h3 {
      margin-bottom: 1rem;
      color: var(--accent-cyan);
    }
    
    .modal-content input,
    .modal-content textarea {
      width: 100%;
      padding: 1rem;
      background: var(--bg-deep-space);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: inherit;
      margin-bottom: 1rem;
    }
    
    .modal-content .buttons {
      display: flex;
      gap: 1rem;
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .webapp-header {
        grid-template-columns: 1fr;
      }
      
      .info-section h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav>
    <div class="container">
      <a href="/" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i> Back to catalog
      </a>
      
      <a href="/" class="logo">
        <img src="/assets/logos/logo-nwh.svg" alt="Nexus Web Hub">
        <span>NWH</span>
      </a>
    </div>
  </nav>
  
  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
  </div>
  
  <!-- Content -->
  <div class="container" id="content" style="display: none;">
    <!-- Header -->
    <div class="webapp-header">
      <div class="media-section" id="media"></div>
      
      <div class="info-section">
        <div class="badges" id="badges"></div>
        <h1 id="webapp-name"></h1>
        <p class="developer" id="developer"></p>
        <span class="category" id="category"></span>
        
        <div class="description collapsed" id="description"></div>
        <button class="see-more-btn" id="see-more-btn" onclick="toggleDescription()">See more</button>
        
        <div class="tags" id="tags"></div>
        
        <div class="actions">
          <button class="btn btn-primary" onclick="openWebapp()">
            <i class="fa-solid fa-rocket"></i> Open Webapp
          </button>
          <a class="btn btn-secondary" id="github-link" style="display: none;" target="_blank">
            <i class="fa-brands fa-github"></i> Source Code
          </a>
          <button class="btn btn-danger" onclick="showReportModal()">
            <i class="fa-solid fa-flag"></i> Report
          </button>
        </div>
      </div>
    </div>
    
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="views">0</div>
        <div class="stat-label">
          <i class="fa-solid fa-eye"></i> Unique views
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="clicks">0</div>
        <div class="stat-label">
          <i class="fa-solid fa-mouse-pointer"></i> Clicks
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="rating">0.0</div>
        <div class="stat-label">
          <i class="fa-solid fa-star"></i> Average rating
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="reviews-count">0</div>
        <div class="stat-label">
          <i class="fa-solid fa-comment"></i> Reviews
        </div>
      </div>
    </div>
    
    <!-- Reviews -->
    <div class="reviews-section">
      <h2>Reviews</h2>
      
      <!-- Review Form -->
      <div class="review-form" id="review-form">
        <h3>Your review</h3>
        <div class="rating-input" id="rating-input"></div>
        <textarea id="comment" placeholder="Share your experience..."></textarea>
        <button class="btn btn-primary" onclick="submitReview()">Post review</button>
      </div>
      
      <!-- Login Required -->
      <div id="login-required" style="display: none; text-align: center; padding: 2rem;">
        <p style="margin-bottom: 1rem;">Login to leave a review</p>
        <a href="/auth.html" class="btn btn-primary">Login</a>
      </div>
      
      <!-- Reviews List -->
      <div id="reviews-list"></div>
    </div>
  </div>
  
  <!-- Report Modal -->
  <div class="modal" id="report-modal">
    <div class="modal-content">
      <h3>Report an issue</h3>
      <textarea id="report-reason" placeholder="Describe the problem..." rows="5"></textarea>
      <div class="buttons">
        <button class="btn btn-secondary" onclick="closeReportModal()">Cancel</button>
        <button class="btn btn-primary" onclick="submitReport()">Send report</button>
      </div>
    </div>
  </div>
  
  <script>
    let webapp = null;
    let reviews = [];
    let selectedRating = 0;
    const webappId = new URLSearchParams(window.location.search).get('id');
    const userId = localStorage.getItem('userId');
    
    // Load webapp
    async function loadWebapp() {
      try {
        const headers = {};
        if (userId) headers['X-User-Id'] = userId;
        
        const response = await fetch(`/api/webapps/${webappId}`, { headers });
        const data = await response.json();
        
        webapp = data.webapp;
        reviews = data.reviews;
        
        renderWebapp();
        renderReviews();
        
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
      } catch (error) {
        console.error('Error loading webapp:', error);
      }
    }
    
    // Render webapp
    function renderWebapp() {
      // SEO
      document.getElementById('page-title').textContent = `${webapp.name} | Nexus Web Hub`;
      document.getElementById('page-description').content = webapp.description_short;
      
      // Media
      if (webapp.video_url) {
        // Convertir n'importe quelle URL YouTube en format embed
        let embedUrl = webapp.video_url;
        
        try {
          // Si c'est déjà un embed, on garde tel quel
          if (embedUrl.includes('youtube.com/embed/')) {
            // Déjà au bon format
          }
          // Format: https://www.youtube.com/watch?v=VIDEO_ID
          else if (embedUrl.includes('youtube.com/watch')) {
            const url = new URL(embedUrl);
            const videoId = url.searchParams.get('v');
            if (videoId) {
              embedUrl = `https://www.youtube.com/embed/${videoId}`;
            }
          }
          // Format: https://youtu.be/VIDEO_ID
          else if (embedUrl.includes('youtu.be/')) {
            const videoId = embedUrl.split('youtu.be/')[1].split('?')[0].split('&')[0];
            if (videoId) {
              embedUrl = `https://www.youtube.com/embed/${videoId}`;
            }
          }
          
          document.getElementById('media').innerHTML = `
            <iframe 
              src="${embedUrl}" 
              frameborder="0" 
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
              referrerpolicy="strict-origin-when-cross-origin"
              allowfullscreen
              style="width: 100%; height: 100%;">
            </iframe>`;
        } catch (error) {
          console.error('Erreur chargement vidéo:', error);
          document.getElementById('media').innerHTML = '<div style="display: flex; align-items: center; justify-content: center; height: 100%; background: rgba(0, 217, 255, 0.1);"><p style="color: var(--text-secondary);">⚠️ Format vidéo non supporté</p></div>';
        }
      } else if (webapp.image_url) {
        document.getElementById('media').innerHTML = `<img src="${webapp.image_url}" alt="${webapp.name}">`;
      } else {
        document.getElementById('media').innerHTML = '<div style="display: flex; align-items: center; justify-content: center; height: 100%; background: rgba(0, 217, 255, 0.1);"><i class="fa-solid fa-image" style="font-size: 4rem; color: var(--text-secondary);"></i></div>';
      }
      
      // Badges
      let badgesHTML = '';
      if (webapp.is_trending) badgesHTML += '<span class="badge badge-trending"><i class="fa-solid fa-fire"></i> Trending</span>';
      if (webapp.is_featured) badgesHTML += '<span class="badge badge-featured"><i class="fa-solid fa-star"></i> Featured</span>';
      if (webapp.is_new) badgesHTML += '<span class="badge badge-new"><i class="fa-solid fa-sparkles"></i> New</span>';
      document.getElementById('badges').innerHTML = badgesHTML;
      
      // Info
      document.getElementById('webapp-name').textContent = webapp.name;
      document.getElementById('developer').textContent = `by ${webapp.developer}`;
      document.getElementById('category').textContent = webapp.category;
      
      const longDesc = webapp.description_long || webapp.description_short;
      document.getElementById('description').textContent = longDesc;
      
      if (longDesc.length <= 200) {
        document.getElementById('see-more-btn').style.display = 'none';
        document.getElementById('description').classList.remove('collapsed');
      }
      
      document.getElementById('tags').innerHTML = webapp.tags.map(tag => 
        `<span class="tag">${tag}</span>`
      ).join('');
      
      if (webapp.github_url) {
        document.getElementById('github-link').href = webapp.github_url;
        document.getElementById('github-link').style.display = 'inline-flex';
      }
      
      // Stats
      document.getElementById('views').textContent = webapp.views_count;
      document.getElementById('clicks').textContent = webapp.clicks_count;
      document.getElementById('rating').textContent = webapp.avg_rating.toFixed(1);
      document.getElementById('reviews-count').textContent = webapp.reviews_count;
    }
    
    // Toggle description
    function toggleDescription() {
      const desc = document.getElementById('description');
      const btn = document.getElementById('see-more-btn');
      
      if (desc.classList.contains('collapsed')) {
        desc.classList.remove('collapsed');
        btn.textContent = 'See less';
      } else {
        desc.classList.add('collapsed');
        btn.textContent = 'See more';
      }
    }
    
    // Open webapp
    function openWebapp() {
      window.open(`/redirect.html?id=${webappId}&url=${encodeURIComponent(webapp.url)}&source=detail`, '_blank');
    }
    
    // Render reviews
    function renderReviews() {
      if (!userId) {
        document.getElementById('review-form').style.display = 'none';
        document.getElementById('login-required').style.display = 'block';
      } else {
        renderRatingInput();
      }
      
      const reviewsHTML = reviews.map(review => `
        <div class="review-item">
          <div class="review-header">
            <span class="review-author">${review.user_name}</span>
            <span class="review-rating">${'⭐'.repeat(review.rating)}</span>
          </div>
          <p class="review-comment">${review.comment || ''}</p>
          <div class="review-actions">
            <button class="vote-btn" onclick="voteReview('${review.id}', 'helpful')">
              <i class="fa-solid fa-thumbs-up"></i> Helpful (${review.helpful_count})
            </button>
            <button class="vote-btn" onclick="voteReview('${review.id}', 'not_helpful')">
              <i class="fa-solid fa-thumbs-down"></i> Not helpful (${review.not_helpful_count})
            </button>
          </div>
        </div>
      `).join('');
      
      document.getElementById('reviews-list').innerHTML = reviewsHTML || '<p style="text-align: center; color: var(--text-secondary);">No reviews yet</p>';
    }
    
    // Render rating input
    function renderRatingInput() {
      const ratingInput = document.getElementById('rating-input');
      ratingInput.innerHTML = '';
      
      for (let i = 1; i <= 5; i++) {
        const star = document.createElement('span');
        star.className = 'star';
        star.innerHTML = '★';
        star.onclick = () => selectRating(i);
        ratingInput.appendChild(star);
      }
    }
    
    // Select rating
    function selectRating(rating) {
      selectedRating = rating;
      const stars = document.querySelectorAll('.rating-input .star');
      stars.forEach((star, index) => {
        if (index < rating) {
          star.classList.add('active');
        } else {
          star.classList.remove('active');
        }
      });
    }
    
    // Submit review
    async function submitReview() {
      if (!userId) {
        window.location.href = '/auth.html';
        return;
      }
      
      if (selectedRating === 0) {
        alert('Please select a rating');
        return;
      }
      
      const comment = document.getElementById('comment').value;
      
      try {
        const response = await fetch(`/api/webapps/${webappId}/reviews`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-User-Id': userId
          },
          body: JSON.stringify({
            rating: selectedRating,
            comment
          })
        });
        
        const data = await response.json();
        
        if (data.success) {
          alert('Review posted!');
          location.reload();
        } else {
          alert(data.message);
        }
      } catch (error) {
        console.error('Error submitting review:', error);
        alert('Error submitting review');
      }
    }
    
    // Vote review
    async function voteReview(reviewId, voteType) {
      if (!userId) {
        window.location.href = '/auth.html';
        return;
      }
      
      try {
        const response = await fetch(`/api/reviews/${reviewId}/vote`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-User-Id': userId
          },
          body: JSON.stringify({ vote_type: voteType })
        });
        
        const data = await response.json();
        
        if (data.success) {
          location.reload();
        }
      } catch (error) {
        console.error('Error voting review:', error);
      }
    }
    
    // Report modal
    function showReportModal() {
      if (!userId) {
        window.location.href = '/auth.html';
        return;
      }
      document.getElementById('report-modal').style.display = 'flex';
    }
    
    function closeReportModal() {
      document.getElementById('report-modal').style.display = 'none';
    }
    
    async function submitReport() {
      const reason = document.getElementById('report-reason').value;
      
      if (!reason) {
        alert('Please describe the problem');
        return;
      }
      
      try {
        const response = await fetch('/api/reports', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-User-Id': userId
          },
          body: JSON.stringify({
            target_type: 'webapp',
            target_id: webappId,
            reason
          })
        });
        
        const data = await response.json();
        
        if (data.success) {
          alert('Report sent. Thank you!');
          closeReportModal();
        } else {
          alert(data.message);
        }
      } catch (error) {
        console.error('Error submitting report:', error);
        alert('Error submitting report');
      }
    }
    
    // Init
    document.addEventListener('DOMContentLoaded', () => {
      if (!webappId) {
        window.location.href = '/';
        return;
      }
      loadWebapp();
    });
  </script>
</body>
</html>
