<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Webapp | Nexus Web Hub</title>
  <meta name="description" id="page-description">
  <meta property="og:title" id="og-title">
  <meta property="og:description" id="og-description">
  <meta property="og:image" id="og-image">
  <link rel="canonical" id="canonical-url">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-deep-space: #0a0e27;
      --bg-card: #1a1f3a;
      --text-primary: #E0E6ED;
      --text-secondary: #a0aec0;
      --accent-cyan: #00d9ff;
      --accent-purple: #8b5cf6;
      --accent-green: #10b981;
      --accent-gold: #fbbf24;
      --accent-red: #ef4444;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-deep-space);
      color: var(--text-primary);
      line-height: 1.6;
    }

    nav {
      background: var(--bg-card);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--accent-cyan);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      height: 40px;
      cursor: pointer;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0, 217, 255, 0.3);
    }

    .btn-secondary {
      background: transparent;
      border: 2px solid var(--accent-cyan);
      color: var(--accent-cyan);
    }

    .btn-danger {
      background: var(--accent-red);
      color: white;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    .webapp-header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      margin-bottom: 3rem;
    }

    .media-section {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 400px;
    }

    .media-section iframe {
      width: 100%;
      height: 350px;
      border-radius: 12px;
    }

    .media-section img {
      max-width: 100%;
      border-radius: 12px;
    }

    .info-section {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .badges-container {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .badge {
      width: 32px;
      height: 32px;
    }

    .webapp-title {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .webapp-creator {
      color: var(--text-secondary);
      font-size: 1.1rem;
    }

    .webapp-category {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(139, 92, 246, 0.2);
      color: var(--accent-purple);
      padding: 0.5rem 1rem;
      border-radius: 12px;
      font-weight: 600;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      background: var(--bg-card);
      padding: 1.5rem;
      border-radius: 12px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent-cyan);
    }

    .stat-label {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }

    .description {
      background: var(--bg-card);
      padding: 1.5rem;
      border-radius: 12px;
      line-height: 1.8;
    }

    .description.collapsed {
      max-height: 100px;
      overflow: hidden;
      position: relative;
    }

    .description.collapsed::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 50px;
      background: linear-gradient(transparent, var(--bg-card));
    }

    .see-more {
      color: var(--accent-cyan);
      cursor: pointer;
      margin-top: 0.5rem;
      display: inline-block;
    }

    .tags-container {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .tag {
      background: rgba(139, 92, 246, 0.2);
      color: var(--accent-purple);
      padding: 0.5rem 1rem;
      border-radius: 12px;
    }

    .actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .reviews-section {
      margin-top: 3rem;
    }

    .section-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .review-form {
      background: var(--bg-card);
      padding: 2rem;
      border-radius: 12px;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    .stars-input {
      display: flex;
      gap: 0.5rem;
      font-size: 2rem;
    }

    .star {
      cursor: pointer;
      color: var(--text-secondary);
      transition: color 0.2s ease;
    }

    .star.active, .star:hover {
      color: var(--accent-gold);
    }

    textarea {
      width: 100%;
      padding: 1rem;
      background: var(--bg-deep-space);
      border: 2px solid var(--accent-purple);
      border-radius: 12px;
      color: var(--text-primary);
      font-family: inherit;
      resize: vertical;
      min-height: 100px;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent-cyan);
    }

    .reviews-list {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .review-card {
      background: var(--bg-card);
      padding: 1.5rem;
      border-radius: 12px;
    }

    .review-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .review-author {
      font-weight: 700;
    }

    .review-rating {
      color: var(--accent-gold);
    }

    .review-comment {
      color: var(--text-secondary);
      line-height: 1.8;
    }

    .loading {
      text-align: center;
      padding: 4rem;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid var(--bg-card);
      border-top-color: var(--accent-cyan);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 14, 39, 0.95);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .modal-content {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 2rem;
      max-width: 500px;
      width: 100%;
      border: 2px solid var(--accent-cyan);
    }

    .modal-header {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--accent-cyan);
    }

    .modal-body {
      margin-bottom: 1.5rem;
    }

    .modal-footer {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
    }

    input[type="password"] {
      width: 100%;
      padding: 0.75rem;
      background: var(--bg-deep-space);
      border: 2px solid var(--accent-purple);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 1rem;
    }

    input[type="password"]:focus {
      outline: none;
      border-color: var(--accent-cyan);
    }

    @media (max-width: 768px) {
      .webapp-header {
        grid-template-columns: 1fr;
      }
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <nav>
    <img src="/assets/logos/logo-nwh.svg" alt="Nexus Web Hub" class="logo" onclick="window.location.href='/'">
    <button class="btn btn-secondary" onclick="window.location.href='/'">
      <i class="fa-solid fa-arrow-left"></i>
      Back to Catalog
    </button>
  </nav>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Loading webapp...</p>
  </div>

  <div class="container" id="content" style="display: none;">
    <div class="webapp-header">
      <div class="media-section" id="media-section">
        <!-- Media loaded dynamically -->
      </div>

      <div class="info-section">
        <div class="badges-container" id="badges"></div>
        <h1 class="webapp-title" id="webapp-name"></h1>
        <p class="webapp-creator"><span id="webapp-creator"></span></p>
        <div class="webapp-category" id="category-container"></div>

        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-value" id="views-count">0</div>
            <div class="stat-label"><i class="fa-solid fa-eye"></i> Views</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="clicks-count">0</div>
            <div class="stat-label"><i class="fa-solid fa-mouse-pointer"></i> Clicks</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="rating-value">0.0</div>
            <div class="stat-label"><i class="fa-solid fa-star"></i> Rating</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="reviews-count">0</div>
            <div class="stat-label"><i class="fa-solid fa-comment"></i> Reviews</div>
          </div>
        </div>

        <div>
          <h3>Description</h3>
          <div class="description collapsed" id="description">
            <p id="description-text"></p>
          </div>
          <span class="see-more" onclick="toggleDescription()">See more</span>
        </div>

        <div>
          <h3>Tags</h3>
          <div class="tags-container" id="tags"></div>
        </div>

        <div class="actions">
          <button class="btn btn-primary" onclick="openWebapp()">
            <i class="fa-solid fa-rocket"></i>
            Open Webapp
          </button>
          <button class="btn btn-secondary" id="github-btn" style="display: none;" onclick="openGithub()">
            <i class="fa-brands fa-github"></i>
            Source Code
          </button>
          <button class="btn btn-danger" onclick="reportWebapp()">
            <i class="fa-solid fa-flag"></i>
            Report
          </button>
        </div>
      </div>
    </div>

    <div class="reviews-section">
      <h2 class="section-title">
        <i class="fa-solid fa-comments"></i>
        Reviews
      </h2>

      <div id="review-form-container"></div>

      <div class="reviews-list" id="reviews-list"></div>
    </div>
  </div>

  <!-- Report Modal -->
  <div class="modal" id="report-modal">
    <div class="modal-content">
      <div class="modal-header">Report an Issue</div>
      <div class="modal-body">
        <div class="form-group">
          <label>Reason</label>
          <textarea id="report-reason" placeholder="Describe the issue..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeReportModal()">Cancel</button>
        <button class="btn btn-primary" onclick="submitReport()">Submit Report</button>
      </div>
    </div>
  </div>

  <script>
    let webappData = null;
    let userRating = 0;

    async function loadWebapp() {
      const urlParams = new URLSearchParams(window.location.search);
      const webappId = urlParams.get('id');

      if (!webappId) {
        window.location.href = '/';
        return;
      }

      try {
        const userId = localStorage.getItem('userId');
        const headers = userId ? { 'X-User-Id': userId } : {};

        const response = await fetch(`/api/webapps/${webappId}`, { headers });
        const data = await response.json();

        if (data.success) {
          webappData = data.webapp;
          renderWebapp(webappData, data.reviews);
          updateSEO(webappData);
        } else {
          alert('Webapp not found');
          window.location.href = '/';
        }

        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
      } catch (error) {
        console.error('Load error:', error);
        alert('Error loading webapp');
      }
    }

    function renderWebapp(webapp, reviews) {
      // Title
      document.getElementById('webapp-name').textContent = webapp.name;
      document.getElementById('webapp-creator').textContent = `Created by ${webapp.developer}`;

      // Badges
      const badges = [];
      if (webapp.is_trending) badges.push('<img src="/assets/badges/system/badge-trending.svg" class="badge" title="Trending">');
      if (webapp.is_featured) badges.push('<img src="/assets/badges/system/badge-featured.svg" class="badge" title="Featured">');
      if (webapp.is_new) badges.push('<img src="/assets/badges/system/badge-new.svg" class="badge" title="New">');
      document.getElementById('badges').innerHTML = badges.join('');

      // Category
      const categoryIcons = {
        productivity: '/assets/icons/icon-tools.svg',
        design: '/assets/icons/icon-ui-kits.svg',
        games: '/assets/icons/icon-games.svg',
        api: '/assets/icons/icon-apis.svg',
        nocode: '/assets/icons/icon-websites.svg',
        other: '/assets/icons/icon-other.svg'
      };
      document.getElementById('category-container').innerHTML = `
        <img src="${categoryIcons[webapp.category]}" width="20" height="20">
        <span>${webapp.category}</span>
      `;

      // Stats
      document.getElementById('views-count').textContent = webapp.views_count;
      document.getElementById('clicks-count').textContent = webapp.clicks_count;
      document.getElementById('rating-value').textContent = webapp.avg_rating.toFixed(1);
      document.getElementById('reviews-count').textContent = webapp.reviews_count;

      // Media
      const mediaSection = document.getElementById('media-section');
      if (webapp.video_url) {
        const videoId = webapp.video_url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&]+)/)?.[1];
        if (videoId) {
          mediaSection.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>`;
        }
      } else if (webapp.image_url) {
        mediaSection.innerHTML = `<img src="${webapp.image_url}" alt="${webapp.name}">`;
      } else {
        mediaSection.innerHTML = `<i class="fa-solid fa-image" style="font-size: 4rem; color: var(--text-secondary);"></i>`;
      }

      // Description
      document.getElementById('description-text').textContent = webapp.description_long || webapp.description_short;

      // Tags
      const tags = JSON.parse(webapp.tags || '[]');
      document.getElementById('tags').innerHTML = tags.map(tag => `<span class="tag">${tag}</span>`).join('');

      // GitHub button
      if (webapp.github_url) {
        document.getElementById('github-btn').style.display = 'inline-flex';
      }

      // Review form
      renderReviewForm(reviews);
    }

    function renderReviewForm(reviews) {
      const container = document.getElementById('review-form-container');
      const userId = localStorage.getItem('userId');
      const userReview = reviews.find(r => r.user_id === userId);

      if (!userId) {
        container.innerHTML = `
          <div class="review-form">
            <p style="text-align: center; color: var(--text-secondary);">
              <i class="fa-solid fa-lock"></i> Login to leave a review
            </p>
            <button class="btn btn-primary" style="margin: 1rem auto; display: block;" onclick="window.location.href='/auth.html'">
              Login
            </button>
          </div>
        `;
      } else if (userReview) {
        container.innerHTML = `
          <div class="review-form">
            <p style="color: var(--accent-green);">
              <i class="fa-solid fa-check-circle"></i> You already reviewed this webapp
            </p>
          </div>
        `;
      } else {
        container.innerHTML = `
          <div class="review-form">
            <h3>Leave a Review</h3>
            <div class="form-group">
              <label>Rating</label>
              <div class="stars-input" id="stars-input">
                ${[1,2,3,4,5].map(i => `<span class="star" onclick="setRating(${i})">★</span>`).join('')}
              </div>
            </div>
            <div class="form-group">
              <label>Comment (optional)</label>
              <textarea id="review-comment" placeholder="Share your experience..."></textarea>
            </div>
            <button class="btn btn-primary" onclick="submitReview()">
              <i class="fa-solid fa-paper-plane"></i>
              Submit Review
            </button>
          </div>
        `;
      }

      // Render reviews list
      renderReviews(reviews);
    }

    function renderReviews(reviews) {
      const list = document.getElementById('reviews-list');
      if (reviews.length === 0) {
        list.innerHTML = '<p style="text-align: center; color: var(--text-secondary);">No reviews yet. Be the first!</p>';
        return;
      }

      list.innerHTML = reviews.map(review => `
        <div class="review-card">
          <div class="review-header">
            <span class="review-author">${review.user_name}</span>
            <span class="review-rating">${'★'.repeat(review.rating)}${'☆'.repeat(5-review.rating)}</span>
          </div>
          <p class="review-comment">${review.comment || '<em>No comment</em>'}</p>
        </div>
      `).join('');
    }

    function setRating(rating) {
      userRating = rating;
      document.querySelectorAll('.star').forEach((star, index) => {
        star.classList.toggle('active', index < rating);
      });
    }

    async function submitReview() {
      if (userRating === 0) {
        alert('Please select a rating');
        return;
      }

      const comment = document.getElementById('review-comment').value;
      const urlParams = new URLSearchParams(window.location.search);
      const webappId = urlParams.get('id');
      const userId = localStorage.getItem('userId');

      try {
        const response = await fetch(`/api/webapps/${webappId}/reviews`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-User-Id': userId
          },
          body: JSON.stringify({ rating: userRating, comment })
        });

        const data = await response.json();

        if (data.success) {
          alert('Review submitted!');
          location.reload();
        } else {
          alert('Error: ' + data.message);
        }
      } catch (error) {
        console.error('Submit error:', error);
        alert('Error submitting review');
      }
    }

    function toggleDescription() {
      const desc = document.getElementById('description');
      const btn = event.target;
      desc.classList.toggle('collapsed');
      btn.textContent = desc.classList.contains('collapsed') ? 'See more' : 'See less';
    }

    function openWebapp() {
      const urlParams = new URLSearchParams(window.location.search);
      const webappId = urlParams.get('id');
      const userId = localStorage.getItem('userId');

      // Track click
      fetch(`/api/webapps/${webappId}/click`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-User-Id': userId || ''
        },
        body: JSON.stringify({ source: 'detail' })
      });

      // Redirect
      window.location.href = `/redirect.html?id=${webappId}&url=${encodeURIComponent(webappData.url)}&source=detail`;
    }

    function openGithub() {
      window.open(webappData.github_url, '_blank');
    }

    function reportWebapp() {
      const userId = localStorage.getItem('userId');
      if (!userId) {
        alert('Please login to report');
        window.location.href = '/auth.html';
        return;
      }
      document.getElementById('report-modal').style.display = 'flex';
    }

    function closeReportModal() {
      document.getElementById('report-modal').style.display = 'none';
    }

    async function submitReport() {
      const reason = document.getElementById('report-reason').value;
      if (!reason.trim()) {
        alert('Please enter a reason');
        return;
      }

      const urlParams = new URLSearchParams(window.location.search);
      const webappId = urlParams.get('id');
      const userId = localStorage.getItem('userId');

      try {
        const response = await fetch('/api/reports', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-User-Id': userId
          },
          body: JSON.stringify({
            target_type: 'webapp',
            target_id: webappId,
            reason
          })
        });

        const data = await response.json();

        if (data.success) {
          alert('Report submitted. Thank you!');
          closeReportModal();
        } else {
          alert('Error: ' + data.message);
        }
      } catch (error) {
        console.error('Report error:', error);
        alert('Error submitting report');
      }
    }

    function updateSEO(webapp) {
      document.getElementById('page-title').textContent = `${webapp.name} - ${webapp.category} | Nexus Web Hub`;
      document.getElementById('page-description').content = `${webapp.description_short} | ${webapp.avg_rating}⭐ (${webapp.reviews_count} reviews) | Created by ${webapp.developer}`;
      document.getElementById('og-title').content = webapp.name;
      document.getElementById('og-description').content = webapp.description_short;
      document.getElementById('og-image').content = webapp.image_url || '/assets/logos/logo-nwh.svg';
      document.getElementById('canonical-url').href = `https://nexuswebhub.com/webapp.html?id=${webapp.id}`;
    }

    document.addEventListener('DOMContentLoaded', loadWebapp);
  </script>
</body>
</html>
