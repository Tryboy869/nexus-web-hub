<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- Gradient Background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1">
        <animate attributeName="stop-color" values="#0a0e27;#16213e;#0a0e27" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#1a1f3a;stop-opacity:1">
        <animate attributeName="stop-color" values="#1a1f3a;#0a0e27;#1a1f3a" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    
    <!-- Gradient Cyan -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1"/>
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Strong Glow -->
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  
  <!-- Titre Principal -->
  <text x="400" y="80" font-family="Arial, sans-serif" font-size="42" 
        font-weight="bold" text-anchor="middle" fill="url(#cyanGrad)">
    Nexus Web Hub
    <animate attributeName="opacity" from="0" to="1" dur="1s" fill="freeze"/>
  </text>
  
  <!-- HUB CENTRAL (Hexagone avec pulse) -->
  <g transform="translate(400, 300)">
    <!-- Pulse rings (3 vagues) -->
    <circle cx="0" cy="0" r="60" fill="none" stroke="#00d9ff" stroke-width="2" opacity="0">
      <animate attributeName="r" values="60;120;180" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.3;0" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#00d9ff" stroke-width="2" opacity="0">
      <animate attributeName="r" values="60;120;180" dur="4s" begin="1.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.3;0" dur="4s" begin="1.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#00d9ff" stroke-width="2" opacity="0">
      <animate attributeName="r" values="60;120;180" dur="4s" begin="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.3;0" dur="4s" begin="2.6s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Hexagone central -->
    <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30" 
             fill="url(#cyanGrad)" stroke="#00d9ff" stroke-width="3" filter="url(#strongGlow)">
      <animate attributeName="opacity" values="1;0.8;1" dur="3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate"
                        from="0 0 0" to="360 0 0"
                        dur="20s" repeatCount="indefinite"/>
    </polygon>
    
    <!-- Texte NWH -->
    <text x="0" y="15" font-family="monospace" font-size="42" 
          font-weight="bold" fill="#0a0e27" text-anchor="middle">NWH</text>
  </g>
  
  <!-- SATELLITES ORBITAUX (4 icônes en rotation) -->
  
  <!-- Satellite 1 : Gaming (position 12h) -->
  <g transform="translate(400, 300)">
    <g transform="rotate(0)">
      <animateTransform attributeName="transform" type="rotate"
                        from="0 0 0" to="360 0 0"
                        dur="12s" repeatCount="indefinite"/>
      <g transform="translate(0, -160)">
        <!-- Ligne de connexion -->
        <line x1="0" y1="60" x2="0" y2="100" stroke="#00d9ff" stroke-width="2" opacity="0.5">
          <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" repeatCount="indefinite"/>
        </line>
        <!-- Cercle satellite -->
        <circle cx="0" cy="0" r="40" fill="#3b82f6" filter="url(#glow)">
          <animate attributeName="r" values="40;44;40" dur="2s" repeatCount="indefinite"/>
        </circle>
        <text x="0" y="12" font-size="32" text-anchor="middle">🎮</text>
        <!-- Label -->
        <text x="0" y="65" font-family="Arial, sans-serif" font-size="16" 
              font-weight="600" fill="#3b82f6" text-anchor="middle">Jeux Web</text>
      </g>
    </g>
  </g>
  
  <!-- Satellite 2 : Outils (position 3h) -->
  <g transform="translate(400, 300)">
    <g transform="rotate(90)">
      <animateTransform attributeName="transform" type="rotate"
                        from="90 0 0" to="450 0 0"
                        dur="12s" repeatCount="indefinite"/>
      <g transform="translate(0, -160)">
        <line x1="0" y1="60" x2="0" y2="100" stroke="#00d9ff" stroke-width="2" opacity="0.5">
          <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" begin="0.5s" repeatCount="indefinite"/>
        </line>
        <circle cx="0" cy="0" r="40" fill="#8b5cf6" filter="url(#glow)">
          <animate attributeName="r" values="40;44;40" dur="2s" begin="0.5s" repeatCount="indefinite"/>
        </circle>
        <text x="0" y="12" font-size="32" text-anchor="middle">🛠️</text>
        <text x="0" y="65" font-family="Arial, sans-serif" font-size="16" 
              font-weight="600" fill="#8b5cf6" text-anchor="middle" transform="rotate(-90)">Outils</text>
      </g>
    </g>
  </g>
  
  <!-- Satellite 3 : Design (position 6h) -->
  <g transform="translate(400, 300)">
    <g transform="rotate(180)">
      <animateTransform attributeName="transform" type="rotate"
                        from="180 0 0" to="540 0 0"
                        dur="12s" repeatCount="indefinite"/>
      <g transform="translate(0, -160)">
        <line x1="0" y1="60" x2="0" y2="100" stroke="#00d9ff" stroke-width="2" opacity="0.5">
          <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" begin="1s" repeatCount="indefinite"/>
        </line>
        <circle cx="0" cy="0" r="40" fill="#ec4899" filter="url(#glow)">
          <animate attributeName="r" values="40;44;40" dur="2s" begin="1s" repeatCount="indefinite"/>
        </circle>
        <text x="0" y="12" font-size="32" text-anchor="middle">🎨</text>
        <text x="0" y="65" font-family="Arial, sans-serif" font-size="16" 
              font-weight="600" fill="#ec4899" text-anchor="middle" transform="rotate(-180)">Design</text>
      </g>
    </g>
  </g>
  
  <!-- Satellite 4 : WebApps (position 9h) -->
  <g transform="translate(400, 300)">
    <g transform="rotate(270)">
      <animateTransform attributeName="transform" type="rotate"
                        from="270 0 0" to="630 0 0"
                        dur="12s" repeatCount="indefinite"/>
      <g transform="translate(0, -160)">
        <line x1="0" y1="60" x2="0" y2="100" stroke="#00d9ff" stroke-width="2" opacity="0.5">
          <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" begin="1.5s" repeatCount="indefinite"/>
        </line>
        <circle cx="0" cy="0" r="40" fill="#10b981" filter="url(#glow)">
          <animate attributeName="r" values="40;44;40" dur="2s" begin="1.5s" repeatCount="indefinite"/>
        </circle>
        <text x="0" y="12" font-size="32" text-anchor="middle">🌐</text>
        <text x="0" y="65" font-family="Arial, sans-serif" font-size="16" 
              font-weight="600" fill="#10b981" text-anchor="middle" transform="rotate(-270)">WebApps</text>
      </g>
    </g>
  </g>
  
  <!-- TAGLINE PRINCIPAL -->
  <text x="400" y="520" font-family="Arial, sans-serif" font-size="24" 
        font-weight="600" text-anchor="middle" fill="#00d9ff">
    Le store communautaire du Web
    <animate attributeName="opacity" from="0" to="1" begin="1s" dur="1.5s" fill="freeze"/>
  </text>
  
  <!-- SOUS-TAGLINE -->
  <text x="400" y="555" font-family="Arial, sans-serif" font-size="16" 
        text-anchor="middle" fill="#c0c0c0" opacity="0.8">
    Découvrir · Publier · Évaluer
    <animate attributeName="opacity" from="0" to="0.8" begin="2s" dur="1.5s" fill="freeze"/>
  </text>
</svg>