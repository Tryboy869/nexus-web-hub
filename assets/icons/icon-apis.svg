<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" 
     width="64" 
     height="64" 
     viewBox="0 0 64 64"
     role="img"
     aria-labelledby="apis-title apis-desc">
  
  <title id="apis-title">Catégorie APIs</title>
  <desc id="apis-desc">Icône de catégorie pour les APIs et services web</desc>
  
  <style>
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
  </style>
  
  <defs>
    <linearGradient id="apisGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <!-- Hexagone background -->
  <polygon points="32,5 55,18 55,46 32,59 9,46 9,18"
           fill="url(#apisGrad)"
           opacity="0.2"/>
  <polygon points="32,5 55,18 55,46 32,59 9,46 9,18"
           fill="none"
           stroke="url(#apisGrad)"
           stroke-width="2">
    <animate attributeName="opacity" 
             values="1;0.7;1" 
             dur="2s" 
             repeatCount="indefinite"/>
  </polygon>
  
  <!-- Prise gauche -->
  <g transform="translate(20, 32)">
    <rect x="-6" y="-8" width="12" height="16" rx="2" fill="url(#apisGrad)" stroke="white" stroke-width="1"/>
    <circle cx="0" cy="-4" r="2" fill="white"/>
    <circle cx="0" cy="4" r="2" fill="white"/>
    <rect x="6" y="-2" width="6" height="4" fill="url(#apisGrad)"/>
  </g>
  
  <!-- Prise droite -->
  <g transform="translate(44, 32)">
    <rect x="-6" y="-8" width="12" height="16" rx="2" fill="url(#apisGrad)" stroke="white" stroke-width="1"/>
    <circle cx="0" cy="-4" r="2" fill="white"/>
    <circle cx="0" cy="4" r="2" fill="white"/>
    <rect x="-12" y="-2" width="6" height="4" fill="url(#apisGrad)"/>
  </g>
  
  <!-- Signal de connexion animé -->
  <g transform="translate(32, 32)">
    <circle cx="-4" cy="0" r="1" fill="#3b82f6" opacity="0">
      <animate attributeName="opacity" 
               values="0;1;0" 
               dur="1.5s" 
               repeatCount="indefinite"/>
      <animate attributeName="cx" 
               values="-4;4" 
               dur="1.5s" 
               repeatCount="indefinite"/>
    </circle>
  </g>
  
</svg>