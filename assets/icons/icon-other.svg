<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" 
     width="64" 
     height="64" 
     viewBox="0 0 64 64"
     role="img"
     aria-labelledby="other-title other-desc">
  
  <title id="other-title">Catégorie Autre</title>
  <desc id="other-desc">Icône de catégorie pour les autres types de webapps</desc>
  
  <style>
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
  </style>
  
  <defs>
    <linearGradient id="otherGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <!-- Hexagone background -->
  <polygon points="32,5 55,18 55,46 32,59 9,46 9,18"
           fill="url(#otherGrad)"
           opacity="0.2"/>
  <polygon points="32,5 55,18 55,46 32,59 9,46 9,18"
           fill="none"
           stroke="url(#otherGrad)"
           stroke-width="2">
    <animate attributeName="opacity" 
             values="1;0.7;1" 
             dur="2s" 
             repeatCount="indefinite"/>
  </polygon>
  
  <!-- Éclair (symbole universel d'énergie/innovation) -->
  <g transform="translate(32, 32)">
    <path d="M4,-14 L-8,2 L0,2 L-4,14 L8,-2 L0,-2 Z"
          fill="url(#otherGrad)"
          stroke="white"
          stroke-width="1.5">
      <animate attributeName="opacity" 
               values="1;0.8;1" 
               dur="1.5s" 
               repeatCount="indefinite"/>
    </path>
    
    <!-- Étincelles -->
    <g opacity="0.7">
      <path d="M-10,-8 L-9,-6 L-7,-7 L-8,-5 L-6,-6 L-7,-4 L-9,-5 L-8,-7 Z"
            fill="#fbbf24"
            opacity="0">
        <animate attributeName="opacity" 
                 values="0;1;0" 
                 dur="2s" 
                 repeatCount="indefinite"/>
      </path>
      
      <path d="M10,6 L11,8 L13,7 L12,9 L14,8 L13,10 L11,9 L12,7 Z"
            fill="#fbbf24"
            opacity="0">
        <animate attributeName="opacity" 
                 values="0;1;0" 
                 begin="0.5s"
                 dur="2s" 
                 repeatCount="indefinite"/>
      </path>
    </g>
  </g>
  
</svg>