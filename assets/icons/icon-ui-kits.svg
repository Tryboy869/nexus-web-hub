<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" 
     width="64" 
     height="64" 
     viewBox="0 0 64 64"
     role="img"
     aria-labelledby="uikits-title uikits-desc">
  
  <title id="uikits-title">Catégorie UI Kits</title>
  <desc id="uikits-desc">Icône de catégorie pour les kits d'interface utilisateur</desc>
  
  <style>
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
  </style>
  
  <defs>
    <linearGradient id="uikitsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9a8d4;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <!-- Hexagone background -->
  <polygon points="32,5 55,18 55,46 32,59 9,46 9,18"
           fill="url(#uikitsGrad)"
           opacity="0.2"/>
  <polygon points="32,5 55,18 55,46 32,59 9,46 9,18"
           fill="none"
           stroke="url(#uikitsGrad)"
           stroke-width="2">
    <animate attributeName="opacity" 
             values="1;0.7;1" 
             dur="2s" 
             repeatCount="indefinite"/>
  </polygon>
  
  <!-- Palette de couleurs -->
  <g transform="translate(32, 32)">
    <!-- Forme palette -->
    <ellipse cx="0" cy="0" rx="14" ry="16" fill="url(#uikitsGrad)" stroke="white" stroke-width="1.5"/>
    <circle cx="4" cy="8" r="4" fill="white"/>
    
    <!-- Couleurs -->
    <circle cx="-6" cy="-6" r="3" fill="#ec4899" opacity="0.8">
      <animate attributeName="opacity" 
               values="0.8;1;0.8" 
               dur="1.5s" 
               repeatCount="indefinite"/>
    </circle>
    <circle cx="2" cy="-8" r="3" fill="#8b5cf6" opacity="0.8">
      <animate attributeName="opacity" 
               values="0.8;1;0.8" 
               begin="0.3s"
               dur="1.5s" 
               repeatCount="indefinite"/>
    </circle>
    <circle cx="8" cy="-2" r="3" fill="#00d9ff" opacity="0.8">
      <animate attributeName="opacity" 
               values="0.8;1;0.8" 
               begin="0.6s"
               dur="1.5s" 
               repeatCount="indefinite"/>
    </circle>
    <circle cx="6" cy="6" r="3" fill="#10b981" opacity="0.8">
      <animate attributeName="opacity" 
               values="0.8;1;0.8" 
               begin="0.9s"
               dur="1.5s" 
               repeatCount="indefinite"/>
    </circle>
    <circle cx="-4" cy="4" r="3" fill="#fbbf24" opacity="0.8">
      <animate attributeName="opacity" 
               values="0.8;1;0.8" 
               begin="1.2s"
               dur="1.5s" 
               repeatCount="indefinite"/>
    </circle>
  </g>
  
</svg>