<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" 
     width="300" 
     height="400" 
     viewBox="0 0 300 400"
     role="img"
     aria-labelledby="anzize-title anzize-desc">
  
  <title id="anzize-title">Carte Contributeur - Daouda Abdoul Anzize</title>
  <desc id="anzize-desc">Carte trading card futuriste du fondateur de Nexus Web Hub</desc>
  
  <style>
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
    .card-text { 
      font-family: Arial, sans-serif; 
      fill: white; 
    }
  </style>
  
  <defs>
    <!-- Gradients -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1f3a;stop-opacity:1"/>
    </linearGradient>
    
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1"/>
    </linearGradient>
    
    <!-- Filters -->
    <filter id="cardGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Card background -->
  <rect width="300" height="400" rx="15" fill="url(#cardBg)" 
        stroke="url(#headerGrad)" stroke-width="2" filter="url(#cardGlow)"/>
  
  <!-- Header bar -->
  <rect width="300" height="80" rx="15" fill="url(#headerGrad)" opacity="0.2"/>
  <line x1="0" y1="80" x2="300" y2="80" stroke="url(#headerGrad)" stroke-width="2"/>
  
  <!-- Avatar hexagonal -->
  <g transform="translate(150, 120)">
    <!-- Hexagone background -->
    <polygon points="0,-40 35,-20 35,20 0,40 -35,20 -35,-20"
             fill="#0a0e27"
             stroke="url(#headerGrad)"
             stroke-width="3"
             filter="url(#cardGlow)">
      <animate attributeName="opacity" 
               values="1;0.9;1" 
               dur="3s" 
               repeatCount="indefinite"/>
    </polygon>
    
    <!-- Initiales AD -->
    <text x="0" y="10" text-anchor="middle" 
          font-size="32" font-weight="bold" 
          fill="url(#headerGrad)" class="card-text">
      AD
    </text>
    
    <!-- Pulse ring -->
    <polygon points="0,-40 35,-20 35,20 0,40 -35,20 -35,-20"
             fill="none"
             stroke="#00d9ff"
             stroke-width="2"
             opacity="0">
      <animate attributeName="opacity" 
               values="0.6;0;0" 
               dur="2s" 
               repeatCount="indefinite"/>
      <animateTransform attributeName="transform"
                        type="scale"
                        values="1;1.3;1.6"
                        additive="sum"
                        dur="2s"
                        repeatCount="indefinite"/>
    </polygon>
  </g>
  
  <!-- Nom -->
  <text x="150" y="190" text-anchor="middle" 
        font-size="20" font-weight="bold" 
        fill="white" class="card-text">
    Daouda Abdoul Anzize
  </text>
  
  <!-- Role -->
  <text x="150" y="215" text-anchor="middle" 
        font-size="14" 
        fill="#00d9ff" class="card-text">
    CEO and Founder - Nexus Studio
  </text>
  
  <!-- Ligne séparatrice -->
  <line x1="40" y1="235" x2="260" y2="235" 
        stroke="#00d9ff" stroke-width="1" opacity="0.3"/>
  
  <!-- Badges -->
  <g transform="translate(150, 265)">
    <text y="-15" text-anchor="middle" 
          font-size="12" fill="#c0c0c0" class="card-text">
      Badges
    </text>
    
    <!-- Badge Creator -->
    <g transform="translate(-60, 0)">
      <circle r="18" fill="#00d9ff" opacity="0.2"/>
      <text y="6" text-anchor="middle" font-size="18">🏆</text>
      <text y="35" text-anchor="middle" font-size="9" fill="#00d9ff" class="card-text">Creator</text>
    </g>
    
    <!-- Badge Architect -->
    <g transform="translate(0, 0)">
      <circle r="18" fill="#8b5cf6" opacity="0.2"/>
      <text y="6" text-anchor="middle" font-size="18">💎</text>
      <text y="35" text-anchor="middle" font-size="9" fill="#8b5cf6" class="card-text">Architect</text>
    </g>
    
    <!-- Badge Visionary -->
    <g transform="translate(60, 0)">
      <circle r="18" fill="#fbbf24" opacity="0.2"/>
      <text y="6" text-anchor="middle" font-size="18">🚀</text>
      <text y="35" text-anchor="middle" font-size="9" fill="#fbbf24" class="card-text">Visionary</text>
    </g>
  </g>
  
  <!-- Stats -->
  <g transform="translate(50, 330)">
    <text y="0" font-size="12" fill="#c0c0c0" class="card-text">
      Statistiques
    </text>
    
    <!-- Projets créés -->
    <g transform="translate(0, 20)">
      <text x="0" y="0" font-size="14" fill="white" class="card-text">
        <tspan fill="#00d9ff">🔨</tspan> 1 projet créé
      </text>
    </g>
    
    <!-- Statut -->
    <g transform="translate(0, 40)">
      <text x="0" y="0" font-size="14" fill="white" class="card-text">
        <tspan fill="#fbbf24">⭐</tspan> Founder
      </text>
    </g>
  </g>
  
  <!-- Particules orbitales -->
  <g opacity="0.4">
    <!-- Particule 1 -->
    <circle r="2" fill="#00d9ff">
      <animateMotion dur="10s" repeatCount="indefinite"
                     path="M50,100 Q150,50 250,100 Q150,150 50,100"/>
    </circle>
    
    <!-- Particule 2 -->
    <circle r="2" fill="#8b5cf6">
      <animateMotion dur="12s" repeatCount="indefinite"
                     path="M250,300 Q150,250 50,300 Q150,350 250,300"/>
    </circle>
  </g>
  
  <!-- Border glow hover effect -->
  <rect width="300" height="400" rx="15" fill="none"
        stroke="url(#headerGrad)" stroke-width="3" opacity="0">
    <animate attributeName="opacity" 
             values="0;0.6;0" 
             dur="3s" 
             repeatCount="indefinite"/>
  </rect>
  
</svg>