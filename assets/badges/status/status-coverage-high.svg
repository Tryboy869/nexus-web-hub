<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" 
     width="100" 
     height="20" 
     viewBox="0 0 100 20"
     role="img"
     aria-labelledby="coverage-title coverage-desc">
  
  <title id="coverage-title">Coverage Status - 95%</title>
  <desc id="coverage-desc">Badge de couverture de code : 95%</desc>
  
  <style>
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
  </style>
  
  <!-- Background -->
  <rect width="100" height="20" rx="3" fill="#555"/>
  
  <!-- Label "coverage" -->
  <rect width="60" height="20" rx="3" fill="#555"/>
  <text x="30" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    coverage
  </text>
  
  <!-- Status "95%" -->
  <rect x="60" width="40" height="20" rx="3" fill="#10b981"/>
  <text x="80" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">
    <tspan opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.5s" dur="0.3s" fill="freeze"/>
      95%
    </tspan>
  </text>
  
</svg>