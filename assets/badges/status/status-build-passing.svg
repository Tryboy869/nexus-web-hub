<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" 
     width="100" 
     height="20" 
     viewBox="0 0 100 20"
     role="img"
     aria-labelledby="build-title build-desc">
  
  <title id="build-title">Build Status - Passing</title>
  <desc id="build-desc">Badge de statut de build : succès</desc>
  
  <style>
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
  </style>
  
  <!-- Background -->
  <rect width="100" height="20" rx="3" fill="#555"/>
  
  <!-- Label "build" -->
  <rect width="40" height="20" rx="3" fill="#555"/>
  <text x="20" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    build
  </text>
  
  <!-- Status "passing" -->
  <rect x="40" width="60" height="20" rx="3" fill="#10b981"/>
  <text x="70" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">
    passing
  </text>
  
  <!-- Checkmark animé -->
  <path d="M44,10 L47,13 L52,8" 
        stroke="white" 
        stroke-width="1.5" 
        fill="none"
        stroke-linecap="round"
        stroke-dasharray="10"
        stroke-dashoffset="10">
    <animate attributeName="stroke-dashoffset" 
             from="10" 
             to="0" 
             dur="1s" 
             fill="freeze"/>
  </path>
  
</svg>