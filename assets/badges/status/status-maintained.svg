<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" 
     width="110" 
     height="20" 
     viewBox="0 0 110 20"
     role="img"
     aria-labelledby="maintained-title maintained-desc">
  
  <title id="maintained-title">Maintenance Status - Active</title>
  <desc id="maintained-desc">Badge de statut de maintenance : activement maintenu</desc>
  
  <style>
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
  </style>
  
  <!-- Background -->
  <rect width="110" height="20" rx="3" fill="#555"/>
  
  <!-- Label "maintained" -->
  <rect width="70" height="20" rx="3" fill="#555"/>
  <text x="35" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">
    maintained
  </text>
  
  <!-- Status "yes" -->
  <rect x="70" width="40" height="20" rx="3" fill="#10b981"/>
  <text x="90" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">
    yes
    <animate attributeName="opacity" 
             values="1;0.8;1" 
             dur="2s" 
             repeatCount="indefinite"/>
  </text>
  
</svg>