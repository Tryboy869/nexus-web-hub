<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" 
     width="60" 
     height="60" 
     viewBox="0 0 60 60"
     role="img"
     aria-labelledby="new-title new-desc">
  
  <title id="new-title">Badge New</title>
  <desc id="new-desc">Badge sparkles cyan, indiquant un contenu récemment ajouté</desc>
  
  <style>
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
  </style>
  
  <defs>
    <!-- Gradient cyan -->
    <linearGradient id="newGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#67e8f9;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#00d9ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <!-- Sparkle central (grande étoile 4 branches) -->
  <g transform="translate(30, 30)">
    <path d="M0,-12 L2,-2 L12,0 L2,2 L0,12 L-2,2 L-12,0 L-2,-2 Z"
          fill="url(#newGrad)"
          opacity="0.9">
      <animate attributeName="opacity" 
               values="0.9;1;0.9" 
               dur="1.5s" 
               repeatCount="indefinite"/>
      <animateTransform attributeName="transform"
                        type="rotate"
                        from="0"
                        to="360"
                        dur="10s"
                        repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Sparkle secondaire haut-droite -->
  <g transform="translate(42, 18)" opacity="0">
    <animate attributeName="opacity" 
             values="0;1;0" 
             dur="2s" 
             repeatCount="indefinite"/>
    
    <path d="M0,-6 L1,-1 L6,0 L1,1 L0,6 L-1,1 L-6,0 L-1,-1 Z"
          fill="#00d9ff">
      <animateTransform attributeName="transform"
                        type="rotate"
                        from="0"
                        to="-180"
                        dur="2s"
                        repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Sparkle secondaire bas-gauche -->
  <g transform="translate(18, 42)" opacity="0">
    <animate attributeName="opacity" 
             values="0;1;0" 
             begin="0.5s"
             dur="2s" 
             repeatCount="indefinite"/>
    
    <path d="M0,-6 L1,-1 L6,0 L1,1 L0,6 L-1,1 L-6,0 L-1,-1 Z"
          fill="#67e8f9">
      <animateTransform attributeName="transform"
                        type="rotate"
                        from="0"
                        to="180"
                        dur="2s"
                        repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Sparkle secondaire haut-gauche -->
  <g transform="translate(15, 20)" opacity="0">
    <animate attributeName="opacity" 
             values="0;1;0" 
             begin="1s"
             dur="2s" 
             repeatCount="indefinite"/>
    
    <path d="M0,-4 L0.7,-0.7 L4,0 L0.7,0.7 L0,4 L-0.7,0.7 L-4,0 L-0.7,-0.7 Z"
          fill="#00d9ff">
      <animateTransform attributeName="transform"
                        type="rotate"
                        from="0"
                        to="-180"
                        dur="2s"
                        repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Sparkle secondaire bas-droite -->
  <g transform="translate(45, 40)" opacity="0">
    <animate attributeName="opacity" 
             values="0;1;0" 
             begin="1.5s"
             dur="2s" 
             repeatCount="indefinite"/>
    
    <path d="M0,-4 L0.7,-0.7 L4,0 L0.7,0.7 L0,4 L-0.7,0.7 L-4,0 L-0.7,-0.7 Z"
          fill="#0891b2">
      <animateTransform attributeName="transform"
                        type="rotate"
                        from="0"
                        to="180"
                        dur="2s"
                        repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Particules flottantes -->
  <g opacity="0.6">
    <!-- Particule 1 -->
    <circle cx="25" cy="50" r="1.5" fill="#00d9ff">
      <animate attributeName="cy" 
               values="50;10;50" 
               dur="3s" 
               repeatCount="indefinite"/>
      <animate attributeName="opacity" 
               values="0.6;0.2;0.6" 
               dur="3s" 
               repeatCount="indefinite"/>
    </circle>
    
    <!-- Particule 2 -->
    <circle cx="35" cy="52" r="1" fill="#67e8f9">
      <animate attributeName="cy" 
               values="52;12;52" 
               begin="0.5s"
               dur="3.5s" 
               repeatCount="indefinite"/>
      <animate attributeName="opacity" 
               values="0.6;0.2;0.6" 
               begin="0.5s"
               dur="3.5s" 
               repeatCount="indefinite"/>
    </circle>
  </g>
  
</svg>