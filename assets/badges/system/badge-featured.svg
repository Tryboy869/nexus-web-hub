<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" 
     width="60" 
     height="60" 
     viewBox="0 0 60 60"
     role="img"
     aria-labelledby="featured-title featured-desc">
  
  <title id="featured-title">Badge Featured</title>
  <desc id="featured-desc">Badge étoile dorée éclatante, indiquant un contenu mis en avant</desc>
  
  <style>
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
  </style>
  
  <defs>
    <!-- Gradient doré -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#fbbf24;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1"/>
    </linearGradient>
    
    <!-- Glow doré -->
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Étoile principale -->
  <g transform="translate(30, 30)">
    <!-- Étoile 5 branches -->
    <polygon points="0,-20 6,-6 20,-6 9,3 14,17 0,9 -14,17 -9,3 -20,-6 -6,-6"
             fill="url(#goldGrad)"
             filter="url(#goldGlow)">
      <animate attributeName="opacity" 
               values="1;0.8;1" 
               dur="2s" 
               repeatCount="indefinite"/>
    </polygon>
    
    <!-- Étoile intérieure (brillance) -->
    <polygon points="0,-14 4,-4 14,-4 6,2 10,12 0,6 -10,12 -6,2 -14,-4 -4,-4"
             fill="#fef3c7"
             opacity="0.7">
      <animate attributeName="opacity" 
               values="0.7;1;0.7" 
               dur="2s" 
               repeatCount="indefinite"/>
    </polygon>
  </g>
  
  <!-- Rayons lumineux (rotation) -->
  <g transform="translate(30, 30)" opacity="0.6">
    <animateTransform attributeName="transform"
                      type="rotate"
                      from="0 30 30"
                      to="360 30 30"
                      dur="8s"
                      repeatCount="indefinite"/>
    
    <!-- Rayon 1 -->
    <line x1="0" y1="-25" x2="0" y2="-28" 
          stroke="#fbbf24" 
          stroke-width="2" 
          stroke-linecap="round"/>
    
    <!-- Rayon 2 -->
    <line x1="18" y1="-18" x2="20" y2="-20" 
          stroke="#fbbf24" 
          stroke-width="2" 
          stroke-linecap="round"/>
    
    <!-- Rayon 3 -->
    <line x1="25" y1="0" x2="28" y2="0" 
          stroke="#fbbf24" 
          stroke-width="2" 
          stroke-linecap="round"/>
    
    <!-- Rayon 4 -->
    <line x1="18" y1="18" x2="20" y2="20" 
          stroke="#fbbf24" 
          stroke-width="2" 
          stroke-linecap="round"/>
    
    <!-- Rayon 5 -->
    <line x1="0" y1="25" x2="0" y2="28" 
          stroke="#fbbf24" 
          stroke-width="2" 
          stroke-linecap="round"/>
    
    <!-- Rayon 6 -->
    <line x1="-18" y1="18" x2="-20" y2="20" 
          stroke="#fbbf24" 
          stroke-width="2" 
          stroke-linecap="round"/>
    
    <!-- Rayon 7 -->
    <line x1="-25" y1="0" x2="-28" y2="0" 
          stroke="#fbbf24" 
          stroke-width="2" 
          stroke-linecap="round"/>
    
    <!-- Rayon 8 -->
    <line x1="-18" y1="-18" x2="-20" y2="-20" 
          stroke="#fbbf24" 
          stroke-width="2" 
          stroke-linecap="round"/>
  </g>
  
  <!-- Pulse rings -->
  <circle cx="30" cy="30" r="22"
          fill="none"
          stroke="#fbbf24"
          stroke-width="2"
          opacity="0">
    <animate attributeName="r" 
             values="22;30;38" 
             dur="2s" 
             repeatCount="indefinite"/>
    <animate attributeName="opacity" 
             values="0.6;0.3;0" 
             dur="2s" 
             repeatCount="indefinite"/>
  </circle>
  
</svg>