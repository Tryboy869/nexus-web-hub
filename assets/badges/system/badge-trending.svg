<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" 
     width="60" 
     height="60" 
     viewBox="0 0 60 60"
     role="img"
     aria-labelledby="trending-title trending-desc">
  
  <title id="trending-title">Badge Trending</title>
  <desc id="trending-desc">Badge flamme orange-rouge, indiquant un contenu tendance</desc>
  
  <style>
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
  </style>
  
  <defs>
    <!-- Gradient flamme -->
    <linearGradient id="flameGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1"/>
    </linearGradient>
    
    <!-- Glow flamme -->
    <filter id="flameGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Flamme principale -->
  <path d="M30,10 Q35,15 32,25 Q38,20 38,30 Q40,35 35,40 Q38,45 30,50 Q22,45 25,40 Q20,35 22,30 Q22,20 28,25 Q25,15 30,10 Z"
        fill="url(#flameGrad)"
        filter="url(#flameGlow)">
    <!-- Animation ondulation -->
    <animate attributeName="d" 
             values="
               M30,10 Q35,15 32,25 Q38,20 38,30 Q40,35 35,40 Q38,45 30,50 Q22,45 25,40 Q20,35 22,30 Q22,20 28,25 Q25,15 30,10 Z;
               M30,10 Q33,15 30,25 Q36,22 36,30 Q38,35 33,40 Q36,45 30,50 Q24,45 27,40 Q22,35 24,30 Q24,22 30,25 Q27,15 30,10 Z;
               M30,10 Q35,15 32,25 Q38,20 38,30 Q40,35 35,40 Q38,45 30,50 Q22,45 25,40 Q20,35 22,30 Q22,20 28,25 Q25,15 30,10 Z
             " 
             dur="2s" 
             repeatCount="indefinite"/>
  </path>
  
  <!-- Flamme intérieure (plus claire) -->
  <path d="M30,18 Q32,22 30,28 Q34,26 34,32 Q35,35 32,38 Q34,40 30,44 Q26,40 28,38 Q25,35 26,32 Q26,26 30,28 Q28,22 30,18 Z"
        fill="#fbbf24"
        opacity="0.8">
    <animate attributeName="d" 
             values="
               M30,18 Q32,22 30,28 Q34,26 34,32 Q35,35 32,38 Q34,40 30,44 Q26,40 28,38 Q25,35 26,32 Q26,26 30,28 Q28,22 30,18 Z;
               M30,18 Q31,22 29,28 Q33,27 33,32 Q34,35 31,38 Q33,40 30,44 Q27,40 29,38 Q26,35 27,32 Q27,27 29,28 Q29,22 30,18 Z;
               M30,18 Q32,22 30,28 Q34,26 34,32 Q35,35 32,38 Q34,40 30,44 Q26,40 28,38 Q25,35 26,32 Q26,26 30,28 Q28,22 30,18 Z
             " 
             dur="2s" 
             repeatCount="indefinite"/>
  </path>
  
  <!-- Particules de chaleur -->
  <g opacity="0.6">
    <!-- Particule 1 -->
    <circle cx="28" cy="48" r="2" fill="#f59e0b">
      <animate attributeName="cy" 
               values="48;10;48" 
               dur="2s" 
               repeatCount="indefinite"/>
      <animate attributeName="opacity" 
               values="0.6;0;0.6" 
               dur="2s" 
               repeatCount="indefinite"/>
    </circle>
    
    <!-- Particule 2 -->
    <circle cx="32" cy="50" r="1.5" fill="#fbbf24">
      <animate attributeName="cy" 
               values="50;12;50" 
               begin="0.5s"
               dur="2.5s" 
               repeatCount="indefinite"/>
      <animate attributeName="opacity" 
               values="0.6;0;0.6" 
               begin="0.5s"
               dur="2.5s" 
               repeatCount="indefinite"/>
    </circle>
    
    <!-- Particule 3 -->
    <circle cx="30" cy="49" r="1" fill="#ef4444">
      <animate attributeName="cy" 
               values="49;11;49" 
               begin="1s"
               dur="2.2s" 
               repeatCount="indefinite"/>
      <animate attributeName="opacity" 
               values="0.6;0;0.6" 
               begin="1s"
               dur="2.2s" 
               repeatCount="indefinite"/>
    </circle>
  </g>
  
</svg>