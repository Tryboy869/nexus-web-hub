<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" 
     width="80" 
     height="80" 
     viewBox="0 0 80 80"
     role="img"
     aria-labelledby="verified-title verified-desc">
  
  <title id="verified-title">Badge Créateur Vérifié</title>
  <desc id="verified-desc">Badge hexagonal cyan avec checkmark, indiquant un créateur vérifié sur Nexus Web Hub</desc>
  
  <style>
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
  </style>
  
  <defs>
    <!-- Gradient cyan -->
    <linearGradient id="verifiedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1"/>
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="verifiedGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Hexagone background -->
  <polygon points="40,10 65,25 65,55 40,70 15,55 15,25"
           fill="url(#verifiedGrad)"
           filter="url(#verifiedGlow)">
    <animate attributeName="opacity" 
             values="1;0.9;1" 
             dur="3s" 
             repeatCount="indefinite"/>
  </polygon>
  
  <!-- Hexagone border animé -->
  <polygon points="40,10 65,25 65,55 40,70 15,55 15,25"
           fill="none"
           stroke="#00d9ff"
           stroke-width="2">
    <animateTransform attributeName="transform"
                      type="rotate"
                      from="0 40 40"
                      to="360 40 40"
                      dur="20s"
                      repeatCount="indefinite"/>
  </polygon>
  
  <!-- Checkmark -->
  <path d="M25,40 L35,50 L55,30" 
        stroke="white" 
        stroke-width="5" 
        fill="none" 
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-dasharray="50"
        stroke-dashoffset="50">
    <animate attributeName="stroke-dashoffset" 
             from="50" 
             to="0" 
             dur="1s" 
             fill="freeze"/>
  </path>
  
  <!-- Pulse ring -->
  <polygon points="40,10 65,25 65,55 40,70 15,55 15,25"
           fill="none"
           stroke="#00d9ff"
           stroke-width="2"
           opacity="0">
    <animate attributeName="opacity" 
             values="0.6;0;0" 
             dur="2s" 
             repeatCount="indefinite"/>
    <animateTransform attributeName="transform"
                      type="scale"
                      values="1;1.3;1.5"
                      additive="sum"
                      dur="2s"
                      repeatCount="indefinite"/>
  </polygon>
  
</svg>