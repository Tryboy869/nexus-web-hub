<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" 
     width="80" 
     height="80" 
     viewBox="0 0 80 80"
     role="img"
     aria-labelledby="supporter-title supporter-desc">
  
  <title id="supporter-title">Badge Supporter</title>
  <desc id="supporter-desc">Badge diamant cyan avec reflets, indiquant un soutien financier à Nexus Web Hub</desc>
  
  <style>
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
  </style>
  
  <defs>
    <!-- Gradient diamant cyan -->
    <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#67e8f9;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#00d9ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1"/>
    </linearGradient>
    
    <!-- Glow diamant -->
    <filter id="diamondGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Cercle background -->
  <circle cx="40" cy="40" r="32"
          fill="#0a0e27"
          stroke="url(#diamondGrad)"
          stroke-width="2">
    <animate attributeName="r" 
             values="32;33;32" 
             dur="3s" 
             repeatCount="indefinite"/>
  </circle>
  
  <!-- Diamant (forme géométrique) -->
  <g transform="translate(40, 40)">
    <!-- Partie supérieure -->
    <path d="M0,-18 L12,-8 L12,0 L0,12 L-12,0 L-12,-8 Z"
          fill="url(#diamondGrad)"
          filter="url(#diamondGlow)"
          opacity="0.9">
      <animate attributeName="opacity" 
               values="0.9;1;0.9" 
               dur="2s" 
               repeatCount="indefinite"/>
    </path>
    
    <!-- Facettes (lignes internes) -->
    <line x1="0" y1="-18" x2="0" y2="12" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="-12" y1="-8" x2="12" y2="-8" stroke="white" stroke-width="1" opacity="0.4"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="white" stroke-width="1" opacity="0.4"/>
    
    <!-- Lignes diagonales -->
    <line x1="-12" y1="-8" x2="0" y2="12" stroke="white" stroke-width="0.5" opacity="0.3"/>
    <line x1="12" y1="-8" x2="0" y2="12" stroke="white" stroke-width="0.5" opacity="0.3"/>
  </g>
  
  <!-- Reflets lumineux rotatifs -->
  <g transform="translate(40, 40)" opacity="0.6">
    <animateTransform attributeName="transform"
                      type="rotate"
                      from="0 40 40"
                      to="360 40 40"
                      dur="8s"
                      repeatCount="indefinite"/>
    
    <!-- Reflet 1 -->
    <line x1="-15" y1="-10" x2="-8" y2="-3" 
          stroke="white" 
          stroke-width="2" 
          stroke-linecap="round">
      <animate attributeName="opacity" 
               values="0.6;1;0.6" 
               dur="2s" 
               repeatCount="indefinite"/>
    </line>
    
    <!-- Reflet 2 -->
    <line x1="8" y1="-3" x2="15" y2="-10" 
          stroke="white" 
          stroke-width="2" 
          stroke-linecap="round">
      <animate attributeName="opacity" 
               values="0.6;1;0.6" 
               begin="1s"
               dur="2s" 
               repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Sparkles animés -->
  <g opacity="0.8">
    <!-- Sparkle 1 -->
    <path d="M25,25 L27,27 L25,29 L23,27 Z" fill="#00d9ff" opacity="0">
      <animate attributeName="opacity" 
               values="0;1;0" 
               dur="1.5s" 
               repeatCount="indefinite"/>
    </path>
    
    <!-- Sparkle 2 -->
    <path d="M55,30 L57,32 L55,34 L53,32 Z" fill="#00d9ff" opacity="0">
      <animate attributeName="opacity" 
               values="0;1;0" 
               begin="0.5s"
               dur="1.5s" 
               repeatCount="indefinite"/>
    </path>
    
    <!-- Sparkle 3 -->
    <path d="M30,55 L32,57 L30,59 L28,57 Z" fill="#67e8f9" opacity="0">
      <animate attributeName="opacity" 
               values="0;1;0" 
               begin="1s"
               dur="1.5s" 
               repeatCount="indefinite"/>
    </path>
  </g>
  
</svg>