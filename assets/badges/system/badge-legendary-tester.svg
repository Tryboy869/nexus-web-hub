<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" 
     width="80" 
     height="80" 
     viewBox="0 0 80 80"
     role="img"
     aria-labelledby="legendary-title legendary-desc">
  
  <title id="legendary-title">Badge Legendary Tester</title>
  <desc id="legendary-desc">Badge couronne or et violet avec particules, niveau légendaire testeur (200 avis + 80% utiles)</desc>
  
  <style>
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
  </style>
  
  <defs>
    <!-- Gradient or vers violet -->
    <linearGradient id="legendaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1"/>
    </linearGradient>
    
    <!-- Glow premium -->
    <filter id="legendaryGlow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Cercle background -->
  <circle cx="40" cy="40" r="34"
          fill="url(#legendaryGrad)"
          filter="url(#legendaryGlow)"
          opacity="0.9">
    <animate attributeName="opacity" 
             values="0.9;1;0.9" 
             dur="3s" 
             repeatCount="indefinite"/>
  </circle>
  
  <!-- Couronne -->
  <g transform="translate(40, 40)">
    <!-- Base couronne -->
    <path d="M-15,5 L-15,10 L15,10 L15,5 L12,-5 L8,0 L4,-8 L0,0 L-4,-8 L-8,0 L-12,-5 Z"
          fill="#fbbf24"
          stroke="white"
          stroke-width="1"
          opacity="0">
      <animate attributeName="opacity" 
               values="0;1" 
               begin="0.5s"
               dur="0.8s" 
               fill="freeze"/>
    </path>
    
    <!-- Joyaux couronne -->
    <circle cx="-8" cy="-3" r="2" fill="#8b5cf6">
      <animate attributeName="r" 
               values="2;3;2" 
               dur="2s" 
               repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="-6" r="2" fill="#8b5cf6">
      <animate attributeName="r" 
               values="2;3;2" 
               begin="0.3s"
               dur="2s" 
               repeatCount="indefinite"/>
    </circle>
    <circle cx="8" cy="-3" r="2" fill="#8b5cf6">
      <animate attributeName="r" 
               values="2;3;2" 
               begin="0.6s"
               dur="2s" 
               repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Particules flottantes -->
  <g opacity="0.8">
    <!-- Particule 1 -->
    <circle cx="20" cy="60" r="2" fill="#fbbf24">
      <animate attributeName="cy" 
               values="60;20;60" 
               dur="4s" 
               repeatCount="indefinite"/>
      <animate attributeName="opacity" 
               values="0.8;0.3;0.8" 
               dur="4s" 
               repeatCount="indefinite"/>
    </circle>
    
    <!-- Particule 2 -->
    <circle cx="30" cy="65" r="1.5" fill="#8b5cf6">
      <animate attributeName="cy" 
               values="65;25;65" 
               begin="0.5s"
               dur="5s" 
               repeatCount="indefinite"/>
      <animate attributeName="opacity" 
               values="0.8;0.3;0.8" 
               begin="0.5s"
               dur="5s" 
               repeatCount="indefinite"/>
    </circle>
    
    <!-- Particule 3 -->
    <circle cx="50" cy="62" r="1.5" fill="#fbbf24">
      <animate attributeName="cy" 
               values="62;22;62" 
               begin="1s"
               dur="4.5s" 
               repeatCount="indefinite"/>
      <animate attributeName="opacity" 
               values="0.8;0.3;0.8" 
               begin="1s"
               dur="4.5s" 
               repeatCount="indefinite"/>
    </circle>
    
    <!-- Particule 4 -->
    <circle cx="60" cy="58" r="2" fill="#8b5cf6">
      <animate attributeName="cy" 
               values="58;18;58" 
               begin="1.5s"
               dur="4s" 
               repeatCount="indefinite"/>
      <animate attributeName="opacity" 
               values="0.8;0.3;0.8" 
               begin="1.5s"
               dur="4s" 
               repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Pulse rings dorés -->
  <circle cx="40" cy="40" r="34"
          fill="none"
          stroke="#fbbf24"
          stroke-width="2"
          opacity="0">
    <animate attributeName="r" 
             values="34;50;70" 
             dur="3s" 
             repeatCount="indefinite"/>
    <animate attributeName="opacity" 
             values="0.8;0.4;0" 
             dur="3s" 
             repeatCount="indefinite"/>
  </circle>
  
</svg>