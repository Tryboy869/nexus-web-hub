<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" 
     width="80" 
     height="80" 
     viewBox="0 0 80 80"
     role="img"
     aria-labelledby="pro-title pro-desc">
  
  <title id="pro-title">Badge Pro Tester</title>
  <desc id="pro-desc">Badge éclair violet, niveau professionnel testeur (50 avis + 70% utiles)</desc>
  
  <style>
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
  </style>
  
  <defs>
    <!-- Gradient violet -->
    <linearGradient id="proGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1"/>
    </linearGradient>
    
    <!-- Glow violet -->
    <filter id="proGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Cercle background -->
  <circle cx="40" cy="40" r="32"
          fill="url(#proGrad)"
          filter="url(#proGlow)">
    <animate attributeName="r" 
             values="32;34;32" 
             dur="2s" 
             repeatCount="indefinite"/>
  </circle>
  
  <!-- Éclair principal -->
  <path d="M45,15 L30,40 L38,40 L33,65 L50,38 L42,38 Z"
        fill="white"
        stroke="none"
        opacity="0">
    <animate attributeName="opacity" 
             values="0;1" 
             begin="0.3s"
             dur="0.5s" 
             fill="freeze"/>
  </path>
  
  <!-- Éclairs secondaires animés -->
  <g opacity="0.6">
    <!-- Éclair gauche -->
    <path d="M20,35 L25,40 L22,45"
          fill="none"
          stroke="#8b5cf6"
          stroke-width="2"
          stroke-linecap="round"
          opacity="0">
      <animate attributeName="opacity" 
               values="0;1;0" 
               dur="1.5s" 
               repeatCount="indefinite"/>
    </path>
    
    <!-- Éclair droite -->
    <path d="M60,35 L55,40 L58,45"
          fill="none"
          stroke="#8b5cf6"
          stroke-width="2"
          stroke-linecap="round"
          opacity="0">
      <animate attributeName="opacity" 
               values="0;1;0" 
               begin="0.5s"
               dur="1.5s" 
               repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Pulse rings multiples -->
  <circle cx="40" cy="40" r="32"
          fill="none"
          stroke="#8b5cf6"
          stroke-width="2"
          opacity="0">
    <animate attributeName="r" 
             values="32;45;60" 
             dur="2s" 
             repeatCount="indefinite"/>
    <animate attributeName="opacity" 
             values="0.6;0.3;0" 
             dur="2s" 
             repeatCount="indefinite"/>
  </circle>
  
  <circle cx="40" cy="40" r="32"
          fill="none"
          stroke="#8b5cf6"
          stroke-width="2"
          opacity="0">
    <animate attributeName="r" 
             values="32;45;60" 
             begin="0.7s"
             dur="2s" 
             repeatCount="indefinite"/>
    <animate attributeName="opacity" 
             values="0.6;0.3;0" 
             begin="0.7s"
             dur="2s" 
             repeatCount="indefinite"/>
  </circle>
  
</svg>