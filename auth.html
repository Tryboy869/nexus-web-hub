<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Nexus Web Hub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-deep-space: #0a0e27;
      --bg-card: #1a1f3a;
      --text-primary: #E0E6ED;
      --text-secondary: #a0aec0;
      --accent-cyan: #00d9ff;
      --accent-purple: #8b5cf6;
      --accent-red: #ef4444;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, var(--bg-deep-space), #1a1f3a);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    
    .container {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 3rem;
      max-width: 450px;
      width: 100%;
      border: 2px solid var(--accent-cyan);
      box-shadow: 0 20px 60px rgba(0, 217, 255, 0.2);
    }
    
    .logo {
      width: 80px;
      display: block;
      margin: 0 auto 2rem;
    }
    
    h1 {
      font-size: 2rem;
      text-align: center;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .subtitle {
      text-align: center;
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }
    
    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 2px solid var(--bg-deep-space);
    }
    
    .tab {
      flex: 1;
      padding: 1rem;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
      font-weight: 600;
      font-size: 1rem;
    }
    
    .tab.active {
      color: var(--accent-cyan);
      border-bottom-color: var(--accent-cyan);
    }
    
    .form-container {
      display: none;
    }
    
    .form-container.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    
    input {
      width: 100%;
      padding: 1rem;
      background: var(--bg-deep-space);
      border: 2px solid var(--accent-purple);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 1rem;
      transition: border-color 0.3s ease;
    }
    
    input:focus {
      outline: none;
      border-color: var(--accent-cyan);
    }
    
    .btn {
      width: 100%;
      padding: 1rem;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0, 217, 255, 0.4);
    }
    
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 2px solid var(--accent-red);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
      color: var(--accent-red);
      display: none;
    }
    
    .error-message.show {
      display: block;
      animation: shake 0.5s ease;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
    
    .back-link {
      text-align: center;
      margin-top: 2rem;
    }
    
    .back-link a {
      color: var(--accent-cyan);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: color 0.3s ease;
    }
    
    .back-link a:hover {
      color: var(--accent-purple);
    }
    
    .loading {
      display: none;
      text-align: center;
      padding: 1rem;
    }
    
    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid var(--bg-deep-space);
      border-top-color: var(--accent-cyan);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/assets/logos/logo-nwh.svg" alt="Nexus Web Hub" class="logo">
    <h1>Welcome Back</h1>
    <p class="subtitle">Join the community of webapp creators</p>
    
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('signup')">Sign Up</button>
    </div>
    
    <div class="error-message" id="error-message"></div>
    
    <!-- Login Form -->
    <div class="form-container active" id="login-form">
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="login-email">
            <i class="fa-solid fa-envelope"></i> Email
          </label>
          <input type="email" id="login-email" required placeholder="your@email.com">
        </div>
        
        <div class="form-group">
          <label for="login-password">
            <i class="fa-solid fa-lock"></i> Password
          </label>
          <input type="password" id="login-password" required placeholder="••••••••" minlength="6">
        </div>
        
        <button type="submit" class="btn btn-primary" id="login-btn">
          <i class="fa-solid fa-right-to-bracket"></i>
          Login
        </button>
      </form>
    </div>
    
    <!-- Signup Form -->
    <div class="form-container" id="signup-form">
      <form onsubmit="handleSignup(event)">
        <div class="form-group">
          <label for="signup-name">
            <i class="fa-solid fa-user"></i> Full Name
          </label>
          <input type="text" id="signup-name" required placeholder="John Doe">
        </div>
        
        <div class="form-group">
          <label for="signup-email">
            <i class="fa-solid fa-envelope"></i> Email
          </label>
          <input type="email" id="signup-email" required placeholder="your@email.com">
        </div>
        
        <div class="form-group">
          <label for="signup-password">
            <i class="fa-solid fa-lock"></i> Password
          </label>
          <input type="password" id="signup-password" required placeholder="••••••••" minlength="6">
        </div>
        
        <button type="submit" class="btn btn-primary" id="signup-btn">
          <i class="fa-solid fa-user-plus"></i>
          Create Account
        </button>
      </form>
    </div>
    
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p style="margin-top: 1rem; color: var(--text-secondary);">Processing...</p>
    </div>
    
    <div class="back-link">
      <a href="/">
        <i class="fa-solid fa-arrow-left"></i>
        Back to Home
      </a>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.form-container').forEach(f => f.classList.remove('active'));
      
      event.target.classList.add('active');
      document.getElementById(`${tab}-form`).classList.add('active');
      
      hideError();
    }

    function showError(message) {
      const errorEl = document.getElementById('error-message');
      errorEl.textContent = message;
      errorEl.classList.add('show');
    }

    function hideError() {
      const errorEl = document.getElementById('error-message');
      errorEl.classList.remove('show');
    }

    function showLoading(show) {
      document.getElementById('loading').style.display = show ? 'block' : 'none';
      document.querySelectorAll('form').forEach(f => f.style.display = show ? 'none' : 'block');
    }

    async function handleLogin(e) {
      e.preventDefault();
      hideError();
      
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      
      showLoading(true);
      
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        
        if (data.success) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('userId', data.user.id);
          localStorage.setItem('user', JSON.stringify(data.user));
          
          window.location.href = '/profile.html';
        } else {
          showError(data.message || 'Login failed');
          showLoading(false);
        }
      } catch (error) {
        showError('Network error. Please try again.');
        showLoading(false);
      }
    }

    async function handleSignup(e) {
      e.preventDefault();
      hideError();
      
      const name = document.getElementById('signup-name').value;
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      
      if (password.length < 6) {
        showError('Password must be at least 6 characters');
        return;
      }
      
      showLoading(true);
      
      try {
        const response = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        
        const data = await response.json();
        
        if (data.success) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('userId', data.user.id);
          localStorage.setItem('user', JSON.stringify(data.user));
          
          window.location.href = '/profile.html';
        } else {
          showError(data.message || 'Signup failed');
          showLoading(false);
        }
      } catch (error) {
        showError('Network error. Please try again.');
        showLoading(false);
      }
    }

    // Check if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = '/profile.html';
    }
  </script>
</body>
</html>
