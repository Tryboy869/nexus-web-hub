<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Nexus Web Hub</title>
  <link rel="icon" href="assets/logos/logo-nwh.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep-space: #0a0e27;
      --bg-card: #1a1f3a;
      --text-primary: #E0E6ED;
      --text-secondary: #a0aec0;
      --accent-cyan: #00d9ff;
      --accent-purple: #8b5cf6;
      --accent-green: #10b981;
      --accent-red: #ef4444;
      --border-glow: rgba(0, 217, 255, 0.15);
      --font-body: 'Inter', sans-serif;
      --font-heading: 'Space Grotesk', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-deep-space);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { color: inherit; text-decoration: none; }

    /* HEADER */
    header {
      padding: 1.5rem 2rem;
      text-align: center;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent-cyan);
    }

    .logo img { width: 40px; height: 40px; }

    /* MAIN */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
    }

    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border-glow);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .auth-title {
      font-family: var(--font-heading);
      font-size: 1.8rem;
      text-align: center;
      margin-bottom: 2rem;
    }

    /* TABS */
    .auth-tabs {
      display: flex;
      margin-bottom: 2rem;
      border-radius: 10px;
      overflow: hidden;
      background: var(--bg-deep-space);
    }

    .auth-tab {
      flex: 1;
      padding: 0.9rem;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
    }

    .auth-tab.active {
      background: var(--accent-cyan);
      color: #000;
    }

    /* FORMS */
    .auth-form { display: none; }
    .auth-form.active { display: block; }

    .form-group { margin-bottom: 1.5rem; }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      font-size: 0.9rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.9rem 1rem;
      background: var(--bg-deep-space);
      border: 1px solid var(--border-glow);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 1rem;
      transition: all 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent-cyan);
      box-shadow: 0 0 15px rgba(0, 217, 255, 0.2);
    }

    .form-hint {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 0.35rem;
    }

    .btn {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 1rem;
      transition: all 0.3s;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      color: #fff;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 217, 255, 0.4);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* MESSAGES */
    .message {
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      text-align: center;
      font-size: 0.9rem;
    }

    .message.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid var(--accent-red);
      color: var(--accent-red);
    }

    .message.success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid var(--accent-green);
      color: var(--accent-green);
    }

    /* FOOTER LINK */
    .auth-footer {
      text-align: center;
      margin-top: 2rem;
    }

    .auth-footer a {
      color: var(--accent-cyan);
    }

    .auth-footer a:hover { text-decoration: underline; }

    /* DECORATIONS */
    .decoration {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-cyan), transparent);
      opacity: 0.05;
      pointer-events: none;
    }

    .decoration.top-left { top: -100px; left: -100px; }
    .decoration.bottom-right { bottom: -100px; right: -100px; background: radial-gradient(circle, var(--accent-purple), transparent); }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="decoration top-left"></div>
  <div class="decoration bottom-right"></div>

  <!-- HEADER -->
  <header>
    <a href="/" class="logo">
      <img src="assets/logos/logo-nwh.svg" alt="NWH">
      Nexus Web Hub
    </a>
  </header>

  <!-- MAIN -->
  <main>
    <div class="auth-container">
      <div class="auth-card">
        <h1 class="auth-title">Bienvenue</h1>

        <!-- TABS -->
        <div class="auth-tabs">
          <button class="auth-tab active" onclick="switchTab('login')">Connexion</button>
          <button class="auth-tab" onclick="switchTab('signup')">Inscription</button>
        </div>

        <!-- MESSAGES -->
        <div id="errorMessage" class="message error hidden"></div>
        <div id="successMessage" class="message success hidden"></div>

        <!-- LOGIN FORM -->
        <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" required placeholder="vous@exemple.com">
          </div>
          <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="loginPassword" required placeholder="••••••••">
          </div>
          <button type="submit" class="btn" id="loginBtn">Se connecter</button>
        </form>

        <!-- SIGNUP FORM -->
        <form class="auth-form" id="signupForm" onsubmit="handleSignup(event)">
          <div class="form-group">
            <label>Nom complet</label>
            <input type="text" id="signupName" required placeholder="Votre nom">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="signupEmail" required placeholder="vous@exemple.com">
          </div>
          <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="signupPassword" required placeholder="••••••••">
            <div class="form-hint">Au moins 6 caractères</div>
          </div>
          <button type="submit" class="btn" id="signupBtn">Créer mon compte</button>
        </form>

        <!-- FOOTER -->
        <div class="auth-footer">
          <a href="/">← Retour à l'accueil</a>
        </div>
      </div>
    </div>
  </main>

  <script>
    // Check if already logged in
    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('token');
      if (token) {
        window.location.href = 'profile.html';
      }
    });

    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      
      if (tab === 'login') {
        document.querySelectorAll('.auth-tab')[0].classList.add('active');
        document.getElementById('loginForm').classList.add('active');
      } else {
        document.querySelectorAll('.auth-tab')[1].classList.add('active');
        document.getElementById('signupForm').classList.add('active');
      }

      hideMessages();
    }

    function showError(msg) {
      document.getElementById('errorMessage').textContent = msg;
      document.getElementById('errorMessage').classList.remove('hidden');
      document.getElementById('successMessage').classList.add('hidden');
    }

    function showSuccess(msg) {
      document.getElementById('successMessage').textContent = msg;
      document.getElementById('successMessage').classList.remove('hidden');
      document.getElementById('errorMessage').classList.add('hidden');
    }

    function hideMessages() {
      document.getElementById('errorMessage').classList.add('hidden');
      document.getElementById('successMessage').classList.add('hidden');
    }

    async function handleLogin(e) {
      e.preventDefault();
      hideMessages();

      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');

      btn.disabled = true;
      btn.textContent = 'Connexion...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (data.success) {
          localStorage.setItem('token', data.data.token);
          localStorage.setItem('user', JSON.stringify(data.data.user));
          showSuccess('Connexion réussie ! Redirection...');
          
          setTimeout(() => {
            const redirect = new URLSearchParams(window.location.search).get('redirect');
            window.location.href = redirect || '/';
          }, 1000);
        } else {
          showError(data.message);
          btn.disabled = false;
          btn.textContent = 'Se connecter';
        }
      } catch (err) {
        console.error(err);
        showError('Erreur de connexion');
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    }

    async function handleSignup(e) {
      e.preventDefault();
      hideMessages();

      const name = document.getElementById('signupName').value;
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;
      const btn = document.getElementById('signupBtn');

      if (password.length < 6) {
        showError('Le mot de passe doit contenir au moins 6 caractères');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Création...';

      try {
        const res = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();

        if (data.success) {
          localStorage.setItem('token', data.data.token);
          localStorage.setItem('user', JSON.stringify(data.data.user));
          showSuccess('Compte créé ! Redirection...');
          
          setTimeout(() => {
            window.location.href = '/';
          }, 1000);
        } else {
          showError(data.message);
          btn.disabled = false;
          btn.textContent = 'Créer mon compte';
        }
      } catch (err) {
        console.error(err);
        showError('Erreur lors de la création');
        btn.disabled = false;
        btn.textContent = 'Créer mon compte';
      }
    }
  </script>
</body>
</html>
