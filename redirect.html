<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting... | Nexus Web Hub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-deep-space: #0a0e27;
      --bg-card: #1a1f3a;
      --text-primary: #E0E6ED;
      --text-secondary: #a0aec0;
      --accent-cyan: #00d9ff;
      --accent-purple: #8b5cf6;
      --accent-red: #ef4444;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, var(--bg-deep-space), #1a1f3a);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    
    .container {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 3rem;
      max-width: 600px;
      width: 100%;
      text-align: center;
      border: 2px solid var(--accent-cyan);
      box-shadow: 0 20px 60px rgba(0, 217, 255, 0.3);
    }
    
    .logo {
      width: 80px;
      margin-bottom: 2rem;
    }
    
    .rocket-animation {
      margin: 2rem 0;
      animation: float 2s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    
    .rocket-icon {
      font-size: 5rem;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: var(--accent-cyan);
    }
    
    .url-display {
      background: var(--bg-deep-space);
      padding: 1rem;
      border-radius: 12px;
      margin: 1.5rem 0;
      word-break: break-all;
      color: var(--text-secondary);
      font-family: 'Monaco', 'Courier New', monospace;
    }
    
    .warning-box {
      background: rgba(239, 68, 68, 0.1);
      border: 2px solid var(--accent-red);
      border-radius: 12px;
      padding: 1.5rem;
      margin: 2rem 0;
      text-align: left;
    }
    
    .warning-box strong {
      color: var(--accent-red);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    
    .countdown {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent-cyan);
      margin: 2rem 0;
    }
    
    .countdown .number {
      font-size: 3rem;
      display: inline-block;
      animation: pulse 1s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--bg-deep-space);
      border-radius: 4px;
      overflow: hidden;
      margin: 2rem 0;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
      border-radius: 4px;
      animation: progress 5s linear;
    }
    
    @keyframes progress {
      from { width: 0%; }
      to { width: 100%; }
    }
    
    .buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .btn {
      padding: 1rem 2rem;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0, 217, 255, 0.4);
    }
    
    .btn-secondary {
      background: transparent;
      border: 2px solid var(--accent-cyan);
      color: var(--accent-cyan);
    }
    
    .btn-secondary:hover {
      background: var(--accent-cyan);
      color: var(--bg-deep-space);
    }

    @media (max-width: 600px) {
      .container {
        padding: 2rem;
      }
      h1 {
        font-size: 1.5rem;
      }
      .buttons {
        flex-direction: column;
      }
      .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="/assets/logos/logo-nwh.svg" alt="Nexus Web Hub" class="logo">
    
    <div class="rocket-animation">
      <i class="fa-solid fa-rocket rocket-icon"></i>
    </div>
    
    <h1>Leaving Nexus Web Hub</h1>
    <p style="color: var(--text-secondary); margin-bottom: 1rem;">You will be redirected to:</p>
    
    <div class="url-display" id="target-url"></div>
    
    <div class="warning-box">
      <strong>
        <i class="fa-solid fa-triangle-exclamation"></i>
        Security Notice
      </strong>
      <p style="color: var(--text-secondary); line-height: 1.6;">
        This webapp is hosted outside Nexus Web Hub. We do not control its content, availability, or security. 
        Proceed at your own discretion.
      </p>
    </div>
    
    <div class="countdown">
      Redirecting in <span class="number" id="countdown">5</span> seconds...
    </div>
    
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
    
    <div class="buttons">
      <button class="btn btn-primary" onclick="redirectNow()">
        <i class="fa-solid fa-arrow-up-right-from-square"></i>
        Continue Now
      </button>
      <a href="/" class="btn btn-secondary">
        <i class="fa-solid fa-arrow-left"></i>
        Back to Catalog
      </a>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const targetUrl = urlParams.get('url');
    const webappId = urlParams.get('id');
    const source = urlParams.get('source') || 'direct';

    if (!targetUrl || !webappId) {
      window.location.href = '/';
    }

    // Display URL
    document.getElementById('target-url').textContent = targetUrl;

    // Countdown
    let seconds = 5;
    const countdownEl = document.getElementById('countdown');

    const interval = setInterval(() => {
      seconds--;
      countdownEl.textContent = seconds;
      
      if (seconds === 0) {
        clearInterval(interval);
        redirectNow();
      }
    }, 1000);

    function redirectNow() {
      clearInterval(interval);
      window.location.href = targetUrl;
    }

    // Track click
    const userId = localStorage.getItem('userId');
    if (userId) {
      fetch(`/api/webapps/${webappId}/click`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-User-Id': userId
        },
        body: JSON.stringify({ source })
      }).catch(err => console.log('Click tracking error:', err));
    }
  </script>
</body>
</html>
