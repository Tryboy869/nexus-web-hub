<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | Nexus Web Hub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep-space: #0a0e27;
      --bg-card: #1a1f3a;
      --text-primary: #E0E6ED;
      --text-secondary: #a0aec0;
      --accent-cyan: #00d9ff;
      --accent-purple: #8b5cf6;
      --accent-green: #10b981;
      --accent-gold: #fbbf24;
      --accent-red: #ef4444;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-deep-space);
      color: var(--text-primary);
      line-height: 1.6;
    }

    nav {
      background: rgba(26, 31, 58, 0.9);
      backdrop-filter: blur(10px);
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid rgba(0, 217, 255, 0.1);
    }

    nav .container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    nav .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--accent-cyan);
      text-decoration: none;
    }

    nav .logo svg {
      width: 32px;
      height: 32px;
    }

    nav .nav-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    nav a {
      color: var(--text-secondary);
      text-decoration: none;
    }

    nav a:hover {
      color: var(--accent-cyan);
    }

    .notif-bell {
      position: relative;
      cursor: pointer;
      font-size: 1.3rem;
      color: var(--text-secondary);
    }

    .notif-bell:hover {
      color: var(--accent-cyan);
    }

    .notif-bell .badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: var(--accent-red);
      color: white;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: bold;
    }

    .notif-dropdown {
      display: none;
      position: absolute;
      top: 60px;
      right: 2rem;
      width: 400px;
      max-height: 500px;
      overflow-y: auto;
      background: var(--bg-card);
      border-radius: 12px;
      border: 1px solid rgba(0, 217, 255, 0.2);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      z-index: 2000;
    }

    .notif-dropdown.active {
      display: block;
    }

    .notif-header {
      padding: 1rem;
      border-bottom: 1px solid rgba(0, 217, 255, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .notif-item {
      padding: 1rem;
      border-bottom: 1px solid rgba(0, 217, 255, 0.05);
      cursor: pointer;
      transition: background 0.3s;
    }

    .notif-item:hover {
      background: rgba(0, 217, 255, 0.05);
    }

    .notif-item.unread {
      background: rgba(0, 217, 255, 0.08);
      border-left: 3px solid var(--accent-cyan);
    }

    .notif-item .notif-title {
      font-weight: 600;
      margin-bottom: 0.3rem;
    }

    .notif-item .notif-message {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 0.3rem;
    }

    .notif-item .notif-time {
      color: var(--text-secondary);
      font-size: 0.75rem;
    }

    .notif-empty {
      padding: 2rem;
      text-align: center;
      color: var(--text-secondary);
    }

    .container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 2rem;
    }

    .profile-header {
      background: var(--bg-card);
      padding: 2rem;
      border-radius: 12px;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: bold;
      color: white;
    }

    .profile-info h1 {
      margin-bottom: 0.5rem;
    }

    .profile-info .email {
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }

    .badges {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .badge-item {
      padding: 0.3rem 0.8rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      background: rgba(0, 217, 255, 0.1);
      color: var(--accent-cyan);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .badge-item svg {
      width: 16px;
      height: 16px;
    }

    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 2px solid rgba(0, 217, 255, 0.1);
    }

    .tab {
      padding: 0.8rem 1.5rem;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.3s;
      font-weight: 600;
    }

    .tab.active {
      color: var(--accent-cyan);
      border-bottom-color: var(--accent-cyan);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .search-bar {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .search-bar input {
      flex: 1;
      padding: 1rem;
      background: var(--bg-card);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 1rem;
    }

    .btn {
      padding: 0.8rem 1.5rem;
      border-radius: 10px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s;
      cursor: pointer;
      border: none;
      font-size: 1rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      color: white;
    }

    .btn-secondary {
      background: transparent;
      border: 2px solid var(--accent-cyan);
      color: var(--accent-cyan);
    }

    .btn-danger {
      background: transparent;
      border: 2px solid var(--accent-red);
      color: var(--accent-red);
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .webapps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .webapp-card {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 1.5rem;
      border: 1px solid rgba(0, 217, 255, 0.1);
    }

    .webapp-card h3 {
      margin-bottom: 0.5rem;
    }

    .webapp-card .stats {
      display: flex;
      gap: 1rem;
      margin: 1rem 0;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .webapp-card .actions {
      display: flex;
      gap: 0.5rem;
    }

    .icon-btn {
      background: transparent;
      border: 1px solid rgba(0, 217, 255, 0.2);
      color: var(--text-secondary);
      padding: 0.5rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .icon-btn:hover {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }

    .collections-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1.5rem;
    }

    .collection-card {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 1.5rem;
      border: 1px solid rgba(0, 217, 255, 0.1);
      transition: all 0.3s;
      position: relative;
    }

    .collection-card:hover {
      border-color: var(--accent-cyan);
      transform: translateY(-5px);
    }

    .collection-card h3 {
      margin-bottom: 0.5rem;
      cursor: pointer;
    }

    .collection-card .description {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    .collection-card .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }

    .collection-card .actions {
      display: flex;
      gap: 0.5rem;
    }

    .logout-btn {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--accent-red);
      color: white;
      padding: 1rem 1.5rem;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3);
      transition: all 0.3s;
    }

    .logout-btn:hover {
      transform: scale(1.05);
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: var(--bg-card);
      padding: 2rem;
      border-radius: 16px;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
      margin: 1rem;
      border: 1px solid var(--accent-cyan);
    }

    .modal-content h3 {
      margin-bottom: 1rem;
      color: var(--accent-cyan);
    }

    .modal-content input,
    .modal-content textarea {
      width: 100%;
      padding: 1rem;
      background: var(--bg-deep-space);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: inherit;
      margin-bottom: 1rem;
    }

    .modal-content .buttons {
      display: flex;
      gap: 1rem;
    }

    .modal-content label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      color: var(--text-secondary);
    }

    .webapp-item {
      padding: 1rem;
      background: rgba(0, 217, 255, 0.05);
      border-radius: 8px;
      margin-bottom: 0.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .webapp-item:hover {
      background: rgba(0, 217, 255, 0.1);
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-secondary);
    }

    @media (max-width: 768px) {
      .profile-header {
        flex-direction: column;
        text-align: center;
      }

      .webapps-grid, .collections-grid {
        grid-template-columns: 1fr;
      }

      .logout-btn {
        bottom: 1rem;
        right: 1rem;
      }

      .notif-dropdown {
        width: calc(100vw - 2rem);
        right: 1rem;
      }
    }
  </style>
</head>
<body>
  <nav>
    <div class="container">
      <a href="/" class="logo">
        <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="100" cy="100" r="90" stroke="#00d9ff" stroke-width="8"/>
          <path d="M100 40 L140 100 L100 160 L60 100 Z" fill="#00d9ff"/>
        </svg>
        <span>Nexus Web Hub</span>
      </a>

      <div class="nav-actions">
        <div class="notif-bell" onclick="toggleNotifications()">
          <i class="fa-solid fa-bell"></i>
          <span class="badge" id="notif-badge" style="display: none;">0</span>
        </div>
        <a href="/">Back to catalog</a>
      </div>
    </div>
  </nav>

  <div class="notif-dropdown" id="notif-dropdown">
    <div class="notif-header">
      <h3>Notifications</h3>
      <button class="btn btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.85rem;" onclick="markAllAsRead()">
        Mark all as read
      </button>
    </div>
    <div id="notif-list"></div>
  </div>

  <div class="container">
    <div class="profile-header">
      <div class="avatar" id="avatar"></div>
      <div class="profile-info">
        <h1 id="user-name">Loading...</h1>
        <p class="email" id="user-email"></p>
        <div class="badges" id="badges"></div>
        <p style="color: var(--text-secondary); margin-top: 1rem;">
          <span id="webapps-count">0</span> Webapps published •
          <span id="collections-count">0</span> Collections
        </p>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('webapps')">
        <i class="fa-solid fa-th-large"></i> My Webapps
      </button>
      <button class="tab" onclick="switchTab('collections')">
        <i class="fa-solid fa-folder"></i> My Collections
      </button>
    </div>

    <div class="tab-content active" id="webapps-tab">
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search your webapps...">
        <a href="/submit.html" class="btn btn-primary">
          <i class="fa-solid fa-plus"></i> New Webapp
        </a>
      </div>

      <div class="webapps-grid" id="webapps-grid"></div>

      <div class="empty-state" id="empty-state" style="display: none;">
        <i class="fa-solid fa-box-open" style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.5;"></i>
        <p>No webapps yet</p>
        <a href="/submit.html" class="btn btn-primary" style="margin-top: 1rem;">
          <i class="fa-solid fa-plus"></i> Create your first webapp
        </a>
      </div>
    </div>

    <div class="tab-content" id="collections-tab">
      <div class="search-bar">
        <input type="text" id="search-collections-input" placeholder="Search collections...">
        <button class="btn btn-primary" onclick="showCreateCollectionModal()">
          <i class="fa-solid fa-plus"></i> New Collection
        </button>
      </div>

      <div class="collections-grid" id="collections-grid"></div>

      <div class="empty-state" id="collections-empty" style="display: none;">
        <i class="fa-solid fa-folder-open" style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.5;"></i>
        <p>No collections yet</p>
        <button class="btn btn-primary" style="margin-top: 1rem;" onclick="showCreateCollectionModal()">
          <i class="fa-solid fa-plus"></i> Create your first collection
        </button>
      </div>
    </div>
  </div>

  <div class="modal" id="delete-modal">
    <div class="modal-content">
      <h3><i class="fa-solid fa-triangle-exclamation"></i> Confirm Deletion</h3>
      <p style="margin-bottom: 1rem; color: var(--text-secondary);">
        This action is irreversible. Enter your password to confirm.
      </p>
      <input type="password" id="delete-password" placeholder="Your password">
      <div class="buttons">
        <button class="btn btn-secondary" onclick="closeDeleteModal()">Cancel</button>
        <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <div class="modal" id="create-collection-modal">
    <div class="modal-content">
      <h3><i class="fa-solid fa-folder-plus"></i> Create Collection</h3>
      <input type="text" id="collection-name" placeholder="Collection name" maxlength="50">
      <textarea id="collection-description" placeholder="Description (optional)" rows="3"></textarea>
      <label>
        <input type="checkbox" id="collection-public">
        Make this collection public
      </label>
      <div class="buttons">
        <button class="btn btn-secondary" onclick="closeCreateCollectionModal()">Cancel</button>
        <button class="btn btn-primary" onclick="createCollection()">Create</button>
      </div>
    </div>
  </div>

  <div class="modal" id="edit-collection-modal">
    <div class="modal-content">
      <h3><i class="fa-solid fa-edit"></i> Edit Collection</h3>
      <input type="text" id="edit-collection-name" placeholder="Collection name" maxlength="50">
      <textarea id="edit-collection-description" placeholder="Description (optional)" rows="3"></textarea>
      <label>
        <input type="checkbox" id="edit-collection-public">
        Make this collection public
      </label>
      <div class="buttons">
        <button class="btn btn-secondary" onclick="closeEditCollectionModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveCollectionEdits()">Save Changes</button>
      </div>
    </div>
  </div>

  <div class="modal" id="view-collection-modal">
    <div class="modal-content">
      <h3 id="view-collection-title"></h3>
      <div id="collection-webapps-list"></div>
      <div class="buttons" style="margin-top: 1rem;">
        <button class="btn btn-secondary" onclick="closeViewCollectionModal()">Close</button>
      </div>
    </div>
  </div>

  <button class="logout-btn" onclick="logout()">
    <i class="fa-solid fa-right-from-bracket"></i> Logout
  </button>

  <script>
    let user = null;
    let webapps = [];
    let collections = [];
    let notifications = [];
    let webappToDelete = null;
    let collectionToEdit = null;
    let currentViewCollection = null;

    function checkAuth() {
      const token = localStorage.getItem('token');
      const userStr = localStorage.getItem('user');

      if (!token || !userStr) {
        window.location.href = '/auth.html?return=/profile.html';
        return;
      }

      user = JSON.parse(userStr);
      renderProfile();
      loadWebapps();
      loadCollections();
      loadNotifications();
      
      if (window.location.hash === '#collections') {
        switchTab('collections');
      }
    }

    function renderProfile() {
      const initials = user.name.split(' ').map(n => n[0]).join('').toUpperCase();
      document.getElementById('avatar').textContent = initials;
      document.getElementById('user-name').textContent = user.name;
      document.getElementById('user-email').textContent = user.email;

      const badgesHTML = user.badges.map(badge => 
        `<span class="badge-item">${badge}</span>`
      ).join('');
      document.getElementById('badges').innerHTML = badgesHTML || '<span class="badge-item">New Member</span>';
    }

    async function loadNotifications() {
      try {
        const response = await fetch('/api/notifications', {
          headers: { 'X-User-Id': user.id }
        });
        const data = await response.json();

        if (data.success) {
          notifications = data.notifications;
          
          if (data.unread_count > 0) {
            document.getElementById('notif-badge').textContent = data.unread_count;
            document.getElementById('notif-badge').style.display = 'flex';
          }
          
          renderNotifications();
        }
      } catch (error) {
        console.error('Error loading notifications:', error);
      }
    }

    function renderNotifications() {
      const notifList = document.getElementById('notif-list');
      
      if (notifications.length === 0) {
        notifList.innerHTML = '<div class="notif-empty">No notifications</div>';
        return;
      }

      notifList.innerHTML = notifications.map(n => `
        <div class="notif-item ${n.read === 0 ? 'unread' : ''}" onclick="handleNotificationClick('${n.id}', '${n.type}', ${JSON.stringify(n.data).replace(/"/g, '&quot;')})">
          <div class="notif-title">${n.title}</div>
          <div class="notif-message">${n.message}</div>
          <div class="notif-time">${timeAgo(n.created_at)}</div>
        </div>
      `).join('');
    }

    async function handleNotificationClick(notifId, type, data) {
      await markAsRead(notifId);
      
      if (data && data.webappId) {
        window.location.href = `/webapp.html?id=${data.webappId}`;
      } else if (data && data.reviewId) {
        window.location.href = `/webapp.html?id=${data.webappId}#reviews`;
      }
    }

    function toggleNotifications() {
      document.getElementById('notif-dropdown').classList.toggle('active');
    }

    async function markAsRead(notifId) {
      try {
        await fetch(`/api/notifications/${notifId}/read`, {
          method: 'POST',
          headers: { 'X-User-Id': user.id }
        });
        loadNotifications();
      } catch (error) {
        console.error('Error marking notification as read:', error);
      }
    }

    async function markAllAsRead() {
      try {
        await fetch('/api/notifications/read-all', {
          method: 'POST',
          headers: { 'X-User-Id': user.id }
        });
        loadNotifications();
      } catch (error) {
        console.error('Error marking all as read:', error);
      }
    }

    function timeAgo(timestamp) {
      const seconds = Math.floor((Date.now() - timestamp) / 1000);
      if (seconds < 60) return 'Just now';
      if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
      if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
      return `${Math.floor(seconds / 86400)}d ago`;
    }

    async function loadWebapps() {
      try {
        const response = await fetch(`/api/webapps/user/${user.id}`);
        const data = await response.json();

        webapps = data.webapps;
        document.getElementById('webapps-count').textContent = webapps.length;

        if (webapps.length === 0) {
          document.getElementById('webapps-grid').style.display = 'none';
          document.getElementById('empty-state').style.display = 'block';
        } else {
          renderWebapps(webapps);
        }
      } catch (error) {
        console.error('Error loading webapps:', error);
      }
    }

    function renderWebapps(webappsToRender) {
      const grid = document.getElementById('webapps-grid');
      grid.style.display = 'grid';
      document.getElementById('empty-state').style.display = 'none';

      grid.innerHTML = webappsToRender.map(webapp => `
        <div class="webapp-card">
          <h3>${webapp.name}</h3>
          <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 0.5rem;">
            ${webapp.description_short}
          </p>
          <div class="stats">
            <span><i class="fa-solid fa-star"></i> ${webapp.avg_rating.toFixed(1)}</span>
            <span><i class="fa-solid fa-eye"></i> ${webapp.views_count}</span>
            <span><i class="fa-solid fa-comment"></i> ${webapp.reviews_count}</span>
          </div>
          <div class="actions">
            <button class="icon-btn" onclick="window.location.href='/webapp.html?id=${webapp.id}'" title="View">
              <i class="fa-solid fa-eye"></i>
            </button>
            <button class="icon-btn" onclick="window.location.href='/submit.html?edit=${webapp.id}'" title="Edit">
              <i class="fa-solid fa-edit"></i>
            </button>
            <button class="icon-btn" onclick="showDeleteModal('${webapp.id}')" title="Delete" style="color: var(--accent-red);">
              <i class="fa-solid fa-trash"></i>
            </button>
          </div>
        </div>
      `).join('');
    }

    async function loadCollections() {
      try {
        const response = await fetch('/api/collections', {
          headers: { 'X-User-Id': user.id }
        });
        const data = await response.json();

        if (data.success) {
          collections = data.collections;
          document.getElementById('collections-count').textContent = collections.length;

          if (collections.length === 0) {
            document.getElementById('collections-grid').style.display = 'none';
            document.getElementById('collections-empty').style.display = 'block';
          } else {
            renderCollections(collections);
          }
        }
      } catch (error) {
        console.error('Error loading collections:', error);
      }
    }

    function renderCollections(collectionsToRender) {
      const grid = document.getElementById('collections-grid');
      grid.style.display = 'grid';
      document.getElementById('collections-empty').style.display = 'none';

      grid.innerHTML = collectionsToRender.map(col => `
        <div class="collection-card">
          <h3 onclick="viewCollectionWebapps('${col.id}')">${col.name}</h3>
          <p class="description">${col.description || 'No description'}</p>
          <div class="meta">
            <span><i class="fa-solid fa-layer-group"></i> ${col.items_count} items</span>
            <span>${col.is_public ? '<i class="fa-solid fa-globe"></i> Public' : '<i class="fa-solid fa-lock"></i> Private'}</span>
          </div>
          <div class="actions">
            <button class="icon-btn" onclick="viewCollectionWebapps('${col.id}')" title="View">
              <i class="fa-solid fa-eye"></i>
            </button>
            <button class="icon-btn" onclick="showEditCollectionModal('${col.id}')" title="Edit">
              <i class="fa-solid fa-edit"></i>
            </button>
            <button class="icon-btn" onclick="deleteCollection('${col.id}')" title="Delete" style="color: var(--accent-red);">
              <i class="fa-solid fa-trash"></i>
            </button>
          </div>
        </div>
      `).join('');
    }

    async function viewCollectionWebapps(collectionId) {
      try {
        const response = await fetch(`/api/collections/${collectionId}/webapps`, {
          headers: { 'X-User-Id': user.id }
        });
        const data = await response.json();

        if (data.success) {
          currentViewCollection = collectionId;
          const collection = collections.find(c => c.id === collectionId);
          document.getElementById('view-collection-title').textContent = collection.name;

          if (data.webapps.length === 0) {
            document.getElementById('collection-webapps-list').innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 2rem;">This collection is empty</p>';
          } else {
            const webappsHTML = data.webapps.map(w => `
              <div class="webapp-item">
                <div>
                  <strong>${w.name}</strong>
                  <small style="display: block; color: var(--text-secondary);">${w.description_short}</small>
                </div>
                <div style="display: flex; gap: 0.5rem;">
                  <button class="icon-btn" onclick="window.open('/webapp.html?id=${w.id}', '_blank')" title="View">
                    <i class="fa-solid fa-eye"></i>
                  </button>
                  <button class="icon-btn" onclick="removeWebappFromCollection('${collectionId}', '${w.id}')" title="Remove" style="color: var(--accent-red);">
                    <i class="fa-solid fa-trash"></i>
                  </button>
                </div>
              </div>
            `).join('');
            document.getElementById('collection-webapps-list').innerHTML = webappsHTML;
          }

          document.getElementById('view-collection-modal').style.display = 'flex';
        }
      } catch (error) {
        console.error('Error loading collection webapps:', error);
        alert('Error loading collection webapps');
      }
    }

    function closeViewCollectionModal() {
      document.getElementById('view-collection-modal').style.display = 'none';
    }

    async function removeWebappFromCollection(collectionId, webappId) {
      if (!confirm('Remove this webapp from the collection?')) return;

      try {
        const response = await fetch(`/api/collections/${collectionId}/remove/${webappId}`, {
          method: 'DELETE',
          headers: { 'X-User-Id': user.id }
        });
        const data = await response.json();

        if (data.success) {
          viewCollectionWebapps(collectionId);
          loadCollections();
        } else {
          alert(data.message);
        }
      } catch (error) {
        console.error('Error removing webapp:', error);
        alert('Error removing webapp');
      }
    }

    function showEditCollectionModal(collectionId) {
      const collection = collections.find(c => c.id === collectionId);
      collectionToEdit = collectionId;

      document.getElementById('edit-collection-name').value = collection.name;
      document.getElementById('edit-collection-description').value = collection.description || '';
      document.getElementById('edit-collection-public').checked = collection.is_public === 1;

      document.getElementById('edit-collection-modal').style.display = 'flex';
    }

    function closeEditCollectionModal() {
      collectionToEdit = null;
      document.getElementById('edit-collection-modal').style.display = 'none';
    }

    async function saveCollectionEdits() {
      const name = document.getElementById('edit-collection-name').value.trim();
      const description = document.getElementById('edit-collection-description').value.trim();
      const isPublic = document.getElementById('edit-collection-public').checked;

      if (!name) {
        alert('Please enter a collection name');
        return;
      }

      try {
        const response = await fetch(`/api/collections/${collectionToEdit}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-User-Id': user.id
          },
          body: JSON.stringify({
            name,
            description,
            is_public: isPublic
          })
        });

        const data = await response.json();

        if (data.success) {
          alert('Collection updated!');
          closeEditCollectionModal();
          loadCollections();
        } else {
          alert(data.message);
        }
      } catch (error) {
        console.error('Error updating collection:', error);
        alert('Error updating collection');
      }
    }

    async function deleteCollection(collectionId) {
      if (!confirm('Are you sure you want to delete this collection? This action cannot be undone.')) return;

      try {
        const response = await fetch(`/api/collections/${collectionId}`, {
          method: 'DELETE',
          headers: { 'X-User-Id': user.id }
        });

        const data = await response.json();

        if (data.success) {
          alert('Collection deleted successfully');
          loadCollections();
        } else {
          alert(data.message);
        }
      } catch (error) {
        console.error('Error deleting collection:', error);
        alert('Error deleting collection');
      }
    }

    function showCreateCollectionModal() {
      document.getElementById('create-collection-modal').style.display = 'flex';
    }

    function closeCreateCollectionModal() {
      document.getElementById('collection-name').value = '';
      document.getElementById('collection-description').value = '';
      document.getElementById('collection-public').checked = false;
      document.getElementById('create-collection-modal').style.display = 'none';
    }

    async function createCollection() {
      const name = document.getElementById('collection-name').value.trim();
      const description = document.getElementById('collection-description').value.trim();
      const isPublic = document.getElementById('collection-public').checked;

      if (!name) {
        alert('Please enter a collection name');
        return;
      }

      try {
        const response = await fetch('/api/collections', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-User-Id': user.id
          },
          body: JSON.stringify({
            name,
            description,
            is_public: isPublic
          })
        });

        const data = await response.json();

        if (data.success) {
          alert('Collection created!');
          closeCreateCollectionModal();
          loadCollections();
        } else {
          alert(data.message);
        }
      } catch (error) {
        console.error('Error creating collection:', error);
        alert('Error creating collection');
      }
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
      const search = e.target.value.toLowerCase();
      const filtered = webapps.filter(w => 
        w.name.toLowerCase().includes(search) || 
        w.description_short.toLowerCase().includes(search)
      );
      renderWebapps(filtered);
    });

    document.getElementById('search-collections-input').addEventListener('input', (e) => {
      const search = e.target.value.toLowerCase();
      const filtered = collections.filter(c => 
        c.name.toLowerCase().includes(search) || 
        (c.description && c.description.toLowerCase().includes(search))
      );
      renderCollections(filtered);
    });

    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

      document.querySelector(`button[onclick="switchTab('${tabName}')"]`).classList.add('active');
      document.getElementById(`${tabName}-tab`).classList.add('active');
    }

    function showDeleteModal(webappId) {
      webappToDelete = webappId;
      document.getElementById('delete-modal').style.display = 'flex';
    }

    function closeDeleteModal() {
      webappToDelete = null;
      document.getElementById('delete-password').value = '';
      document.getElementById('delete-modal').style.display = 'none';
    }

    async function confirmDelete() {
      const password = document.getElementById('delete-password').value;

      if (!password) {
        alert('Please enter your password');
        return;
      }

      try {
        const response = await fetch(`/api/webapps/${webappToDelete}`, {
          method: 'DELETE',
          headers: {
            'Content-Type': 'application/json',
            'X-User-Id': user.id
          },
          body: JSON.stringify({ password })
        });

        const data = await response.json();

        if (data.success) {
          alert('Webapp deleted successfully');
          closeDeleteModal();
          loadWebapps();
        } else {
          alert(data.message || 'Failed to delete webapp');
        }
      } catch (error) {
        console.error('Error deleting webapp:', error);
        alert('Error deleting webapp');
      }
    }

    function logout() {
      if (confirm('Are you sure you want to logout?')) {
        localStorage.removeItem('token');
        localStorage.removeItem('userId');
        localStorage.removeItem('user');
        window.location.href = '/';
      }
    }

    document.addEventListener('click', (e) => {
      const dropdown = document.getElementById('notif-dropdown');
      const bell = document.querySelector('.notif-bell');
      
      if (!dropdown.contains(e.target) && !bell.contains(e.target)) {
        dropdown.classList.remove('active');
      }
    });

    document.addEventListener('DOMContentLoaded', checkAuth);
  </script>
</body>
</html>
