<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | Nexus Web Hub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-deep-space: #0a0e27;
      --bg-card: #1a1f3a;
      --text-primary: #E0E6ED;
      --text-secondary: #a0aec0;
      --accent-cyan: #00d9ff;
      --accent-purple: #8b5cf6;
      --accent-green: #10b981;
      --accent-gold: #fbbf24;
      --accent-red: #ef4444;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-deep-space);
      color: var(--text-primary);
      line-height: 1.6;
    }
    
    /* Navbar */
    nav {
      background: rgba(26, 31, 58, 0.9);
      backdrop-filter: blur(10px);
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid rgba(0, 217, 255, 0.1);
    }
    
    nav .container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    nav .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--accent-cyan);
      text-decoration: none;
    }
    
    nav .logo img {
      width: 32px;
      height: 32px;
    }
    
    nav a {
      color: var(--text-secondary);
      text-decoration: none;
    }
    
    nav a:hover {
      color: var(--accent-cyan);
    }
    
    /* Container */
    .container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 2rem;
    }
    
    /* Profile Header */
    .profile-header {
      background: var(--bg-card);
      padding: 2rem;
      border-radius: 12px;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    
    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: bold;
      color: white;
    }
    
    .profile-info h1 {
      margin-bottom: 0.5rem;
    }
    
    .profile-info .email {
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }
    
    .badges {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    
    .badge {
      padding: 0.3rem 0.8rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      background: rgba(0, 217, 255, 0.1);
      color: var(--accent-cyan);
    }
    
    /* Tabs */
    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 2px solid rgba(0, 217, 255, 0.1);
    }
    
    .tab {
      padding: 0.8rem 1.5rem;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.3s;
      font-weight: 600;
    }
    
    .tab.active {
      color: var(--accent-cyan);
      border-bottom-color: var(--accent-cyan);
    }
    
    .tab-content {
      display: none;
    }
    
    .tab-content.active {
      display: block;
    }
    
    /* Search Bar */
    .search-bar {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    
    .search-bar input {
      flex: 1;
      padding: 1rem;
      background: var(--bg-card);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 1rem;
    }
    
    .btn {
      padding: 0.8rem 1.5rem;
      border-radius: 10px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s;
      cursor: pointer;
      border: none;
      font-size: 1rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      color: white;
    }
    
    .btn-secondary {
      background: transparent;
      border: 2px solid var(--accent-cyan);
      color: var(--accent-cyan);
    }
    
    .btn-danger {
      background: transparent;
      border: 2px solid var(--accent-red);
      color: var(--accent-red);
    }
    
    .btn:hover {
      transform: translateY(-2px);
    }
    
    /* Webapps Grid */
    .webapps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    
    .webapp-card {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 1.5rem;
      border: 1px solid rgba(0, 217, 255, 0.1);
    }
    
    .webapp-card h3 {
      margin-bottom: 0.5rem;
    }
    
    .webapp-card .stats {
      display: flex;
      gap: 1rem;
      margin: 1rem 0;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    
    .webapp-card .actions {
      display: flex;
      gap: 0.5rem;
    }
    
    .icon-btn {
      background: transparent;
      border: 1px solid rgba(0, 217, 255, 0.2);
      color: var(--text-secondary);
      padding: 0.5rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .icon-btn:hover {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }
    
    /* Logout Button */
    .logout-btn {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--accent-red);
      color: white;
      padding: 1rem 1.5rem;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3);
      transition: all 0.3s;
    }
    
    .logout-btn:hover {
      transform: scale(1.05);
    }
    
    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }
    
    .modal-content {
      background: var(--bg-card);
      padding: 2rem;
      border-radius: 16px;
      max-width: 500px;
      margin: 1rem;
      border: 1px solid var(--accent-red);
    }
    
    .modal-content h3 {
      margin-bottom: 1rem;
      color: var(--accent-red);
    }
    
    .modal-content input {
      width: 100%;
      padding: 1rem;
      background: var(--bg-deep-space);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: inherit;
      margin-bottom: 1rem;
    }
    
    .modal-content .buttons {
      display: flex;
      gap: 1rem;
    }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-secondary);
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .profile-header {
        flex-direction: column;
        text-align: center;
      }
      
      .webapps-grid {
        grid-template-columns: 1fr;
      }
      
      .logout-btn {
        bottom: 1rem;
        right: 1rem;
      }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav>
    <div class="container">
      <a href="/" class="logo">
        <img src="/assets/logos/logo-nwh.svg" alt="Nexus Web Hub">
        <span>Nexus Web Hub</span>
      </a>
      
      <a href="/">Back to catalog</a>
    </div>
  </nav>
  
  <!-- Container -->
  <div class="container">
    <!-- Profile Header -->
    <div class="profile-header">
      <div class="avatar" id="avatar"></div>
      <div class="profile-info">
        <h1 id="user-name">Loading...</h1>
        <p class="email" id="user-email"></p>
        <div class="badges" id="badges"></div>
        <p style="color: var(--text-secondary); margin-top: 1rem;">
          <span id="webapps-count">0</span> Webapps published •
          <span id="reviews-count">0</span> Reviews given
        </p>
      </div>
    </div>
    
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('webapps')">
        <i class="fa-solid fa-th-large"></i> My Webapps
      </button>
    </div>
    
    <!-- Webapps Tab -->
    <div class="tab-content active" id="webapps-tab">
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search your webapps...">
        <a href="/submit.html" class="btn btn-primary">
          <i class="fa-solid fa-plus"></i> New Webapp
        </a>
      </div>
      
      <div class="webapps-grid" id="webapps-grid"></div>
      
      <div class="empty-state" id="empty-state" style="display: none;">
        <i class="fa-solid fa-box-open" style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.5;"></i>
        <p>No webapps yet</p>
        <a href="/submit.html" class="btn btn-primary" style="margin-top: 1rem;">
          <i class="fa-solid fa-plus"></i> Create your first webapp
        </a>
      </div>
    </div>
  </div>
  
  <!-- Delete Modal -->
  <div class="modal" id="delete-modal">
    <div class="modal-content">
      <h3><i class="fa-solid fa-triangle-exclamation"></i> Confirm Deletion</h3>
      <p style="margin-bottom: 1rem; color: var(--text-secondary);">
        This action is irreversible. Enter your password to confirm.
      </p>
      <input type="password" id="delete-password" placeholder="Your password">
      <div class="buttons">
        <button class="btn btn-secondary" onclick="closeDeleteModal()">Cancel</button>
        <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>
  
  <!-- Logout Button -->
  <button class="logout-btn" onclick="logout()">
    <i class="fa-solid fa-right-from-bracket"></i> Logout
  </button>
  
  <script>
    let user = null;
    let webapps = [];
    let webappToDelete = null;
    
    // Check auth
    function checkAuth() {
      const token = localStorage.getItem('token');
      const userStr = localStorage.getItem('user');
      
      if (!token || !userStr) {
        window.location.href = '/auth.html?return=/profile.html';
        return;
      }
      
      user = JSON.parse(userStr);
      renderProfile();
      loadWebapps();
    }
    
    // Render profile
    function renderProfile() {
      const initials = user.name.split(' ').map(n => n[0]).join('').toUpperCase();
      document.getElementById('avatar').textContent = initials;
      document.getElementById('user-name').textContent = user.name;
      document.getElementById('user-email').textContent = user.email;
      
      const badgesHTML = user.badges.map(badge => 
        `<span class="badge"><i class="fa-solid fa-award"></i> ${badge}</span>`
      ).join('');
      document.getElementById('badges').innerHTML = badgesHTML || '<span class="badge">New Member</span>';
    }
    
    // Load webapps
    async function loadWebapps() {
      try {
        const response = await fetch(`/api/webapps/user/${user.id}`);
        const data = await response.json();
        
        webapps = data.webapps;
        
        document.getElementById('webapps-count').textContent = webapps.length;
        
        if (webapps.length === 0) {
          document.getElementById('webapps-grid').style.display = 'none';
          document.getElementById('empty-state').style.display = 'block';
        } else {
          renderWebapps(webapps);
        }
      } catch (error) {
        console.error('Error loading webapps:', error);
      }
    }
    
    // Render webapps
    function renderWebapps(webappsToRender) {
      const grid = document.getElementById('webapps-grid');
      grid.style.display = 'grid';
      document.getElementById('empty-state').style.display = 'none';
      
      grid.innerHTML = webappsToRender.map(webapp => `
        <div class="webapp-card">
          <h3>${webapp.name}</h3>
          <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 0.5rem;">
            ${webapp.description_short}
          </p>
          <div class="stats">
            <span><i class="fa-solid fa-star"></i> ${webapp.avg_rating.toFixed(1)}</span>
            <span><i class="fa-solid fa-eye"></i> ${webapp.views_count}</span>
            <span><i class="fa-solid fa-comment"></i> ${webapp.reviews_count}</span>
          </div>
          <div class="actions">
            <button class="icon-btn" onclick="window.location.href='/webapp.html?id=${webapp.id}'" title="View">
              <i class="fa-solid fa-eye"></i>
            </button>
            <button class="icon-btn" onclick="window.location.href='/submit.html?edit=${webapp.id}'" title="Edit">
              <i class="fa-solid fa-edit"></i>
            </button>
            <button class="icon-btn" onclick="showDeleteModal('${webapp.id}')" title="Delete" style="color: var(--accent-red);">
              <i class="fa-solid fa-trash"></i>
            </button>
          </div>
        </div>
      `).join('');
    }
    
    // Search
    document.getElementById('search-input').addEventListener('input', (e) => {
      const search = e.target.value.toLowerCase();
      const filtered = webapps.filter(w => 
        w.name.toLowerCase().includes(search) || 
        w.description_short.toLowerCase().includes(search)
      );
      renderWebapps(filtered);
    });
    
    // Switch tabs
    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      
      document.querySelector(`button[onclick="switchTab('${tabName}')"]`).classList.add('active');
      document.getElementById(`${tabName}-tab`).classList.add('active');
    }
    
    // Delete modal
    function showDeleteModal(webappId) {
      webappToDelete = webappId;
      document.getElementById('delete-modal').style.display = 'flex';
    }
    
    function closeDeleteModal() {
      webappToDelete = null;
      document.getElementById('delete-password').value = '';
      document.getElementById('delete-modal').style.display = 'none';
    }
    
    async function confirmDelete() {
      const password = document.getElementById('delete-password').value;
      
      if (!password) {
        alert('Please enter your password');
        return;
      }
      
      try {
        const response = await fetch(`/api/webapps/${webappToDelete}`, {
          method: 'DELETE',
          headers: {
            'Content-Type': 'application/json',
            'X-User-Id': user.id
          },
          body: JSON.stringify({ password })
        });
        
        const data = await response.json();
        
        if (data.success) {
          alert('Webapp deleted successfully');
          closeDeleteModal();
          loadWebapps();
        } else {
          alert(data.message || 'Failed to delete webapp');
        }
      } catch (error) {
        console.error('Error deleting webapp:', error);
        alert('Error deleting webapp');
      }
    }
    
    // Logout
    function logout() {
      if (confirm('Are you sure you want to logout?')) {
        localStorage.removeItem('token');
        localStorage.removeItem('userId');
        localStorage.removeItem('user');
        window.location.href = '/';
      }
    }
    
    // Init
    document.addEventListener('DOMContentLoaded', checkAuth);
  </script>
</body>
</html>
