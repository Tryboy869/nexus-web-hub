<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile | Nexus Web Hub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-deep-space: #0a0e27;
      --bg-card: #1a1f3a;
      --text-primary: #E0E6ED;
      --text-secondary: #a0aec0;
      --accent-cyan: #00d9ff;
      --accent-purple: #8b5cf6;
      --accent-green: #10b981;
      --accent-gold: #fbbf24;
      --accent-red: #ef4444;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-deep-space);
      color: var(--text-primary);
      line-height: 1.6;
    }

    nav {
      background: var(--bg-card);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--accent-cyan);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      height: 40px;
      cursor: pointer;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      color: white;
    }

    .btn-secondary {
      background: transparent;
      border: 2px solid var(--accent-cyan);
      color: var(--accent-cyan);
    }

    .btn-danger {
      background: var(--accent-red);
      color: white;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    .profile-header {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
      display: flex;
      gap: 2rem;
      align-items: start;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .profile-info {
      flex: 1;
    }

    .profile-name {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .profile-email {
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }

    .badges-container {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .badge {
      width: 32px;
      height: 32px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent-cyan);
    }

    .stat-label {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .tabs {
      display: flex;
      gap: 1rem;
      border-bottom: 2px solid var(--bg-card);
      margin-bottom: 2rem;
    }

    .tab {
      padding: 1rem 2rem;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .tab:hover, .tab.active {
      color: var(--accent-cyan);
      border-bottom-color: var(--accent-cyan);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .actions-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .search-input {
      padding: 0.75rem;
      background: var(--bg-card);
      border: 2px solid var(--accent-purple);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 1rem;
      flex: 1;
      min-width: 250px;
    }

    .webapps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .webapp-card {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 1.5rem;
      transition: all 0.3s ease;
      border: 2px solid transparent;
    }

    .webapp-card:hover {
      border-color: var(--accent-cyan);
      transform: translateY(-3px);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 1rem;
    }

    .card-title {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .card-stats {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .card-actions {
      display: flex;
      gap: 0.5rem;
    }

    .btn-small {
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-secondary);
    }

    .empty-state i {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 14, 39, 0.95);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .modal-content {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 2rem;
      max-width: 500px;
      width: 100%;
      border: 2px solid var(--accent-cyan);
    }

    .modal-header {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--accent-red);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .modal-body {
      margin-bottom: 1.5rem;
      color: var(--text-secondary);
      line-height: 1.8;
    }

    .modal-footer {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
    }

    input[type="password"] {
      width: 100%;
      padding: 0.75rem;
      background: var(--bg-deep-space);
      border: 2px solid var(--accent-purple);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 1rem;
      margin-top: 1rem;
    }

    .logout-btn {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--accent-red);
      color: white;
      padding: 1rem 1.5rem;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3);
      transition: all 0.3s ease;
    }

    .logout-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(239, 68, 68, 0.5);
    }

    @media (max-width: 768px) {
      .profile-header {
        flex-direction: column;
        text-align: center;
      }
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .webapps-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <nav>
    <img src="/assets/logos/logo-nwh.svg" alt="Nexus Web Hub" class="logo" onclick="window.location.href='/'">
    <button class="btn btn-secondary" onclick="window.location.href='/'">
      <i class="fa-solid fa-home"></i>
      Home
    </button>
  </nav>

  <div class="container">
    <div class="profile-header">
      <div class="avatar" id="avatar"></div>
      <div class="profile-info">
        <h1 class="profile-name" id="profile-name"></h1>
        <p class="profile-email" id="profile-email"></p>
        
        <div class="badges-container" id="badges-container"></div>
        
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-value" id="webapps-count">0</div>
            <div class="stat-label">Webapps</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="reviews-count">0</div>
            <div class="stat-label">Reviews</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="badges-count">0</div>
            <div class="stat-label">Badges</div>
          </div>
        </div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('webapps')">
        <i class="fa-solid fa-grid-2"></i>
        My Webapps
      </button>
    </div>

    <div class="tab-content active" id="tab-webapps">
      <div class="actions-bar">
        <input type="text" class="search-input" id="search-webapps" placeholder="Search my webapps...">
        <button class="btn btn-primary" onclick="window.location.href='/submit.html'">
          <i class="fa-solid fa-plus"></i>
          New Webapp
        </button>
      </div>

      <div class="webapps-grid" id="webapps-grid"></div>

      <div class="empty-state" id="empty-state" style="display: none;">
        <i class="fa-solid fa-rocket"></i>
        <h2>No webapps yet</h2>
        <p>Start sharing your creations with the community!</p>
        <button class="btn btn-primary" style="margin-top: 1rem;" onclick="window.location.href='/submit.html'">
          <i class="fa-solid fa-plus"></i>
          Create your first webapp
        </button>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal" id="delete-modal">
    <div class="modal-content">
      <div class="modal-header">
        <i class="fa-solid fa-triangle-exclamation"></i>
        Delete Webapp
      </div>
      <div class="modal-body">
        <p><strong>Are you sure you want to delete this webapp?</strong></p>
        <p>This action is irreversible. All data including reviews will be permanently deleted.</p>
        <p style="margin-top: 1rem;">Enter your password to confirm:</p>
        <input type="password" id="delete-password" placeholder="Your password">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeDeleteModal()">Cancel</button>
        <button class="btn btn-danger" onclick="confirmDelete()">
          <i class="fa-solid fa-trash"></i>
          Delete
        </button>
      </div>
    </div>
  </div>

  <button class="logout-btn" onclick="logout()">
    <i class="fa-solid fa-right-from-bracket"></i>
    Logout
  </button>

  <script>
    let userWebapps = [];
    let webappToDelete = null;

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      
      event.target.closest('.tab').classList.add('active');
      document.getElementById(`tab-${tab}`).classList.add('active');
    }

    async function loadProfile() {
      const user = JSON.parse(localStorage.getItem('user'));
      if (!user) {
        window.location.href = '/auth.html';
        return;
      }

      // Avatar (initials)
      const initials = user.name.split(' ').map(n => n[0]).join('').substring(0, 2);
      document.getElementById('avatar').textContent = initials;

      // Profile info
      document.getElementById('profile-name').textContent = user.name;
      document.getElementById('profile-email').textContent = user.email;

      // Badges
      const badges = user.badges || [];
      document.getElementById('badges-count').textContent = badges.length;
      
      if (badges.length > 0) {
        document.getElementById('badges-container').innerHTML = badges.map(badge => 
          `<img src="/assets/badges/system/badge-${badge}.svg" class="badge" title="${badge}">`
        ).join('');
      }

      // Load webapps
      await loadWebapps();
    }

    async function loadWebapps() {
      try {
        const response = await fetch('/api/webapps');
        const data = await response.json();

        if (data.success) {
          const userId = localStorage.getItem('userId');
          userWebapps = data.webapps.filter(w => w.creator_id === userId);
          
          document.getElementById('webapps-count').textContent = userWebapps.length;
          renderWebapps(userWebapps);
        }
      } catch (error) {
        console.error('Load error:', error);
      }
    }

    function renderWebapps(webapps) {
      const grid = document.getElementById('webapps-grid');
      const emptyState = document.getElementById('empty-state');

      if (webapps.length === 0) {
        grid.style.display = 'none';
        emptyState.style.display = 'block';
        return;
      }

      grid.style.display = 'grid';
      emptyState.style.display = 'none';

      grid.innerHTML = webapps.map(webapp => `
        <div class="webapp-card">
          <div class="card-header">
            <h3 class="card-title">${webapp.name}</h3>
          </div>
          <div class="card-stats">
            <span><i class="fa-solid fa-star" style="color: var(--accent-gold)"></i> ${webapp.avg_rating.toFixed(1)}</span>
            <span><i class="fa-solid fa-eye"></i> ${webapp.views_count}</span>
            <span><i class="fa-solid fa-mouse-pointer"></i> ${webapp.clicks_count}</span>
            <span><i class="fa-solid fa-comment"></i> ${webapp.reviews_count}</span>
          </div>
          <div class="card-actions">
            <button class="btn btn-secondary btn-small" onclick="window.location.href='/webapp.html?id=${webapp.id}'">
              <i class="fa-solid fa-eye"></i>
              View
            </button>
            <button class="btn btn-secondary btn-small" onclick="window.location.href='/submit.html?edit=${webapp.id}'">
              <i class="fa-solid fa-pen"></i>
              Edit
            </button>
            <button class="btn btn-danger btn-small" onclick="deleteWebapp('${webapp.id}', '${webapp.name}')">
              <i class="fa-solid fa-trash"></i>
              Delete
            </button>
          </div>
        </div>
      `).join('');
    }

    // Search
    document.getElementById('search-webapps').addEventListener('input', (e) => {
      const search = e.target.value.toLowerCase();
      const filtered = userWebapps.filter(w => 
        w.name.toLowerCase().includes(search) ||
        w.description_short.toLowerCase().includes(search)
      );
      renderWebapps(filtered);
    });

    function deleteWebapp(id, name) {
      webappToDelete = { id, name };
      document.getElementById('delete-modal').style.display = 'flex';
    }

    function closeDeleteModal() {
      document.getElementById('delete-modal').style.display = 'none';
      document.getElementById('delete-password').value = '';
      webappToDelete = null;
    }

    async function confirmDelete() {
      const password = document.getElementById('delete-password').value;
      
      if (!password) {
        alert('Please enter your password');
        return;
      }

      try {
        const userId = localStorage.getItem('userId');
        const response = await fetch(`/api/webapps/${webappToDelete.id}`, {
          method: 'DELETE',
          headers: {
            'Content-Type': 'application/json',
            'X-User-Id': userId
          },
          body: JSON.stringify({ password })
        });

        const data = await response.json();

        if (data.success) {
          alert('Webapp deleted successfully');
          closeDeleteModal();
          loadWebapps();
        } else {
          alert('Error: ' + data.message);
        }
      } catch (error) {
        console.error('Delete error:', error);
        alert('Error deleting webapp');
      }
    }

    function logout() {
      if (confirm('Are you sure you want to logout?')) {
        localStorage.removeItem('token');
        localStorage.removeItem('userId');
        localStorage.removeItem('user');
        window.location.href = '/';
      }
    }

    // Init
    document.addEventListener('DOMContentLoaded', loadProfile);

    // Check auth
    if (!localStorage.getItem('token')) {
      window.location.href = '/auth.html';
    }
  </script>
</body>
</html>
