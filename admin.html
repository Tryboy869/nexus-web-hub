<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | Nexus Web Hub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-deep-space: #0a0e27;
      --bg-card: #1a1f3a;
      --text-primary: #E0E6ED;
      --text-secondary: #a0aec0;
      --accent-cyan: #00d9ff;
      --accent-purple: #8b5cf6;
      --accent-green: #10b981;
      --accent-gold: #fbbf24;
      --accent-red: #ef4444;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-deep-space);
      color: var(--text-primary);
      line-height: 1.6;
    }

    /* Login Screen */
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .login-box {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 3rem;
      max-width: 400px;
      width: 100%;
      border: 2px solid var(--accent-red);
      box-shadow: 0 20px 60px rgba(239, 68, 68, 0.3);
    }

    .login-box h1 {
      text-align: center;
      margin-bottom: 2rem;
      color: var(--accent-red);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 1rem;
      background: var(--bg-deep-space);
      border: 2px solid var(--accent-purple);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 1rem;
    }

    input:focus {
      outline: none;
      border-color: var(--accent-cyan);
    }

    .btn {
      width: 100%;
      padding: 1rem;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-danger {
      background: var(--accent-red);
      color: white;
    }

    .btn-danger:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(239, 68, 68, 0.4);
    }

    .btn-secondary {
      background: transparent;
      border: 2px solid var(--accent-cyan);
      color: var(--accent-cyan);
    }

    /* Admin Panel */
    #admin-panel {
      display: none;
    }

    nav {
      background: var(--bg-card);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--accent-red);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      height: 40px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    .dashboard-header {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
      border: 2px solid var(--accent-red);
    }

    .dashboard-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--accent-red);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-top: 1.5rem;
    }

    .stat-card {
      background: var(--bg-deep-space);
      padding: 1.5rem;
      border-radius: 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--accent-cyan);
    }

    .stat-label {
      color: var(--text-secondary);
      margin-top: 0.5rem;
    }

    .tabs {
      display: flex;
      gap: 1rem;
      border-bottom: 2px solid var(--bg-card);
      margin-bottom: 2rem;
    }

    .tab {
      padding: 1rem 2rem;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .tab:hover, .tab.active {
      color: var(--accent-red);
      border-bottom-color: var(--accent-red);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    table {
      width: 100%;
      background: var(--bg-card);
      border-radius: 12px;
      overflow: hidden;
    }

    thead {
      background: var(--bg-deep-space);
    }

    th, td {
      padding: 1rem;
      text-align: left;
    }

    th {
      font-weight: 600;
      color: var(--accent-cyan);
    }

    tbody tr {
      border-bottom: 1px solid var(--bg-deep-space);
    }

    tbody tr:hover {
      background: rgba(0, 217, 255, 0.05);
    }

    .status-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .status-pending {
      background: rgba(251, 191, 36, 0.2);
      color: var(--accent-gold);
    }

    .status-resolved {
      background: rgba(16, 185, 129, 0.2);
      color: var(--accent-green);
    }

    .action-btns {
      display: flex;
      gap: 0.5rem;
    }

    .btn-small {
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-secondary);
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 14, 39, 0.95);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .modal-content {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 2rem;
      max-width: 600px;
      width: 100%;
      border: 2px solid var(--accent-cyan);
    }

    .modal-header {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--accent-cyan);
    }

    .modal-body {
      margin-bottom: 1.5rem;
    }

    .modal-footer {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
    }

    textarea {
      width: 100%;
      padding: 1rem;
      background: var(--bg-deep-space);
      border: 2px solid var(--accent-purple);
      border-radius: 12px;
      color: var(--text-primary);
      font-family: inherit;
      resize: vertical;
      min-height: 100px;
    }

    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      table {
        font-size: 0.85rem;
      }
      .action-btns {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <!-- Login Screen -->
  <div class="login-container" id="login-screen">
    <div class="login-box">
      <h1><i class="fa-solid fa-shield-halved"></i> Admin Login</h1>
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="admin-email" required placeholder="admin@nexusstudio.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="admin-password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-danger">
          <i class="fa-solid fa-right-to-bracket"></i>
          Login as Admin
        </button>
      </form>
      <div style="text-align: center; margin-top: 2rem;">
        <a href="/" style="color: var(--accent-cyan); text-decoration: none;">
          <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>
      </div>
    </div>
  </div>

  <!-- Admin Panel -->
  <div id="admin-panel">
    <nav>
      <img src="/assets/logos/logo-nwh.svg" alt="Nexus Web Hub" class="logo">
      <button class="btn btn-danger" onclick="logout()">
        <i class="fa-solid fa-right-from-bracket"></i>
        Logout
      </button>
    </nav>

    <div class="container">
      <div class="dashboard-header">
        <h1 class="dashboard-title">
          <i class="fa-solid fa-gauge-high"></i>
          Admin Dashboard
        </h1>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value" id="total-webapps">0</div>
            <div class="stat-label">Total Webapps</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="pending-reports">0</div>
            <div class="stat-label">Pending Reports</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="total-users">0</div>
            <div class="stat-label">Total Users</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="total-reviews">0</div>
            <div class="stat-label">Total Reviews</div>
          </div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="switchTab('reports')">
          <i class="fa-solid fa-flag"></i>
          Reports
        </button>
        <button class="tab" onclick="switchTab('webapps')">
          <i class="fa-solid fa-grid-2"></i>
          All Webapps
        </button>
      </div>

      <!-- Reports Tab -->
      <div class="tab-content active" id="tab-reports">
        <table id="reports-table">
          <thead>
            <tr>
              <th>Webapp</th>
              <th>Reported By</th>
              <th>Reason</th>
              <th>Date</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="reports-tbody"></tbody>
        </table>
        <div class="empty-state" id="reports-empty" style="display: none;">
          <i class="fa-solid fa-check-circle" style="font-size: 4rem; color: var(--accent-green);"></i>
          <h2>No pending reports</h2>
          <p>All caught up!</p>
        </div>
      </div>

      <!-- Webapps Tab -->
      <div class="tab-content" id="tab-webapps">
        <table id="webapps-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Creator</th>
              <th>Category</th>
              <th>Rating</th>
              <th>Views</th>
              <th>Reviews</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="webapps-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Resolve Report Modal -->
  <div class="modal" id="resolve-modal">
    <div class="modal-content">
      <div class="modal-header">Resolve Report</div>
      <div class="modal-body">
        <div class="form-group">
          <label>Admin Notes</label>
          <textarea id="admin-notes" placeholder="Add any notes about this resolution..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeResolveModal()">Cancel</button>
        <button class="btn btn-danger" onclick="confirmResolve()">
          <i class="fa-solid fa-check"></i>
          Mark as Resolved
        </button>
      </div>
    </div>
  </div>

  <script>
    let adminKey = null;
    let currentReportId = null;

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      
      event.target.closest('.tab').classList.add('active');
      document.getElementById(`tab-${tab}`).classList.add('active');
    }

    async function handleLogin(e) {
      e.preventDefault();
      
      const email = document.getElementById('admin-email').value;
      const password = document.getElementById('admin-password').value;

      try {
        const response = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (data.success) {
          adminKey = btoa(`${email}:${password}`); // Simple encoding
          sessionStorage.setItem('adminKey', adminKey);
          
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('admin-panel').style.display = 'block';
          
          loadDashboard();
        } else {
          alert('Invalid credentials');
        }
      } catch (error) {
        console.error('Login error:', error);
        alert('Login failed');
      }
    }

    async function loadDashboard() {
      await loadStats();
      await loadReports();
      await loadWebapps();
    }

    async function loadStats() {
      try {
        const response = await fetch('/api/stats');
        const data = await response.json();

        if (data.success) {
          document.getElementById('total-webapps').textContent = data.stats.webapps;
          document.getElementById('total-users').textContent = data.stats.creators;
          document.getElementById('total-reviews').textContent = data.stats.reviews;
        }

        // Load reports count
        const reportsResponse = await fetch('/api/admin/reports', {
          headers: { 'X-Admin-Key': adminKey }
        });
        const reportsData = await reportsResponse.json();
        
        if (reportsData.success) {
          const pending = reportsData.reports.filter(r => r.status === 'pending').length;
          document.getElementById('pending-reports').textContent = pending;
        }
      } catch (error) {
        console.error('Stats load error:', error);
      }
    }

    async function loadReports() {
      try {
        const response = await fetch('/api/admin/reports', {
          headers: { 'X-Admin-Key': adminKey }
        });
        const data = await response.json();

        if (data.success) {
          const tbody = document.getElementById('reports-tbody');
          const empty = document.getElementById('reports-empty');

          if (data.reports.length === 0) {
            document.getElementById('reports-table').style.display = 'none';
            empty.style.display = 'block';
            return;
          }

          document.getElementById('reports-table').style.display = 'table';
          empty.style.display = 'none';

          tbody.innerHTML = data.reports.map(report => `
            <tr>
              <td><a href="/webapp.html?id=${report.target_id}" style="color: var(--accent-cyan);">${report.webapp_name || report.target_id}</a></td>
              <td>${report.reporter_name}</td>
              <td>${report.reason.substring(0, 100)}${report.reason.length > 100 ? '...' : ''}</td>
              <td>${new Date(report.created_at).toLocaleDateString()}</td>
              <td><span class="status-badge status-${report.status}">${report.status}</span></td>
              <td>
                <div class="action-btns">
                  ${report.status === 'pending' ? `
                    <button class="btn btn-secondary btn-small" onclick="resolveReport('${report.id}')">
                      <i class="fa-solid fa-check"></i> Resolve
                    </button>
                    <button class="btn btn-danger btn-small" onclick="deleteWebappFromReport('${report.target_id}', '${report.webapp_name}')">
                      <i class="fa-solid fa-trash"></i> Delete
                    </button>
                  ` : `
                    <span style="color: var(--accent-green);">Resolved</span>
                  `}
                </div>
              </td>
            </tr>
          `).join('');
        }
      } catch (error) {
        console.error('Reports load error:', error);
      }
    }

    async function loadWebapps() {
      try {
        const response = await fetch('/api/admin/webapps', {
          headers: { 'X-Admin-Key': adminKey }
        });
        const data = await response.json();

        if (data.success) {
          const tbody = document.getElementById('webapps-tbody');

          tbody.innerHTML = data.webapps.map(webapp => `
            <tr>
              <td><a href="/webapp.html?id=${webapp.id}" style="color: var(--accent-cyan);">${webapp.name}</a></td>
              <td>${webapp.creator_name}</td>
              <td>${webapp.category}</td>
              <td>${webapp.avg_rating.toFixed(1)} ⭐</td>
              <td>${webapp.views_count}</td>
              <td>${webapp.reviews_count}</td>
              <td>${new Date(webapp.created_at).toLocaleDateString()}</td>
              <td>
                <button class="btn btn-danger btn-small" onclick="deleteWebapp('${webapp.id}', '${webapp.name}')">
                  <i class="fa-solid fa-trash"></i>
                </button>
              </td>
            </tr>
          `).join('');
        }
      } catch (error) {
        console.error('Webapps load error:', error);
      }
    }

    function resolveReport(reportId) {
      currentReportId = reportId;
      document.getElementById('resolve-modal').style.display = 'flex';
    }

    function closeResolveModal() {
      document.getElementById('resolve-modal').style.display = 'none';
      currentReportId = null;
      document.getElementById('admin-notes').value = '';
    }

    async function confirmResolve() {
      const notes = document.getElementById('admin-notes').value;

      try {
        const response = await fetch(`/api/admin/reports/${currentReportId}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-Admin-Key': adminKey
          },
          body: JSON.stringify({ admin_notes: notes })
        });

        const data = await response.json();

        if (data.success) {
          alert('Report marked as resolved');
          closeResolveModal();
          loadDashboard();
        }
      } catch (error) {
        console.error('Resolve error:', error);
        alert('Error resolving report');
      }
    }

    async function deleteWebapp(id, name) {
      if (!confirm(`Delete webapp "${name}"? This action is irreversible.`)) {
        return;
      }

      try {
        const response = await fetch(`/api/admin/webapps/${id}`, {
          method: 'DELETE',
          headers: { 'X-Admin-Key': adminKey }
        });

        const data = await response.json();

        if (data.success) {
          alert('Webapp deleted');
          loadDashboard();
        }
      } catch (error) {
        console.error('Delete error:', error);
        alert('Error deleting webapp');
      }
    }

    async function deleteWebappFromReport(id, name) {
      if (!confirm(`Delete webapp "${name}" due to report? This action is irreversible.`)) {
        return;
      }

      await deleteWebapp(id, name);
    }

    function logout() {
      if (confirm('Logout from admin panel?')) {
        sessionStorage.removeItem('adminKey');
        window.location.reload();
      }
    }

    // Check if already logged in
    const savedKey = sessionStorage.getItem('adminKey');
    if (savedKey) {
      adminKey = savedKey;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      loadDashboard();
    }
  </script>
</body>
</html>
