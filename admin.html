<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Nexus Web Hub</title>
  <link rel="icon" href="assets/logos/logo-nwh.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep-space: #0a0e27;
      --bg-card: #1a1f3a;
      --text-primary: #E0E6ED;
      --text-secondary: #a0aec0;
      --accent-cyan: #00d9ff;
      --accent-purple: #8b5cf6;
      --accent-green: #10b981;
      --accent-gold: #fbbf24;
      --accent-red: #ef4444;
      --border-glow: rgba(0, 217, 255, 0.15);
      --font-body: 'Inter', sans-serif;
      --font-heading: 'Space Grotesk', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-deep-space);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* LOGIN SCREEN */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border-glow);
      border-radius: 20px;
      padding: 3rem;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 217, 255, 0.15);
    }

    .login-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 2rem;
      display: block;
    }

    .login-card h1 {
      font-family: var(--font-heading);
      text-align: center;
      font-size: 2rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-card p {
      text-align: center;
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .form-group input {
      width: 100%;
      padding: 1rem;
      background: var(--bg-deep-space);
      border: 1px solid var(--border-glow);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 1rem;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent-cyan);
    }

    .btn {
      width: 100%;
      padding: 1rem 2rem;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      font-family: var(--font-body);
      font-size: 1rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      color: #fff;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0, 217, 255, 0.4);
    }

    .btn-secondary {
      background: var(--bg-deep-space);
      color: var(--text-primary);
      border: 1px solid var(--border-glow);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.1);
      color: var(--accent-red);
      border: 1px solid var(--accent-red);
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
    }

    .btn-danger:hover {
      background: var(--accent-red);
      color: #fff;
    }

    /* ADMIN DASHBOARD */
    .admin-dashboard {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .admin-header h1 {
      font-family: var(--font-heading);
      font-size: 2rem;
    }

    .admin-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-glow);
      border-radius: 12px;
      padding: 1.5rem;
    }

    .stat-value {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--accent-cyan);
    }

    .stat-label {
      color: var(--text-secondary);
      margin-top: 0.5rem;
    }

    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border-glow);
      margin-bottom: 2rem;
    }

    .tab {
      padding: 1rem 1.5rem;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      transition: all 0.3s;
    }

    .tab:hover { color: var(--text-primary); }
    .tab.active { color: var(--accent-cyan); border-bottom-color: var(--accent-cyan); }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* TABLES */
    .table-container {
      background: var(--bg-card);
      border: 1px solid var(--border-glow);
      border-radius: 12px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border-glow);
    }

    th {
      background: var(--bg-deep-space);
      font-weight: 600;
      color: var(--accent-cyan);
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover {
      background: rgba(0, 217, 255, 0.05);
    }

    .badge {
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .badge-pending {
      background: rgba(251, 191, 36, 0.1);
      color: var(--accent-gold);
    }

    .badge-resolved {
      background: rgba(16, 185, 129, 0.1);
      color: var(--accent-green);
    }

    .actions {
      display: flex;
      gap: 0.5rem;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-secondary);
    }

    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    .hidden { display: none !important; }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      table {
        font-size: 0.85rem;
      }
      
      th, td {
        padding: 0.75rem;
      }
      
      .actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <img src="assets/logos/logo-nwh.svg" alt="NWH" class="login-logo">
      <h1>Admin Panel</h1>
      <p>Nexus Web Hub - Administration</p>

      <form id="loginForm" onsubmit="login(event)">
        <div class="form-group">
          <label for="email">Email Admin</label>
          <input type="email" id="email" required autocomplete="username">
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary">Se connecter</button>
      </form>

      <div style="margin-top: 1.5rem; text-align: center;">
        <a href="/" class="btn btn-secondary">← Retour au site</a>
      </div>
    </div>
  </div>

  <!-- ADMIN DASHBOARD -->
  <div id="adminDashboard" class="admin-dashboard hidden">
    <div class="admin-header">
      <h1>🛡️ Admin Panel</h1>
      <button class="btn btn-secondary" onclick="logout()">Déconnexion</button>
    </div>

    <!-- STATS -->
    <div class="admin-stats">
      <div class="stat-card">
        <div class="stat-value" id="statWebapps">0</div>
        <div class="stat-label">Webapps totales</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statReports">0</div>
        <div class="stat-label">Signalements</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statPending">0</div>
        <div class="stat-label">En attente</div>
      </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('reports')">🚨 Signalements</button>
      <button class="tab" onclick="switchTab('webapps')">📱 Toutes les Webapps</button>
    </div>

    <!-- TAB: REPORTS -->
    <div id="reportsTab" class="tab-content active">
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Webapp</th>
              <th>Signalé par</th>
              <th>Raison</th>
              <th>Date</th>
              <th>Statut</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="reportsTableBody"></tbody>
        </table>
      </div>

      <div id="reportsEmpty" class="empty-state hidden">
        <div class="empty-state-icon">✅</div>
        <h3>Aucun signalement</h3>
        <p>Tout est en ordre !</p>
      </div>
    </div>

    <!-- TAB: WEBAPPS -->
    <div id="webappsTab" class="tab-content">
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Nom</th>
              <th>Créateur</th>
              <th>URL</th>
              <th>Note</th>
              <th>Vues</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="webappsTableBody"></tbody>
        </table>
      </div>

      <div id="webappsEmpty" class="empty-state hidden">
        <div class="empty-state-icon">📭</div>
        <h3>Aucune webapp</h3>
        <p>Le catalogue est vide</p>
      </div>
    </div>
  </div>

  <script>
    let isAdmin = false;
    let adminCredentials = null;
    let reports = [];
    let webapps = [];

    document.addEventListener('DOMContentLoaded', () => {
      checkAdminSession();
    });

    function checkAdminSession() {
      const session = sessionStorage.getItem('admin_session');
      if (session) {
        adminCredentials = JSON.parse(session);
        showDashboard();
      }
    }

    async function login(event) {
      event.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (data.success) {
          adminCredentials = { email, password };
          sessionStorage.setItem('admin_session', JSON.stringify(adminCredentials));
          showDashboard();
        } else {
          alert('Identifiants invalides');
        }
      } catch (error) {
        console.error(error);
        alert('Erreur de connexion');
      }
    }

    function logout() {
      sessionStorage.removeItem('admin_session');
      adminCredentials = null;
      document.getElementById('loginScreen').classList.remove('hidden');
      document.getElementById('adminDashboard').classList.add('hidden');
    }

    async function showDashboard() {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('adminDashboard').classList.remove('hidden');
      await loadData();
    }

    async function loadData() {
      await Promise.all([
        loadReports(),
        loadWebapps()
      ]);
      updateStats();
    }

    async function loadReports() {
      try {
        const res = await fetch('/api/admin/reports');
        const data = await res.json();

        if (data.success) {
          reports = data.data.reports;
          renderReports();
        }
      } catch (error) {
        console.error('Error loading reports:', error);
      }
    }

    async function loadWebapps() {
      try {
        const res = await fetch('/api/admin/webapps');
        const data = await res.json();

        if (data.success) {
          webapps = data.data.webapps;
          renderWebapps();
        }
      } catch (error) {
        console.error('Error loading webapps:', error);
      }
    }

    function updateStats() {
      document.getElementById('statWebapps').textContent = webapps.length;
      document.getElementById('statReports').textContent = reports.length;
      document.getElementById('statPending').textContent = reports.filter(r => r.status === 'pending').length;
    }

    function renderReports() {
      const tbody = document.getElementById('reportsTableBody');
      const empty = document.getElementById('reportsEmpty');

      if (reports.length === 0) {
        tbody.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }

      empty.classList.add('hidden');

      tbody.innerHTML = reports.map(r => `
        <tr>
          <td>
            <strong>${r.webapp_name || 'Webapp supprimée'}</strong><br>
            <small style="color:var(--text-secondary)">${r.webapp_url || ''}</small>
          </td>
          <td>
            ${r.reporter_name}<br>
            <small style="color:var(--text-secondary)">${r.reporter_email}</small>
          </td>
          <td style="max-width: 300px;">${r.reason}</td>
          <td>${new Date(r.created_at * 1000).toLocaleDateString('fr-FR')}</td>
          <td>
            <span class="badge ${r.status === 'pending' ? 'badge-pending' : 'badge-resolved'}">
              ${r.status === 'pending' ? 'En attente' : 'Résolu'}
            </span>
          </td>
          <td>
            <div class="actions">
              ${r.webapp_name ? `<button class="btn btn-secondary" onclick="viewWebapp('${r.target_id}')">Voir</button>` : ''}
              ${r.webapp_name && r.status === 'pending' ? `<button class="btn btn-danger" onclick="deleteWebapp('${r.target_id}', '${r.id}')">Supprimer</button>` : ''}
              ${r.status === 'pending' ? `<button class="btn btn-secondary" onclick="ignoreReport('${r.id}')">Ignorer</button>` : ''}
            </div>
          </td>
        </tr>
      `).join('');
    }

    function renderWebapps() {
      const tbody = document.getElementById('webappsTableBody');
      const empty = document.getElementById('webappsEmpty');

      if (webapps.length === 0) {
        tbody.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }

      empty.classList.add('hidden');

      tbody.innerHTML = webapps.map(w => `
        <tr>
          <td>
            <strong>${w.name}</strong><br>
            <small style="color:var(--text-secondary)">${w.category}</small>
          </td>
          <td>
            ${w.developer}<br>
            <small style="color:var(--text-secondary)">${w.creator_email || ''}</small>
          </td>
          <td style="max-width: 300px;">
            <a href="${w.url}" target="_blank" rel="noopener" style="color:var(--accent-cyan)">${w.url}</a>
          </td>
          <td>⭐ ${(w.avg_rating || 0).toFixed(1)}</td>
          <td>${w.views_count || 0}</td>
          <td>${new Date(w.created_at * 1000).toLocaleDateString('fr-FR')}</td>
          <td>
            <div class="actions">
              <button class="btn btn-secondary" onclick="viewWebapp('${w.id}')">Voir</button>
              <button class="btn btn-danger" onclick="confirmDeleteWebapp('${w.id}', '${w.name}')">Supprimer</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

      if (tab === 'reports') {
        document.querySelector('.tab:nth-child(1)').classList.add('active');
        document.getElementById('reportsTab').classList.add('active');
      } else {
        document.querySelector('.tab:nth-child(2)').classList.add('active');
        document.getElementById('webappsTab').classList.add('active');
      }
    }

    function viewWebapp(id) {
      window.open(`/webapp.html?id=${id}`, '_blank');
    }

    async function deleteWebapp(webappId, reportId = null) {
      if (!confirm('Confirmer la suppression de cette webapp ?')) return;

      try {
        const res = await fetch(`/api/admin/webapps/${webappId}`, {
          method: 'DELETE'
        });

        const data = await res.json();

        if (data.success) {
          alert('Webapp supprimée');
          if (reportId) {
            await markReportResolved(reportId);
          }
          await loadData();
        } else {
          alert(data.message);
        }
      } catch (error) {
        console.error(error);
        alert('Erreur lors de la suppression');
      }
    }

    function confirmDeleteWebapp(id, name) {
      if (confirm(`Supprimer la webapp "${name}" ?`)) {
        deleteWebapp(id);
      }
    }

    async function ignoreReport(reportId) {
      if (!confirm('Marquer ce signalement comme résolu (ignoré) ?')) return;

      await markReportResolved(reportId);
    }

    async function markReportResolved(reportId) {
      try {
        const res = await fetch(`/api/admin/reports/${reportId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            status: 'resolved',
            admin_notes: 'Traité'
          })
        });

        const data = await res.json();

        if (data.success) {
          await loadData();
        }
      } catch (error) {
        console.error(error);
      }
    }
  </script>
</body>
</html>
